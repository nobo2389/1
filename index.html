<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EMBERKEEP</title>
<style>
  :root{
    --bg1:#140b22;
    --bg2:#05030a;
    --wall:#382c54;
    --wallLine:#5b4a86;
    --torch:#ffb454;
    --player:#8fd6ff;
    --slime:#7bffa0;
    --archer:#e8c88a;
    --boss:#ff4d6d;
    --gold:#ffd166;
    --heart:#ff5c7a;
    --potion:#5ec8ff;
    --text:#f1ecff;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:radial-gradient(ellipse at 50% 15%, var(--bg1), var(--bg2) 80%);
    font-family:'Courier New', ui-monospace, monospace;
    color:var(--text);
    touch-action:none; user-select:none;
  }
  #wrap{ position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas{ display:block; max-width:100vw; max-height:100vh; }

  #hud{ position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; padding:12px 14px; pointer-events:none; z-index:5; }
  #hearts{ display:flex; gap:3px; }
  .heart{ width:16px; height:14px; position:relative; }
  .heart svg{ width:100%; height:100%; }
  .label{ font-size:9px; letter-spacing:2px; opacity:0.5; margin-bottom:3px; }
  .rightcol{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .stat{ display:flex; align-items:center; gap:5px; font-size:13px; color:var(--gold); text-shadow:0 0 8px rgba(255,209,102,0.5); }
  .stat .ic{ font-size:13px; }
  #timerBox{ position:absolute; top:12px; left:50%; transform:translateX(-50%); font-size:12px; opacity:0.65; letter-spacing:2px; z-index:5;}

  #toast{
    position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
    font-size:12.5px; letter-spacing:1px; background:rgba(20,11,34,0.85); border:1px solid var(--wallLine);
    padding:9px 16px; border-radius:4px; opacity:0; transition:opacity 0.3s ease; z-index:6; max-width:80%; text-align:center;
    pointer-events:none;
  }
  #toast.show{ opacity:1; }

  #dashBtn{
    position:absolute; bottom:18px; right:18px; width:64px; height:64px; border-radius:50%;
    border:2px solid var(--player); background:rgba(143,214,255,0.08); color:var(--player);
    font-size:11px; letter-spacing:1px; z-index:6; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 16px rgba(143,214,255,0.25); overflow:hidden;
  }
  #dashBtn .fill{ position:absolute; bottom:0; left:0; right:0; background:rgba(143,214,255,0.25); height:0%; }
  #dashBtn span{ position:relative; z-index:1; }

  #overlay{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; z-index:10; padding:20px;
    background:radial-gradient(ellipse at 50% 40%, rgba(20,11,34,0.55), rgba(5,3,10,0.92));
  }
  #overlay h1{
    font-size:clamp(26px,7.5vw,46px); margin:0 0 4px 0; letter-spacing:4px;
    background:linear-gradient(90deg,var(--player),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 30px rgba(143,214,255,0.3);
  }
  #overlay p.sub{ font-size:11px; letter-spacing:2px; opacity:0.55; margin:0 0 18px 0; }
  #overlay .msg{ font-size:14px; opacity:0.9; margin-bottom:8px; min-height:20px; letter-spacing:1px; }
  .btn{
    font-family:inherit; font-size:14px; letter-spacing:3px; padding:13px 30px;
    background:transparent; border:2px solid var(--player); color:var(--player); border-radius:2px; cursor:pointer;
    box-shadow:0 0 16px rgba(143,214,255,0.25); transition:transform 0.1s ease, box-shadow 0.2s ease;
  }
  .btn:active{ transform:scale(0.96); box-shadow:0 0 26px rgba(143,214,255,0.5); }
  #overlay.hidden{ display:none; }
  .hint{ font-size:10px; opacity:0.4; margin-top:16px; letter-spacing:1px; max-width:280px; }
  #flash{ position:absolute; inset:0; background:var(--heart); opacity:0; pointer-events:none; z-index:8; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>
      <div class="label">LIFE</div>
      <div id="hearts"></div>
    </div>
    <div class="rightcol">
      <div class="stat"><span class="ic">&#128273;</span><span id="keyVal">0</span></div>
      <div class="stat"><span class="ic">&#9876;</span><span id="swordVal">Lv1</span></div>
    </div>
  </div>
  <div id="timerBox" id="timerBox">0:00</div>
  <canvas id="game"></canvas>
  <div id="toast"></div>
  <div id="dashBtn"><div class="fill" id="dashFill"></div><span>DASH</span></div>
  <div id="flash"></div>

  <div id="overlay">
    <h1>EMBERKEEP</h1>
    <p class="sub">忘れられた地下要塞</p>
    <div class="msg" id="overlayMsg">近づくと自動で斬りつける。奥の主を倒せ</div>
    <button class="btn" id="startBtn">START</button>
    <div class="hint">ドラッグ / WASDで移動、右下ボタンかShiftでダッシュ。鍵で扉を開け、宝箱を集めながら最深部を目指せ</div>
  </div>
</div>

<script>
(function(){
  const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  const overlay=document.getElementById('overlay'), overlayMsg=document.getElementById('overlayMsg'), startBtn=document.getElementById('startBtn');
  const heartsEl=document.getElementById('hearts'), keyVal=document.getElementById('keyVal'), swordVal=document.getElementById('swordVal');
  const timerBox=document.getElementById('timerBox'), toastEl=document.getElementById('toast'), flash=document.getElementById('flash');
  const dashBtn=document.getElementById('dashBtn'), dashFill=document.getElementById('dashFill');

  let DPR=Math.min(window.devicePixelRatio||1,2), W,H;
  function resize(){
    const r=document.getElementById('wrap').getBoundingClientRect();
    W=r.width; H=r.height;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    canvas.width=W*DPR; canvas.height=H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize',resize); resize();

  // ---------------- audio ----------------
  let actx=null;
  function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
  function beep(freq,dur,type,gainVal,sweep){
    if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(freq,actx.currentTime);
    if(sweep) o.frequency.exponentialRampToValueAtTime(Math.max(20,sweep),actx.currentTime+dur);
    g.gain.setValueAtTime(gainVal||0.07,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }
  const sfx={
    swing:()=>beep(300,0.08,'square',0.05,180),
    hit:()=>beep(500,0.05,'square',0.03,260),
    kill:()=>beep(220,0.16,'sawtooth',0.06,60),
    hurt:()=>beep(110,0.2,'square',0.09,50),
    door:()=>beep(340,0.2,'triangle',0.06,520),
    locked:()=>beep(140,0.15,'square',0.06,90),
    chest:()=>beep(500,0.28,'triangle',0.08,900),
    dash:()=>beep(620,0.1,'square',0.05,240),
    boss:()=>beep(80,0.6,'sawtooth',0.12,40),
    win:()=>beep(500,0.5,'triangle',0.1,1000),
    gameover:()=>beep(200,0.7,'sawtooth',0.1,50)
  };

  // ---------------- room templates (normalized 0..1 coords) ----------------
  const ROOM_TEMPLATES = {
    start:{
      pillars:[{x:0.3,y:0.35,w:0.05,h:0.3},{x:0.65,y:0.35,w:0.05,h:0.3}],
      doors:[{x:0.93,y:0.42,w:0.06,h:0.16,target:'hall',spawn:{x:0.08,y:0.5}}],
      enemies:[
        {type:'slime',x:0.3,y:0.6}, {type:'slime',x:0.55,y:0.25}, {type:'slime',x:0.7,y:0.7}
      ],
      chests:[],
      npc:{x:0.5,y:0.18,text:'この地下には古い鍵と力が眠っている……気をつけて進むのだ。'}
    },
    hall:{
      pillars:[{x:0.46,y:0.15,w:0.08,h:0.12},{x:0.46,y:0.73,w:0.08,h:0.12}],
      doors:[
        {x:0.01,y:0.42,w:0.06,h:0.16,target:'start',spawn:{x:0.9,y:0.5}},
        {x:0.44,y:0.01,w:0.16,h:0.06,target:'vault',spawn:{x:0.5,y:0.85},locked:true,requiresKey:true},
        {x:0.93,y:0.42,w:0.06,h:0.16,target:'gate',spawn:{x:0.08,y:0.5}}
      ],
      enemies:[
        {type:'slime',x:0.25,y:0.3}, {type:'slime',x:0.75,y:0.65}, {type:'archer',x:0.5,y:0.55}
      ],
      chests:[ {x:0.5,y:0.32,loot:'key'} ],
      npc:null
    },
    vault:{
      pillars:[],
      doors:[ {x:0.44,y:0.93,w:0.16,h:0.06,target:'hall',spawn:{x:0.5,y:0.2}} ],
      enemies:[ {type:'slime',x:0.5,y:0.35} ],
      chests:[ {x:0.28,y:0.55,loot:'heart'}, {x:0.72,y:0.55,loot:'sword'} ],
      npc:null
    },
    gate:{
      pillars:[{x:0.46,y:0.4,w:0.08,h:0.2}],
      doors:[
        {x:0.01,y:0.42,w:0.06,h:0.16,target:'hall',spawn:{x:0.9,y:0.5}},
        {x:0.93,y:0.42,w:0.06,h:0.16,target:'boss',spawn:{x:0.12,y:0.5}}
      ],
      enemies:[ {type:'archer',x:0.3,y:0.3}, {type:'slime',x:0.7,y:0.7} ],
      chests:[ {x:0.5,y:0.75,loot:'potion'} ],
      npc:{x:0.5,y:0.2,text:'この先に主がいる。心してかかれ。'}
    },
    boss:{
      pillars:[{x:0.1,y:0.1,w:0.06,h:0.06},{x:0.84,y:0.1,w:0.06,h:0.06},{x:0.1,y:0.84,w:0.06,h:0.06},{x:0.84,y:0.84,w:0.06,h:0.06}],
      doors:[ {x:0.01,y:0.42,w:0.06,h:0.16,target:'gate',spawn:{x:0.88,y:0.5}} ],
      enemies:[],
      chests:[],
      npc:null,
      isBoss:true
    }
  };
  const ROOM_MINIMAP = {
    start:{x:0,y:1}, hall:{x:1,y:1}, vault:{x:1,y:0}, gate:{x:2,y:1}, boss:{x:3,y:1}
  };

  let roomStates={}, currentRoomId, currentRoom;

  function toPx(v,axis){ return axis==='x'? v*W : v*H; }
  function rectPx(r){ return { x:r.x*W, y:r.y*H, w:r.w*W, h:r.h*H }; }

  function buildRoomState(id){
    const t = ROOM_TEMPLATES[id];
    const state = {
      pillars: t.pillars.map(p=>rectPx(p)),
      doors: t.doors.map(d=>({ rectN:{x:d.x,y:d.y,w:d.w,h:d.h}, rect:rectPx(d), target:d.target, spawn:d.spawn, locked:!!d.locked, requiresKey:!!d.requiresKey })),
      enemies: t.enemies.map(e=>makeEnemy(e.type, e.x*W, e.y*H)),
      chests: t.chests.map(c=>({ x:c.x*W, y:c.y*H, loot:c.loot, opened:false, r:16 })),
      npc: t.npc ? { x:t.npc.x*W, y:t.npc.y*H, text:t.npc.text, r:14 } : null,
      isBoss: !!t.isBoss,
      boss: null,
      sealed:false,
      cleared:false,
      lastLockedMsg:0
    };
    if(t.isBoss){
      state.boss = makeBoss();
      state.sealed = true;
      state.doors.forEach(d=>{ d.locked=true; d._bossSeal=true; });
    }
    return state;
  }

  function enterRoom(id, spawnN){
    if(!roomStates[id]) roomStates[id]=buildRoomState(id);
    currentRoomId=id; currentRoom=roomStates[id];
    if(spawnN){ player.x=spawnN.x*W; player.y=spawnN.y*H; }
    player.invuln=Math.max(player.invuln,0.4);
  }

  // ---------------- entities ----------------
  function makeEnemy(type,x,y){
    if(type==='archer'){
      return { type,x,y,r:13,hp:6,maxHp:6,speed:70,dmg:1,fireCd:1+Math.random(),hitFlash:0 };
    }
    return { type,x,y,r:13,hp:8,maxHp:8,speed:95,dmg:1,hitFlash:0 };
  }
  function makeBoss(){
    return { x:0,y:0,r:34,hp:140,maxHp:140,phase:1,chargeCd:2.2,charging:0,telegraph:0,dir:{x:1,y:0},summonCd:5,speed:70,hitFlash:0 };
  }

  let player, arrows, particles, popups;
  let elapsed, running, gameOver, won, lastTime, shake;
  let pointer={x:0,y:0,active:false}, keys={};
  let toastT=0, npcMsgLock=false;
  let swingT=0, swingCd=0;

  function resetGame(){
    player={ x:0,y:0, r:14, hp:6, maxHp:6, speed:175, keys:0, swordLevel:1, invuln:1, dashCd:0, dashT:0, facing:{x:0,y:1} };
    arrows=[]; particles=[]; popups=[];
    elapsed=0; shake=0; swingT=0; swingCd=0;
    roomStates={};
    enterRoom('start', {x:0.15,y:0.5});
    updateHUD();
  }

  function updateHUD(){
    heartsEl.innerHTML='';
    const heartCount = Math.ceil(player.maxHp/2);
    for(let i=0;i<heartCount;i++){
      const val = player.hp - i*2;
      const frac = val>=2?1:(val===1?0.5:0);
      const d=document.createElement('div'); d.className='heart';
      d.innerHTML = heartSvg(frac, i);
      heartsEl.appendChild(d);
    }
    keyVal.textContent = player.keys;
    swordVal.textContent = 'Lv'+player.swordLevel;
    const m=Math.floor(elapsed/60), s=Math.floor(elapsed%60);
    timerBox.textContent = m+':'+(s<10?'0':'')+s;
  }
  function heartSvg(frac, idx){
    const col = frac>0 ? '#ff5c7a' : 'rgba(255,255,255,0.15)';
    const clipId = 'heartclip'+idx;
    if(frac===1){
      return '<svg viewBox="0 0 16 14"><path d="M8 13 L1.5 6.8 C-0.5 4.6 1 1 4.2 1 C6 1 7.3 2 8 3.2 C8.7 2 10 1 11.8 1 C15 1 16.5 4.6 14.5 6.8 Z" fill="'+col+'"/></svg>';
    } else if(frac===0.5){
      return '<svg viewBox="0 0 16 14"><path d="M8 13 L1.5 6.8 C-0.5 4.6 1 1 4.2 1 C6 1 7.3 2 8 3.2 C8.7 2 10 1 11.8 1 C15 1 16.5 4.6 14.5 6.8 Z" fill="rgba(255,255,255,0.15)"/><clipPath id="'+clipId+'"><rect x="0" y="0" width="8" height="14"/></clipPath><path clip-path="url(#'+clipId+')" d="M8 13 L1.5 6.8 C-0.5 4.6 1 1 4.2 1 C6 1 7.3 2 8 3.2 Z" fill="'+col+'"/></svg>';
    }
    return '<svg viewBox="0 0 16 14"><path d="M8 13 L1.5 6.8 C-0.5 4.6 1 1 4.2 1 C6 1 7.3 2 8 3.2 C8.7 2 10 1 11.8 1 C15 1 16.5 4.6 14.5 6.8 Z" fill="rgba(255,255,255,0.15)"/></svg>';
  }

  function showToast(text,dur){
    toastEl.textContent=text; toastEl.classList.add('show'); toastT=dur||1.8;
  }

  function dist2(ax,ay,bx,by){ const dx=ax-bx,dy=ay-by; return dx*dx+dy*dy; }
  function explode(x,y,color,n){
    for(let i=0;i<(n||8);i++){
      const a=Math.random()*Math.PI*2, sp=Math.random()*200+40;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.45+Math.random()*0.3,maxLife:0.75,color,size:Math.random()*2.6+1.2});
    }
  }
  function popup(x,y,text,color){ popups.push({x,y,text,color,life:0.7,maxLife:0.7,vy:-40}); }

  // ---------------- collision helpers ----------------
  function pushOutOfRect(entity, rect){
    const cx=Math.max(rect.x,Math.min(entity.x,rect.x+rect.w));
    const cy=Math.max(rect.y,Math.min(entity.y,rect.y+rect.h));
    const dx=entity.x-cx, dy=entity.y-cy;
    const d2=dx*dx+dy*dy;
    if(d2 < entity.r*entity.r){
      const d=Math.sqrt(d2)||0.01;
      const push = entity.r-d;
      entity.x += dx/d*push; entity.y += dy/d*push;
    }
  }
  function clampToRoom(entity){
    const pad=entity.r+8;
    entity.x=Math.max(pad,Math.min(W-pad,entity.x));
    entity.y=Math.max(pad,Math.min(H-pad,entity.y));
  }

  // ---------------- door / chest / npc interaction ----------------
  function overlapsRect(x,y,r,rect){
    return x+r>rect.x && x-r<rect.x+rect.w && y+r>rect.y && y-r<rect.y+rect.h;
  }

  function handleDoors(dt){
    for(const d of currentRoom.doors){
      if(overlapsRect(player.x,player.y,player.r,d.rect)){
        if(d.locked){
          if(d._bossSeal){
            currentRoom.lastLockedMsg-=dt;
            if(currentRoom.lastLockedMsg<=0){ showToast('主を倒すまで扉は開かない'); currentRoom.lastLockedMsg=1.6; sfx.locked(); }
            continue;
          }
          if(player.keys>0){
            player.keys--; d.locked=false;
            showToast('鍵を使って扉を開けた'); sfx.door(); updateHUD();
            enterRoom(d.target, d.spawn);
            return;
          } else {
            currentRoom.lastLockedMsg-=dt;
            if(currentRoom.lastLockedMsg<=0){ showToast('鍵が必要だ'); currentRoom.lastLockedMsg=1.6; sfx.locked(); }
          }
        } else {
          sfx.door();
          enterRoom(d.target, d.spawn);
          return;
        }
      }
    }
  }

  function handleChests(){
    for(const c of currentRoom.chests){
      if(c.opened) continue;
      if(dist2(player.x,player.y,c.x,c.y) < (c.r+player.r)*(c.r+player.r)){
        c.opened=true; sfx.chest(); explode(c.x,c.y,'gold',14);
        applyLoot(c.loot, c.x, c.y);
      }
    }
  }
  function applyLoot(loot,x,y){
    if(loot==='key'){ player.keys++; popup(x,y-20,'鍵を手に入れた','gold'); showToast('鍵を手に入れた'); }
    else if(loot==='heart'){ player.maxHp+=2; player.hp=player.maxHp; popup(x,y-20,'最大HP UP','heart'); showToast('ハートのかけらを見つけた！最大HPが増えた'); }
    else if(loot==='sword'){ player.swordLevel++; popup(x,y-20,'剣が輝いた','player'); showToast('武器を発見！剣の力が高まった (Lv'+player.swordLevel+')'); }
    else if(loot==='potion'){ player.hp=Math.min(player.maxHp,player.hp+4); popup(x,y-20,'HP回復','potion'); showToast('薬草を口にした。HPが回復した'); }
    updateHUD();
  }

  function handleNpc(dt){
    if(!currentRoom.npc) return;
    const n=currentRoom.npc;
    if(dist2(player.x,player.y,n.x,n.y) < 70*70){
      showToast(n.text, 0.3);
    }
  }

  // ---------------- combat ----------------
  function meleeSwing(dt){
    swingCd -= dt;
    if(swingT>0) swingT-=dt;
    const range = 88+player.swordLevel*5;
    let anyInRange=false;
    for(const e of currentRoom.enemies){ if(dist2(player.x,player.y,e.x,e.y) < range*range){ anyInRange=true; break; } }
    if(!anyInRange && currentRoom.boss && currentRoom.boss.hp>0){
      if(dist2(player.x,player.y,currentRoom.boss.x,currentRoom.boss.y) < range*range) anyInRange=true;
    }
    if(anyInRange && swingCd<=0){
      swingCd = Math.max(0.32, 0.6 - player.swordLevel*0.03);
      swingT = 0.18;
      sfx.swing();
      const dmg = 5+player.swordLevel*3;
      for(let i=currentRoom.enemies.length-1;i>=0;i--){
        const e=currentRoom.enemies[i];
        if(dist2(player.x,player.y,e.x,e.y) < range*range){
          e.hp -= dmg; e.hitFlash=0.15;
          popup(e.x,e.y-14,Math.round(dmg),'player');
          explode(e.x,e.y,'player',3);
          if(e.hp<=0){
            explode(e.x,e.y, e.type==='archer'?'archer':'slime', 12);
            sfx.kill();
            currentRoom.enemies.splice(i,1);
          } else sfx.hit();
        }
      }
      if(currentRoom.boss && currentRoom.boss.hp>0){
        const b=currentRoom.boss;
        if(dist2(player.x,player.y,b.x,b.y) < range*range){
          b.hp -= dmg; b.hitFlash=0.15;
          popup(b.x,b.y-30,Math.round(dmg),'player');
          sfx.hit();
        }
      }
    }
  }

  // ---------------- enemy AI ----------------
  function updateEnemies(dt){
    for(let i=currentRoom.enemies.length-1;i>=0;i--){
      const e=currentRoom.enemies[i];
      if(e.hitFlash>0) e.hitFlash-=dt;
      if(e.type==='slime'){
        const dx=player.x-e.x, dy=player.y-e.y, d=Math.hypot(dx,dy)||1;
        e.x += dx/d*e.speed*dt; e.y += dy/d*e.speed*dt;
        for(const p of currentRoom.pillars) pushOutOfRect(e,p);
        clampToRoom(e);
        if(d < e.r+player.r){ damagePlayer(e.dmg); }
      } else if(e.type==='archer'){
        const dx=player.x-e.x, dy=player.y-e.y, d=Math.hypot(dx,dy)||1;
        if(d<150){ e.x -= dx/d*e.speed*dt; e.y -= dy/d*e.speed*dt; }
        else if(d>240){ e.x += dx/d*e.speed*dt; e.y += dy/d*e.speed*dt; }
        for(const p of currentRoom.pillars) pushOutOfRect(e,p);
        clampToRoom(e);
        e.fireCd -= dt;
        if(e.fireCd<=0){
          e.fireCd = 1.7;
          const ndx=player.x-e.x, ndy=player.y-e.y, nd=Math.hypot(ndx,ndy)||1;
          arrows.push({x:e.x,y:e.y,vx:ndx/nd*260,vy:ndy/nd*260,r:4,life:2.5,dmg:1});
        }
      }
    }
  }

  function updateBoss(dt){
    const b=currentRoom.boss;
    if(!b || b.hp<=0) return;
    if(b.hitFlash>0) b.hitFlash-=dt;
    if(b.telegraph>0){
      b.telegraph-=dt;
      if(b.telegraph<=0){
        b.charging=0.45;
        const dx=player.x-b.x, dy=player.y-b.y, d=Math.hypot(dx,dy)||1;
        b.dir={x:dx/d,y:dy/d};
      }
    } else if(b.charging>0){
      b.charging-=dt;
      b.x += b.dir.x*420*dt; b.y += b.dir.y*420*dt;
      clampToRoom(b);
      if(dist2(player.x,player.y,b.x,b.y) < (b.r+player.r)*(b.r+player.r)){ damagePlayer(2); }
    } else {
      const dx=player.x-b.x, dy=player.y-b.y, d=Math.hypot(dx,dy)||1;
      b.x += dx/d*b.speed*dt; b.y += dy/d*b.speed*dt;
      clampToRoom(b);
      b.chargeCd -= dt;
      if(b.chargeCd<=0){ b.chargeCd = b.phase===2 ? 2.6 : 3.4; b.telegraph=0.7; }
      if(dist2(player.x,player.y,b.x,b.y) < (b.r+player.r)*(b.r+player.r)){ damagePlayer(1); }
    }
    if(b.hp < b.maxHp*0.5 && b.phase===1){
      b.phase=2; showToast('主が力を解き放った！'); shake=20;
    }
    if(b.phase===2){
      b.summonCd -= dt;
      if(b.summonCd<=0){
        b.summonCd=5.5;
        for(let i=0;i<2;i++){
          const ang=Math.random()*Math.PI*2;
          currentRoom.enemies.push(makeEnemy('slime', b.x+Math.cos(ang)*60, b.y+Math.sin(ang)*60));
        }
        showToast('雑魚が呼び出された');
      }
    }
    if(b.hp<=0){
      explode(b.x,b.y,'boss',60);
      shake=28; sfx.win();
      currentRoom.doors.forEach(d=>{ d._bossSeal=false; d.locked=false; });
      currentRoom.sealed=false;
      showToast('主を打ち倒した……扉が開いた');
      won=true;
      setTimeout(()=>{ if(running) endGame(true); }, 1400);
    }
  }

  function updateArrows(dt){
    for(let i=arrows.length-1;i>=0;i--){
      const a=arrows[i];
      a.life-=dt; a.x+=a.vx*dt; a.y+=a.vy*dt;
      if(a.life<=0 || a.x<-20||a.x>W+20||a.y<-20||a.y>H+20){ arrows.splice(i,1); continue; }
      if(dist2(a.x,a.y,player.x,player.y) < (a.r+player.r)*(a.r+player.r)){
        arrows.splice(i,1);
        damagePlayer(a.dmg);
      }
    }
  }

  function damagePlayer(n){
    if(player.invuln>0 || player.dashT>0) return;
    player.hp-=n; player.invuln=0.6; shake=Math.max(shake,12);
    flash.style.transition='none'; flash.style.opacity='0.4';
    requestAnimationFrame(()=>{ flash.style.transition='opacity 0.3s ease'; flash.style.opacity='0'; });
    sfx.hurt();
    updateHUD();
    if(player.hp<=0){ player.hp=0; updateHUD(); endGame(false); }
  }

  // ---------------- end / start ----------------
  function endGame(victory){
    running=false; gameOver=true;
    if(!victory) sfx.gameover();
    const m=Math.floor(elapsed/60), s=Math.floor(elapsed%60);
    if(victory){
      overlayMsg.textContent = '主を撃破！クリアタイム '+m+':'+(s<10?'0':'')+s+' / 剣Lv'+player.swordLevel;
      document.querySelector('#overlay h1').textContent='VICTORY';
    } else {
      overlayMsg.textContent = '生存時間 '+m+':'+(s<10?'0':'')+s+' / 剣Lv'+player.swordLevel+' / 鍵'+player.keys;
      document.querySelector('#overlay h1').textContent='YOU DIED';
    }
    startBtn.textContent='RETRY';
    overlay.classList.remove('hidden');
  }

  // ---------------- input ----------------
  function setPointer(cx,cy){ const r=canvas.getBoundingClientRect(); pointer.x=cx-r.left; pointer.y=cy-r.top; }
  canvas.addEventListener('pointerdown',(e)=>{ ensureAudio(); pointer.active=true; setPointer(e.clientX,e.clientY); });
  window.addEventListener('pointermove',(e)=>{ if(pointer.active) setPointer(e.clientX,e.clientY); });
  window.addEventListener('pointerup',()=>{ pointer.active=false; });
  window.addEventListener('keydown',(e)=>{
    keys[e.code]=true;
    if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='Space') tryDash();
  });
  window.addEventListener('keyup',(e)=>{ keys[e.code]=false; });

  function tryDash(){
    if(!running || player.dashCd>0) return;
    let dx=player.facing.x, dy=player.facing.y;
    const d=Math.hypot(dx,dy)||1;
    player.dashT=0.18; player.dashCd=1.8; player.invuln=Math.max(player.invuln,0.2);
    player._dashDir={x:dx/d,y:dy/d};
    sfx.dash();
    explode(player.x,player.y,'player',10);
  }
  dashBtn.addEventListener('pointerdown',(e)=>{ e.stopPropagation(); ensureAudio(); tryDash(); });

  startBtn.addEventListener('click',()=>{
    ensureAudio(); resize(); resetGame();
    running=true; gameOver=false; won=false;
    overlay.classList.add('hidden');
  });

  // ---------------- update/draw ----------------
  function update(dt){
    elapsed+=dt;
    if(player.invuln>0) player.invuln-=dt;
    if(player.dashCd>0) player.dashCd-=dt;
    dashFill.style.height = player.dashCd>0 ? (player.dashCd/1.8*100)+'%' : '0%';

    if(player.dashT>0){
      player.dashT-=dt;
      player.x += player._dashDir.x*620*dt;
      player.y += player._dashDir.y*620*dt;
    } else {
      let tx=player.x, ty=player.y;
      if(pointer.active){ tx=pointer.x; ty=pointer.y; }
      let kx=0,ky=0;
      if(keys['ArrowLeft']||keys['KeyA']) kx-=1;
      if(keys['ArrowRight']||keys['KeyD']) kx+=1;
      if(keys['ArrowUp']||keys['KeyW']) ky-=1;
      if(keys['ArrowDown']||keys['KeyS']) ky+=1;
      if(kx||ky){
        const d=Math.hypot(kx,ky)||1;
        player.x += (kx/d)*player.speed*dt; player.y += (ky/d)*player.speed*dt;
        player.facing={x:kx/d,y:ky/d};
      } else if(pointer.active){
        const dx=tx-player.x, dy=ty-player.y, d=Math.hypot(dx,dy);
        if(d>4){
          player.x += dx/d*Math.min(d,player.speed*dt); player.y += dy/d*Math.min(d,player.speed*dt);
          player.facing={x:dx/d,y:dy/d};
        }
      }
    }
    for(const p of currentRoom.pillars) pushOutOfRect(player,p);
    clampToRoom(player);

    meleeSwing(dt);
    updateEnemies(dt);
    if(currentRoom.isBoss) updateBoss(dt);
    updateArrows(dt);
    handleDoors(dt);
    handleChests();
    handleNpc(dt);

    particles.forEach(p=>{ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.94; p.vy*=0.94; });
    particles=particles.filter(p=>p.life>0);
    popups.forEach(p=>{ p.life-=dt; p.y+=p.vy*dt; });
    popups=popups.filter(p=>p.life>0);

    if(toastT>0){ toastT-=dt; if(toastT<=0) toastEl.classList.remove('show'); }
    if(shake>0) shake=Math.max(0,shake-dt*50);
    updateHUD();
  }

  function cv(name){ return getComputedStyle(document.documentElement).getPropertyValue('--'+name).trim(); }

  function drawRoom(){
    // floor
    ctx.fillStyle='#100a1c';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=cv('wallLine'); ctx.globalAlpha=0.25; ctx.lineWidth=1;
    const gs=40;
    for(let x=0;x<W;x+=gs){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0;y<H;y+=gs){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    ctx.globalAlpha=1;
    // border walls
    ctx.save();
    ctx.strokeStyle=cv('wall'); ctx.lineWidth=16; ctx.shadowColor=cv('torch'); ctx.shadowBlur=6;
    ctx.strokeRect(8,8,W-16,H-16);
    ctx.restore();
    // pillars
    currentRoom.pillars.forEach(p=>{
      ctx.save();
      ctx.fillStyle=cv('wall'); ctx.shadowColor=cv('torch'); ctx.shadowBlur=8;
      ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.restore();
    });
    // doors
    currentRoom.doors.forEach(d=>{
      ctx.save();
      const col = d.locked ? cv('boss') : cv('gold');
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=14; ctx.globalAlpha=0.85;
      ctx.fillRect(d.rect.x,d.rect.y,d.rect.w,d.rect.h);
      ctx.restore();
    });
    // chests
    currentRoom.chests.forEach(c=>{
      ctx.save();
      const col = c.opened ? 'rgba(255,255,255,0.15)' : cv('gold');
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur = c.opened?0:12;
      ctx.fillRect(c.x-14,c.y-10,28,20);
      ctx.restore();
    });
    // npc
    if(currentRoom.npc){
      ctx.save();
      ctx.fillStyle=cv('potion'); ctx.shadowColor=cv('potion'); ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(currentRoom.npc.x,currentRoom.npc.y,currentRoom.npc.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function drawEntities(){
    currentRoom.enemies.forEach(e=>{
      ctx.save();
      const baseCol = e.type==='archer'?cv('archer'):cv('slime');
      ctx.fillStyle = e.hitFlash>0 ? '#ffffff' : baseCol;
      ctx.shadowColor=baseCol; ctx.shadowBlur=10;
      if(e.type==='archer'){
        ctx.beginPath(); ctx.moveTo(e.x,e.y-e.r); ctx.lineTo(e.x+e.r,e.y+e.r); ctx.lineTo(e.x-e.r,e.y+e.r); ctx.closePath(); ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
      if(e.hp<e.maxHp){
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,3);
        ctx.fillStyle=cv('heart'); ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*Math.max(0,e.hp/e.maxHp),3);
        ctx.restore();
      }
    });

    if(currentRoom.boss && currentRoom.boss.hp>0){
      const b=currentRoom.boss;
      ctx.save();
      ctx.translate(b.x,b.y);
      ctx.fillStyle = b.hitFlash>0 ? '#ffffff' : cv('boss');
      ctx.shadowColor=cv('boss'); ctx.shadowBlur=22;
      ctx.beginPath();
      for(let i=0;i<8;i++){ const a=i/8*Math.PI*2; const rr= i%2===0?b.r:b.r*0.65; ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); }
      ctx.closePath(); ctx.fill();
      ctx.restore();
      if(b.telegraph>0){
        ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle=cv('boss'); ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(b.x,b.y,50+ (1-b.telegraph/0.7)*80,0,Math.PI*2); ctx.stroke(); ctx.restore();
      }
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(b.x-44,b.y-b.r-16,88,6);
      ctx.fillStyle=cv('boss'); ctx.fillRect(b.x-44,b.y-b.r-16,88*Math.max(0,b.hp/b.maxHp),6);
      ctx.restore();
    }

    arrows.forEach(a=>{
      ctx.save(); ctx.fillStyle=cv('archer'); ctx.shadowColor=cv('archer'); ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,Math.PI*2); ctx.fill(); ctx.restore();
    });

    particles.forEach(p=>{
      ctx.globalAlpha=Math.max(0,p.life/p.maxLife); ctx.fillStyle=cv(p.color);
      ctx.fillRect(p.x,p.y,p.size,p.size); ctx.globalAlpha=1;
    });

    // player
    ctx.save();
    const blink = player.invuln>0 && Math.floor(player.invuln*20)%2===0;
    ctx.globalAlpha = blink?0.4:1;
    ctx.translate(player.x,player.y);
    ctx.shadowColor=cv('player'); ctx.shadowBlur=16; ctx.fillStyle=cv('player');
    ctx.beginPath(); ctx.arc(0,0,player.r,0,Math.PI*2); ctx.fill();
    // facing indicator
    ctx.fillStyle='#0b0716';
    ctx.beginPath(); ctx.arc(player.facing.x*7,player.facing.y*7,3,0,Math.PI*2); ctx.fill();
    ctx.restore();

    if(swingT>0){
      ctx.save();
      ctx.globalAlpha = swingT/0.18*0.7;
      ctx.strokeStyle=cv('player'); ctx.lineWidth=3; ctx.shadowColor=cv('player'); ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(player.x,player.y,88+player.swordLevel*5,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    popups.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
      ctx.fillStyle=cv(p.color)||'#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillText(p.text,p.x,p.y);
      ctx.restore();
    });
  }

  function drawMinimap(){
    const cell=16, gap=4, ox=W-140, oy=14;
    ctx.save();
    ctx.globalAlpha=0.85;
    Object.keys(ROOM_MINIMAP).forEach(id=>{
      const pos=ROOM_MINIMAP[id];
      const x=ox+pos.x*(cell+gap), y=oy+pos.y*(cell+gap);
      const visited = !!roomStates[id];
      const isCurrent = id===currentRoomId;
      ctx.fillStyle = isCurrent ? cv('gold') : (visited ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.12)');
      ctx.shadowColor = isCurrent?cv('gold'):'transparent'; ctx.shadowBlur = isCurrent?10:0;
      ctx.fillRect(x,y,cell,cell);
    });
    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.save();
    if(shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
    drawRoom();
    drawEntities();
    ctx.restore();
    drawMinimap();
  }

  function loop(ts){
    if(!lastTime) lastTime=ts;
    let dt=(ts-lastTime)/1000; lastTime=ts;
    if(dt>0.05) dt=0.05;
    if(running) update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // idle preview state before start
  player={ x:0,y:0, r:14, hp:6, maxHp:6, speed:175, keys:0, swordLevel:1, invuln:1, dashCd:0, dashT:0, facing:{x:0,y:1} };
  arrows=[]; particles=[]; popups=[];
  roomStates={};
  currentRoomId='start';
  currentRoom=buildRoomState('start');
  player.x=0.15*W; player.y=0.5*H;

  requestAnimationFrame(loop);
})();
</script>
