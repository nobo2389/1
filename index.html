<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵とステージゲーム</title>
<style>
body{
 text-align:center;
 font-family:sans-serif;
 margin-top:50px;
}

#enemy{
 font-size:50px;
}

button{
 font-size:25px;
 padding:15px 30px;
}
</style>
</head>

<body>

<h1>冒険ゲーム</h1>

<h2>ステージ <span id="stage">1</span></h2>

<div id="enemy">👾</div>

<p>敵HP：<span id="hp">10</span></p>
<p>スコア：<span id="score">0</span></p>

<button onclick="attack()">攻撃！</button>

<script>

let stage = 1;
let hp = 10;
let score = 0;

function attack(){

 hp--;

 document.getElementById("hp").textContent = hp;

 if(hp <= 0){

   score += 10;

   document.getElementById("score").textContent = score;

   stage++;

   document.getElementById("stage").textContent = stage;

   hp = stage * 10;

   document.getElementById("hp").textContent = hp;

   alert("次のステージ！");

 }

}

</script>

</body>
</html>
