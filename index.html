<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ブロック崩し</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#000;
border:2px solid white;
touch-action:none;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
border-radius:10px;
}

</style>

</head>


<body>

<h1>🎮 ブロック崩し</h1>

<p>
スコア：
<span id="score">0</span>
</p>

<p>
残機：
<span id="life">3</span>
</p>


<canvas id="canvas" width="360" height="600"></canvas>

<br>

<button onclick="startGame()">
スタート
</button>


<button onclick="resetGame()">
リセット
</button>



<script>


const canvas=
document.getElementById("canvas");


const ctx=
canvas.getContext("2d");



let running=false;


let score=0;

let life=3;



// ボール

let ball={

x:180,

y:400,

size:8,

dx:4,

dy:-4

};




// パドル

let paddle={

x:140,

y:560,

width:80,

height:12

};





// ブロック

let blocks=[];



function createBlocks(){


blocks=[];


for(let row=0;row<5;row++){


for(let col=0;col<8;col++){


blocks.push({

x:10+col*43,

y:40+row*25,

w:38,

h:18,

alive:true

});


}

}


}






function draw(){



ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



// ボール

ctx.fillStyle="white";

ctx.beginPath();

ctx.arc(
ball.x,
ball.y,
ball.size,
0,
Math.PI*2
);

ctx.fill();



// パドル

ctx.fillStyle="cyan";

ctx.fillRect(
paddle.x,
paddle.y,
paddle.width,
paddle.height
);



// ブロック

for(let b of blocks){


if(b.alive){


ctx.fillStyle="red";


ctx.fillRect(
b.x,
b.y,
b.w,
b.h
);


}


}


}






function update(){


if(!running)
return;



ball.x+=ball.dx;

ball.y+=ball.dy;




// 壁

if(
ball.x<0 ||
ball.x>canvas.width
){

ball.dx*=-1;

}


if(ball.y<0){

ball.dy*=-1;

}





// パドル

if(

ball.y+ball.size>=paddle.y &&

ball.x>=paddle.x &&

ball.x<=paddle.x+paddle.width

){

ball.dy=-Math.abs(ball.dy);

}





// 落下

if(ball.y>canvas.height){


life--;


document.getElementById(
"life"
).innerText=life;



resetBall();



if(life<=0){


running=false;


alert("ゲームオーバー");


}


}






checkBlock();

draw();


requestAnimationFrame(update);



}





function checkBlock(){


for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x &&
ball.x<b.x+b.w &&

ball.y>b.y &&
ball.y<b.y+b.h

){


b.alive=false;


ball.dy*=-1;


score+=10;


document.getElementById(
"score"
).innerText=score;



}


}



}






function resetBall(){


ball.x=180;

ball.y=400;

ball.dx=4;

ball.dy=-4;


}







function startGame(){


if(!running){

running=true;

update();

}


}




function resetGame(){


score=0;

life=3;


document.getElementById(
"score"
).innerText=0;


document.getElementById(
"life"
).innerText=3;


resetBall();


createBlocks();


draw();


}





// マウス操作

canvas.addEventListener(
"mousemove",
function(e){


let rect=
canvas.getBoundingClientRect();


paddle.x=
e.clientX-
rect.left-
paddle.width/2;



});






// スマホ操作

canvas.addEventListener(
"touchmove",
function(e){


let rect=
canvas.getBoundingClientRect();


paddle.x=
e.touches[0].clientX-
rect.left-
paddle.width/2;



e.preventDefault();


},
{
passive:false
});






createBlocks();

draw();


</script>


</body>
</html>
