<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>冒険RPG</title>
<style>
body{
 text-align:center;
 font-family:sans-serif;
}
button{
 font-size:20px;
 margin:5px;
 padding:10px 20px;
}
#map{
 font-size:40px;
}
</style>
</head>

<body>

<h1>🗺️ 冒険RPG</h1>

<h2 id="place">🌱草原</h2>

<div id="map">🌲🌲🌱🌲🌲</div>

<p>
HP：<span id="hp">100</span><br>
攻撃力：<span id="atk">10</span><br>
レベル：<span id="lv">1</span><br>
経験値：<span id="exp">0</span><br>
お金：<span id="gold">0</span>G
</p>

<div id="enemy">
敵はいない
</div>

<p>敵HP：<span id="ehp">0</span></p>

<button onclick="move()">🚶進む</button>
<button onclick="attack()">⚔️攻撃</button>
<button onclick="magic()">🔥魔法</button>
<button onclick="heal()">💊回復</button>

<p id="log"></p>

<script>

let player={
hp:100,
atk:10,
lv:1,
exp:0,
gold:0
};

let place="🌱草原";
let enemyHP=0;

let monsters=["👾スライム","🐺オオカミ","🧟ゾンビ","🐉ドラゴン"];

function move(){

let r=Math.random();

if(r<0.7){

let monster=monsters[Math.floor(Math.random()*monsters.length)];

enemyHP=player.lv*50;

document.getElementById("enemy").textContent=monster+"が出現！";

document.getElementById("ehp").textContent=enemyHP;

}else{

place="🏰城";

document.getElementById("place").textContent=place;

log("城に到着した！");

}

}


function attack(){

if(enemyHP<=0)return;

let damage=player.atk+Math.floor(Math.random()*10);

enemyHP-=damage;

log("攻撃！"+damage+"ダメージ");

enemyAttack();

check();

}


function magic(){

if(enemyHP<=0)return;

enemyHP-=30;

log("🔥魔法攻撃！30ダメージ");

enemyAttack();

check();

}


function heal(){

player.hp+=30;

if(player.hp>100)player.hp=100;

update();

log("HPを回復した");

}


function enemyAttack(){

if(enemyHP<=0)return;

let d=Math.floor(Math.random()*15)+5;

player.hp-=d;

update();

}


function check(){

if(enemyHP<=0){

player.exp+=30;

player.gold+=50;

if(player.exp>=100){

player.lv++;
player.atk+=5;
player.exp=0;

log("レベルアップ！");

}

enemyHP=0;

document.getElementById("enemy").textContent=
"敵はいない";

document.getElementById("ehp").textContent=0;

update();

}

}


function update(){

hp.textContent=player.hp;
atk.textContent=player.atk;
lv.textContent=player.lv;
exp.textContent=player.exp;
gold.textContent=player.gold;

}


function log(t){

document.getElementById("log").textContent=t;

}

</script>

</body>
</html>
