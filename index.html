<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニRPG</title>
<style>
body{text-align:center;font-family:sans-serif}
button{font-size:18px;margin:5px;padding:10px}
.box{font-size:50px}
</style>
</head>

<body>

<h1>⚔️ ミニRPG ⚔️</h1>

<h2>ステージ <span id="stage">1</span></h2>

<div class="box" id="enemy">👾</div>

<p>勇者HP：<span id="hp">100</span></p>
<p>攻撃力：<span id="atk">10</span></p>
<p>レベル：<span id="lv">1</span></p>
<p>経験値：<span id="exp">0</span></p>
<p>お金：<span id="gold">0</span>G</p>
<p>敵HP：<span id="ehp">50</span></p>

<button onclick="attack()">⚔️攻撃</button>
<button onclick="magic()">🔥魔法</button>
<button onclick="heal()">💊回復</button>
<button onclick="save()">💾保存</button>

<p id="log"></p>

<script>

let p={
hp:100,
atk:10,
lv:1,
exp:0,
gold:0,
stage:1
};

let enemyHP=50;

let monsters=["👾","🐺","🧟","🐉"];


function enemy(){
document.getElementById("enemy").textContent=
monsters[Math.floor(Math.random()*monsters.length)];

enemyHP=p.stage*50;
document.getElementById("ehp").textContent=enemyHP;
}


function attack(){

let d=p.atk+Math.floor(Math.random()*10);
enemyHP-=d;

log("攻撃 "+d+"ダメージ");

turn();

check();

}


function magic(){

let d=30;

enemyHP-=d;

log("🔥魔法 "+d+"ダメージ");

turn();

check();

}


function heal(){

p.hp+=30;

if(p.hp>100)p.hp=100;

update();

log("HP回復");

turn();

}


function turn(){

if(enemyHP<=0)return;

let d=Math.floor(Math.random()*15)+5;

p.hp-=d;

update();

}


function check(){

if(enemyHP<=0){

p.exp+=30;
p.gold+=50;

if(p.exp>=100){

p.lv++;
p.atk+=5;
p.exp=0;

}

p.stage++;

enemy();

update();

log("敵を倒した！");

}

}


function save(){

localStorage.rpg=JSON.stringify(p);

log("保存しました");

}


function update(){

hp.textContent=p.hp;
atk.textContent=p.atk;
lv.textContent=p.lv;
exp.textContent=p.exp;
gold.textContent=p.gold;
stage.textContent=p.stage;
ehp.textContent=enemyHP;

}


function log(t){

document.getElementById("log").textContent=t;

}


enemy();

</script>

</body>
</html>
