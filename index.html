<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultimate Block Breaker</title>


<style>

body{

margin:0;

background:#111;

color:white;

font-family:sans-serif;

text-align:center;

}



canvas{

background:#000;

border:3px solid white;

touch-action:none;

}



button{

padding:10px 20px;

margin:5px;

font-size:18px;

border-radius:10px;

}



.panel{

margin:10px;

}


</style>


</head>


<body>


<h1>🎮 Ultimate Block Breaker</h1>



<div class="panel">

スコア：
<span id="score">0</span>

<br>

コイン：
<span id="coin">0</span>

<br>

ステージ：
<span id="stage">1</span>

<br>

HP：
<span id="hp">3</span>


</div>




<canvas id="canvas" width="360" height="600"></canvas>


<br>


<button onclick="startGame()">
開始
</button>


<button onclick="resetGame()">
リセット
</button>



<script>



const canvas=
document.getElementById("canvas");


const ctx=
canvas.getContext("2d");





let running=false;


let score=0;


let coin=0;


let stage=1;


let hp=3;



// ボール


let ball={


x:180,

y:400,

r:8,

dx:4,

dy:-4,


power:1


};




// パドル


let paddle={


x:140,

y:560,

w:80,

h:12,


level:1


};





// ブロック


let blocks=[];



function createBlocks(){


blocks=[];


let rows=
5+Math.floor(stage/2);



for(let y=0;y<rows;y++){


for(let x=0;x<8;x++){



blocks.push({

x:10+x*43,

y:40+y*25,

w:38,

h:18,

hp:1+Math.floor(stage/5),

type:
Math.random()<0.1?
"hard":
"normal",

alive:true


});


}


}



}







function draw(){



ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);





// ボール


ctx.fillStyle="white";


ctx.beginPath();


ctx.arc(
ball.x,
ball.y,
ball.r,
0,
Math.PI*2
);


ctx.fill();





// パドル


ctx.fillStyle="cyan";


ctx.fillRect(

paddle.x,

paddle.y,

paddle.w,

paddle.h

);






// ブロック


for(let b of blocks){



if(!b.alive)
continue;



ctx.fillStyle=
b.type==="hard"?
"orange":
"red";



ctx.fillRect(

b.x,

b.y,

b.w,

b.h

);



}



}







function update(){


if(!running)
return;



ball.x+=ball.dx;


ball.y+=ball.dy;





if(ball.x<0||ball.x>360)

ball.dx*=-1;



if(ball.y<0)

ball.dy*=-1;






// パドル判定


if(

ball.y+ball.r>=paddle.y&&

ball.x>=paddle.x&&

ball.x<=paddle.x+paddle.w

){


ball.dy=-Math.abs(ball.dy);



}




// 落下


if(ball.y>600){


hp--;


document.getElementById("hp").innerText=hp;


resetBall();



if(hp<=0){


running=false;


alert("ゲームオーバー");


}



}



hitBlock();



draw();



requestAnimationFrame(update);


}







function hitBlock(){



for(let b of blocks){


if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){



b.hp--;


ball.dy*=-1;



if(b.hp<=0){



b.alive=false;



score+=20;


coin+=5;



document.getElementById("score").innerText=score;


document.getElementById("coin").innerText=coin;



}



}



}



}// ============================
// Part2
// 強化・ショップ・アイテム
// ============================



let items=[];



let ballUpgrade=1;

let paddleUpgrade=1;





// ----------------------------
// 表示更新
// ----------------------------



function updateInfo(){


document.getElementById("score").innerText=
score;


document.getElementById("coin").innerText=
coin;


document.getElementById("stage").innerText=
stage;


document.getElementById("hp").innerText=
hp;


}






// ----------------------------
// ボール強化
// ----------------------------



function upgradeBall(){


let cost=
100*ballUpgrade;



if(coin>=cost){


coin-=cost;


ballUpgrade++;


ball.dx*=1.15;


ball.dy*=1.15;



alert(
"ボール強化 Lv"+
ballUpgrade
);



}else{


alert(
"コイン不足"
);


}


updateInfo();



}







// ----------------------------
// パドル強化
// ----------------------------



function upgradePaddle(){



let cost=
150*paddleUpgrade;



if(coin>=cost){


coin-=cost;


paddleUpgrade++;


paddle.w+=15;



alert(
"パドル強化 Lv"+
paddleUpgrade
);



}else{


alert(
"コイン不足"
);


}



updateInfo();


}








// ----------------------------
// アイテム生成
// ----------------------------



function dropItem(x,y){


if(Math.random()<0.25){


items.push({

x:x,

y:y,

type:
Math.floor(
Math.random()*3
)


});


}



}








// ----------------------------
// アイテム更新
// ----------------------------



function updateItems(){



for(
let i=items.length-1;
i>=0;
i--
){



let item=
items[i];



item.y+=3;




if(

item.y>=paddle.y&&

item.x>=paddle.x&&

item.x<=paddle.x+paddle.w

){



if(item.type===0){


// パドル拡大


paddle.w+=30;


setTimeout(()=>{

paddle.w-=30;


},5000);


}



if(item.type===1){


// 貫通力


ball.power++;


}



if(item.type===2){


// コイン


coin+=100;


}



items.splice(i,1);


}




if(item.y>600){


items.splice(i,1);


}



}



}







// ----------------------------
// アイテム描画
// ----------------------------



function drawItems(){



for(let item of items){



if(item.type===0)

ctx.fillStyle="yellow";


if(item.type===1)

ctx.fillStyle="lime";


if(item.type===2)

ctx.fillStyle="gold";



ctx.fillRect(

item.x,

item.y,

12,

12

);



}



}







// ----------------------------
// 描画拡張
// ----------------------------



let oldDraw2=draw;



draw=function(){



oldDraw2();


drawItems();


};







// ----------------------------
// ブロック破壊拡張
// ----------------------------



let oldHitBlock=hitBlock;



hitBlock=function(){



for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){



b.hp--;


ball.dy*=-1;



if(b.hp<=0){



b.alive=false;



score+=20*stage;


coin+=5*stage;



dropItem(
b.x,
b.y
);



updateInfo();


}



}



}




};








// ----------------------------
// ショップUI
// ----------------------------



let shop=document.createElement("div");


shop.innerHTML=

`

<h3>ショップ</h3>

<button onclick="upgradeBall()">
ボール強化
</button>

<button onclick="upgradePaddle()">
パドル強化
</button>

`;



document.body.insertBefore(
shop,
canvas
);






// ----------------------------
// 更新拡張
// ----------------------------



let oldUpdate2=update;



update=function(){



updateItems();


oldUpdate2();


};// ============================
// Part3
// ステージ・ボス・スキル
// ============================



let bossMode=false;


let bossHP=0;


let skillCool=0;



// ----------------------------
// ステージクリア判定
// ----------------------------



function checkStage(){



let remain=false;



for(let b of blocks){



if(b.alive){

remain=true;

break;

}



}



if(!remain){



stage++;



if(stage%5===0){


startBoss();



}else{


createBlocks();


}



document.getElementById(
"stage"
).innerText=stage;



resetBall();



}



}






// ----------------------------
// ボス生成
// ----------------------------



function startBoss(){



bossMode=true;


bossHP=
100+
stage*50;



blocks=[];



alert(
"ボス出現！ HP "+
bossHP
);



}




// ----------------------------
// ボス描画
// ----------------------------



function drawBoss(){



if(!bossMode)
return;



ctx.fillStyle="purple";


ctx.fillRect(

60,

80,

240,

40

);



ctx.fillStyle="white";


ctx.fillText(

"BOSS HP:"+bossHP,

120,

105

);



}






// 描画追加


let oldDraw3=draw;


draw=function(){


oldDraw3();


drawBoss();



};







// ----------------------------
// ボス判定
// ----------------------------



function bossHit(){



if(!bossMode)
return;



if(

ball.y<130&&

ball.x>60&&

ball.x<300

){



bossHP-=ball.power;


ball.dy*=-1;



if(bossHP<=0){



bossMode=false;



coin+=500;


score+=1000;



alert(
"ボス撃破！"
);



createBlocks();


}



}



}







// ----------------------------
// スキル
// ----------------------------



function skill(){



if(skillCool>0){


alert(
"クールタイム中"
);


return;


}




skillCool=10;



for(let b of blocks){



if(b.alive){


b.hp--;


if(b.hp<=0){


b.alive=false;


score+=50;


}


}



}



alert(
"全体攻撃！"
);



}





// ----------------------------
// クールタイム処理
// ----------------------------



setInterval(()=>{


if(skillCool>0)

skillCool--;



},1000);







// ----------------------------
// キーボード操作
// ----------------------------



document.addEventListener(

"keydown",

function(e){


if(e.code==="Space"){


skill();


}



});







// ----------------------------
// 判定拡張
// ----------------------------



let oldHitBlock3=hitBlock;



hitBlock=function(){


oldHitBlock3();


bossHit();


checkStage();


};







// ----------------------------
// ボールリセット
// ----------------------------



function resetBall(){



ball.x=180;

ball.y=400;


ball.dx=4;

ball.dy=-4;



}// ============================
// Part4
// セーブ・ロード・タイトル
// ============================



let gameStarted=false;



// ----------------------------
// セーブ
// ----------------------------



function saveData(){


let data={

score:score,

coin:coin,

stage:stage,

hp:hp,

ballUpgrade:ballUpgrade,

paddleUpgrade:paddleUpgrade,

paddleWidth:paddle.w

};



localStorage.setItem(

"ultimateBlockSave",

JSON.stringify(data)

);



}







// ----------------------------
// ロード
// ----------------------------



function loadData(){



let save=

localStorage.getItem(
"ultimateBlockSave"
);



if(!save)
return;



let data=
JSON.parse(save);



score=data.score||0;

coin=data.coin||0;

stage=data.stage||1;

hp=data.hp||3;


ballUpgrade=
data.ballUpgrade||1;


paddleUpgrade=
data.paddleUpgrade||1;


paddle.w=
data.paddleWidth||80;



updateInfo();


createBlocks();


draw();



}







// ----------------------------
// 自動保存
// ----------------------------



setInterval(function(){


saveData();


},30000);







// ----------------------------
// スタート画面
// ----------------------------



let title=

document.createElement("div");



title.innerHTML=

`

<h2>
Ultimate Block Breaker
</h2>

<p>
コインを集めて強化しよう
</p>

`;



document.body.insertBefore(

title,

canvas

);








// ----------------------------
// 開始処理強化
// ----------------------------



let oldStartGame=
startGame;



startGame=function(){



gameStarted=true;


oldStartGame();



};








// ----------------------------
// リセット強化
// ----------------------------



let oldResetGame=
resetGame;



resetGame=function(){



score=0;

coin=0;

stage=1;

hp=3;


ballUpgrade=1;

paddleUpgrade=1;


paddle.w=80;


items=[];


bossMode=false;


createBlocks();


resetBall();


updateInfo();


draw();


saveData();



};







// ----------------------------
// キャンバス内表示
// ----------------------------



function drawText(){



ctx.fillStyle="white";


ctx.font="16px sans-serif";


if(!running){



ctx.fillText(

"STARTボタンで開始",

90,

300

);



}



}




let oldDraw4=draw;



draw=function(){


oldDraw4();


drawText();


};







// ----------------------------
// 初期ロード
// ----------------------------



loadData();


updateInfo();


draw();// ============================
// Part5
// 最終調整・終了処理
// ============================



// ----------------------------
// ゲーム終了処理
// ----------------------------



function gameOver(){


running=false;



alert(

"ゲームオーバー\n"+
"スコア："+score

);



saveData();


}







// HP監視強化


let oldUpdate5=update;



update=function(){



if(hp<=0){


gameOver();


return;


}



oldUpdate5();



};








// ----------------------------
// クリア判定
// ----------------------------



function finalCheck(){



if(stage>=20){



running=false;



alert(

"🎉 完全クリア！\n"+
"最終スコア："+score

);



saveData();



}



}





setInterval(function(){



finalCheck();


},1000);






// ----------------------------
// 安全処理
// ----------------------------



setInterval(function(){



if(score<0)

score=0;


if(coin<0)

coin=0;


if(hp<0)

hp=0;



updateInfo();



},5000);







// ----------------------------
// 初期描画
// ----------------------------



makeBlocks();


updateInfo();


draw();



</script>


</body>

</html>
