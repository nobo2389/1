<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本格RPG</title>
<style>
body{
 text-align:center;
 font-family:sans-serif;
}
button{
 font-size:18px;
 margin:5px;
 padding:10px 20px;
}
.box{
 font-size:50px;
}
</style>
</head>

<body>

<h1>⚔️ 勇者の冒険 ⚔️</h1>

<h2 id="area">🌱草原</h2>

<div class="box" id="enemy">敵なし</div>

<p>
❤️ HP：<span id="hp">100</span><br>
⚔️ 攻撃：<span id="atk">10</span><br>
⭐ レベル：<span id="lv">1</span><br>
経験値：<span id="exp">0</span><br>
💰 お金：<span id="gold">0</span>G
</p>

<p>
敵HP：
<span id="enemyHp">0</span>
</p>

<button onclick="move()">🗺️移動</button>
<button onclick="attack()">⚔️攻撃</button>
<button onclick="magic()">🔥魔法</button>
<button onclick="heal()">💊回復</button>
<button onclick="equip()">🗡️装備</button>
<button onclick="item()">🎒アイテム</button>
<button onclick="friend()">👥仲間</button>
<button onclick="boss()">🐉ボス戦</button>
<button onclick="save()">💾セーブ</button>
<button onclick="load()">📂ロード</button><p id="log"></p>


<script>

let player={
hp:100,
atk:10,
lv:1,
exp:0,
gold:0
};

let enemyHp=0;
let weapon="木の剣";
let armor="布の服";
let potion=3;
let friends=["戦士"];
let areas=[
"🌱草原",
"🌲森",
"🪨洞窟",
"🏰城"
];

let monsters=[
"👾スライム",
"🐺オオカミ",
"🧟ゾンビ",
"🐉ドラゴン"
];


function move(){

let area=
areas[Math.floor(Math.random()*areas.length)];

document.getElementById("area").textContent=area;


if(Math.random()<0.8){

let enemy=
monsters[Math.floor(Math.random()*monsters.length)];

enemyHp=player.lv*50;

document.getElementById("enemy").textContent=enemy;

document.getElementById("enemyHp").textContent=enemyHp;

log("敵が現れた！");

}else{

document.getElementById("enemy").textContent="敵なし";

enemyHp=0;

log("安全な場所だ");

}

}


function attack(){

if(enemyHp<=0)return;

let damage=
player.atk+Math.floor(Math.random()*10);

enemyHp-=damage;

log("攻撃！"+damage+"ダメージ");

enemyTurn();

check();

}


function magic(){

if(enemyHp<=0)return;

enemyHp-=30;

log("🔥魔法攻撃！30ダメージ");

enemyTurn();

check();

}


function heal(){

player.hp+=30;

if(player.hp>100)
player.hp=100;

update();

log("HPを回復した");

}


function enemyTurn(){

if(enemyHp<=0)return;

let damage=
Math.floor(Math.random()*15)+5;

player.hp-=damage;

update();

}


function check(){

if(enemyHp<=0){

player.exp+=30;
player.gold+=50;


if(player.exp>=100){

player.lv++;
player.atk+=5;
player.exp=0;

log("レベルアップ！");

}


document.getElementById("enemy").textContent="敵なし";

document.getElementById("enemyHp").textContent=0;

update();

}

}


function update(){

hp.textContent=player.hp;
atk.textContent=player.atk;
lv.textContent=player.lv;
exp.textContent=player.exp;
gold.textContent=player.gold;

}


function log(t){

document.getElementById("log").textContent=t;

}
function equip(){

if(player.gold>=100){

player.gold-=100;
player.atk+=10;
weapon="鉄の剣";

log("鉄の剣を装備！攻撃力アップ");

}else{

log("お金が足りない");

}

update();

}


function item(){

if(potion>0){

potion--;
player.hp+=50;

if(player.hp>100)
player.hp=100;

log("回復薬を使った！");

update();

}else{

log("回復薬がない");

}

}


function friend(){

friends.push("魔法使い");

player.atk+=5;

log("魔法使いが仲間になった！");

update();

}
function boss(){

enemyHp=300;

document.getElementById("enemy").textContent="🐲魔王";

document.getElementById("enemyHp").textContent=enemyHp;

log("魔王が現れた！");

}


function save(){

localStorage.setItem(
"rpgSave",
JSON.stringify(player)
);

log("セーブしました");

}


function load(){

let data=localStorage.getItem("rpgSave");

if(data){

player=JSON.parse(data);

update();

log("ロードしました");

}else{

log("セーブデータなし");

}

}</script>

</body>
</html>
