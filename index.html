<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" 
  content="width=device-width">
<title>ULTRA BRICK</title>
<style>
  * { margin:0; padding:0; }
  body {
    background: #05050a;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #ui {
    width: 320px;
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
    letter-spacing: 1px;
  }
  canvas {
    background: #020205;
    border: 2px solid #ff0055;
    box-shadow: 0 0 20px #ff005544;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="sc">SCORE: 0</div>
  <div id="lv">LIVES: 3</div>
</div>
<canvas id="cv" 
  width="320" height="360"></canvas>

<script>
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");

let score = 0, lives = 3;
let gOver = false, gWin = false;

// 画面揺れ用
let skX = 0, skY = 0, skT = 0;

// パドル / レーザー
let pwd = 60, pX = 130, pH = 8;
let lzActive = false, lzs = [];

// マルチボール配列
let balls = [];
const bSpd = 5;

// ブロック
const row = 5, col = 5;
const bW = 52, bH = 14, bPd = 5;
const oTop = 40, oLeft = 20;
const clrs = [
  "#ff0055", "#ff00aa",
  "#00ff66", "#00f2fe", "#ffff00"
];

let bricks = [];
let pts = [], its = [];

// 1つのボールを生成する関数
function addBall(x, y, dx, dy) {
  balls.push({
    x: x, y: y, dx: dx, dy: dy, r: 4
  });
}

// 初期化
function init() {
  balls = [];
  addBall(160, 300, 3, -4);
  for(let c=0; c<col; c++) {
    bricks[c] = [];
    for(let r=0; r<row; r++) {
      bricks[c][r] = {
        x:0, y:0, st:1, c:clrs[r]
      };
    }
  }
}
init();

// パーティクル生成
function addPt(x, y, clr) {
  for(let i=0; i<8; i++) {
    pts.push({
      x:x, y:y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      a:1, c:clr
    });
  }
}

// アイテム（M=マルチ, L=レーザー）
function drop(x, y) {
  if(Math.random() < 0.5) {
    let t = Math.random() > 0.5 ? 
      'M' : 'L';
    its.push({
      x:x, y:y, t:t, r:7
    });
  }
}

// マウス＆タッチ操作
function move(x) {
  let r = cv.getBoundingClientRect();
  let mX = x - r.left;
  if(mX > 0 && mX < cv.width) {
    pX = mX - pwd/2;
  }
}
document.addEventListener(
  "mousemove", (e)=>move(e.clientX));
cv.addEventListener(
  "touchmove", (e)=>{
  move(e.touches[0].clientX);
  e.preventDefault();
}, {passive:false});

// 破壊時のエフェクト発動
function triggerHit(b, bX, bY) {
  b.st = 0;
  score += 10;
  document.getElementById("sc")
    .innerText = "SCORE: "+score;
  addPt(bX, bY, b.c);
  drop(b.x+bW/2, b.y+bH);
  skT = 8; // 画面を揺らす
  if(bricks.flat().every(bk=>bk.st===0)) {
    gWin = true;
  }
}

// 更新
function update() {
  if(gOver || gWin) return;

  // 画面揺れ減衰
  if(skT > 0) {
    skX = (Math.random()-0.5)*skT;
    skY = (Math.random()-0.5)*skT;
    skT--;
  } else {
    skX = 0; skY = 0;
  }

  // レーザー発射
  if(lzActive && Math.random()<0.15) {
    lzs.push({x: pX+4, y: cv.height-pH});
    lzs.push({x: pX+pwd-4, y: cv.height-pH});
  }
  for(let i=lzs.length-1; i>=0; i--) {
    lzs[i].y -= 6;
    if(lzs[i].y < 0) lzs.splice(i,1);
  }

  // ボールの移動と衝突
  for(let i=balls.length-1; i>=0; i--) {
    let b = balls[i];
    b.x += b.dx; b.y += b.dy;

    // 壁反射
    if(b.x+b.dx > cv.width-b.r || 
       b.x+b.dx < b.r) b.dx = -b.dx;
    if(b.y+b.dy < b.r) b.dy = -b.dy;
    
    // パドル反射
    else if(b.y+b.dy > cv.height-b.r-pH) {
      if(b.x > pX && b.x < pX+pwd) {
        let h = (b.x-(pX+pwd/2))/(pwd/2);
        b.dx = h * bSpd;
        b.dy = -Math.sqrt(bSpd*bSpd-b.dx*b.dx);
        if(Math.abs(b.dy)<2) b.dy = -2;
      }
      // 落下
      else if(b.y+b.dy > cv.height-b.r) {
        balls.splice(i, 1);
        continue;
      }
    }

    // ブロックとボールの衝突
    for(let c=0; c<col; c++) {
      for(let r=0; r<row; r++) {
        let bk = bricks[c][r];
        if(bk.st === 1) {
          if(b.x > bk.x && b.x < bk.x+bW &&
             b.y > bk.y && b.y < bk.y+bH) {
            b.dy = -b.dy;
            triggerHit(bk, b.x, b.y);
          }
        }
      }
    }
  }

  // ボールが全部消えたらミス
  if(balls.length === 0) {
    lives--;
    document.getElementById("lv")
      .innerText = "LIVES: "+lives;
    if(lives === 0) gOver = true;
    else addBall(160, 300, 3, -4);
  }

  // レーザーとブロックの衝突
  lzs.forEach((lz, lzIdx) => {
    for(let c=0; c<col; c++) {
      for(let r=0; r<row; r++) {
        let bk = bricks[c][r];
        if(bk.st === 1) {
          if(lz.x > bk.x && lz.x < bk.x+bW &&
             lz.y > bk.y && lz.y < bk.y+bH) {
            lzs.splice(lzIdx, 1);
            triggerHit(bk, lz.x, lz.y);
            return;
          }
        }
      }
    }
  });

  // パーティクル
  for(let i=pts.length-1; i>=0; i--) {
    let p = pts[i];
    p.x += p.vx; p.y += p.vy; p.a -= 0.04;
    if(p.a <= 0) pts.splice(i, 1);
  }

  // アイテム取得
  for(let i=its.length-1; i>=0; i--) {
    let it = its[i];
    it.y += 2;
    if(it.y >= cv.height-pH &&
       it.x > pX && it.x < pX+pwd) {
      if(it.t === 'M') {
        // ボールを2つ追加
        addBall(it.x, cv.height-40, -2, -4);
        addBall(it.x, cv.height-40, 2, -4);
      } else {
        // レーザーモード発動
        lzActive = true;
        setTimeout(()=>lzActive=false, 5000);
      }
      its.splice(i, 1);
      continue;
    }
    if(it.y > cv.height) its.splice(i,1);
  }
}

// 描画
function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);

  ctx.save();
  // 画面揺れを適用
  ctx.translate(skX, skY);

  // ブロック
  for(let c=0; c<col; c++) {
    for(let r=0; r<row; r++) {
      let b = bricks[c][r];
      if(b.st === 1) {
        b.x = c*(bW+bPd) + oLeft;
        b.y = r*(bH+bPd) + oTop;
        ctx.fillStyle = b.c;
        ctx.fillRect(b.x, b.y, bW, bH);
      }
    }
  }

  // パドル（レーザー中は色変化）
  ctx.fillStyle = lzActive ? "#ffff00" : "#ff0055";
  ctx.fillRect(pX, cv.height-pH, pwd, pH);

  // レーザー弾
  ctx.fillStyle = "#ffff00";
  lzs.forEach(lz => {
    ctx.fillRect(lz.x, lz.y, 2, 8);
  });

  // 複数ボール
  ctx.fillStyle = "#fff";
  balls.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
  });

  // 演出
  pts.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.a;
    ctx.fillStyle = p.c;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fill(); ctx.restore();
  });

  // アイテム
  its.forEach(it => {
    ctx.fillStyle = it.t === 'M' ? "#00ff66" : "#ffff00";
    ctx.font = "bold 12px sans-serif";
    ctx.fillText(it.t, it.x-4, it.y+4);
  });

  ctx.restore();

  // 終了画面
  if(gOver || gWin) {
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.font = "bold 24px monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = gOver ? "#ff0055" : "#00ff66";
    ctx.fillText(gOver ? "GAME OVER":"STAGE CLEAR", cv.width/2, 160);
    ctx.font = "12px monospace";
    ctx.fillStyle = "#fff";
    ctx.fillText("TAP TO RESTART", cv.width/2, 200);
  }
}

// リスタート
cv.addEventListener("click", () => {
  if(gOver || gWin) {
    score = 0; lives = 3;
    gOver = false; gWin = false;
    its = []; pts = []; lzs = []; lzActive = false;
    document.getElementById("sc").innerText = "SCORE: 0";
    document.getElementById("lv").innerText = "LIVES: 3";
    init();
  }
});

function loop() {
  update(); draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
