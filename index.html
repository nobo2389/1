<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultimate Block Breaker</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#000;
border:3px solid white;
touch-action:none;
max-width:95%;
}

button{
padding:10px 20px;
margin:5px;
font-size:18px;
border-radius:10px;
}

.panel{
font-size:18px;
}

</style>

</head>


<body>


<h1>🎮 Ultimate Block Breaker</h1>


<div class="panel">

スコア:
<span id="score">0</span>

<br>

コイン:
<span id="coin">0</span>

<br>

ステージ:
<span id="stage">1</span>

<br>

HP:
<span id="hp">3</span>

</div>


<canvas id="game" width="360" height="600"></canvas>


<br>


<button onclick="startGame()">
開始
</button>


<button onclick="resetGame()">
リセット
</button>



<script>


const canvas=
document.getElementById("game");


const ctx=
canvas.getContext("2d");



// ==================
// データ
// ==================


let data={


running:false,

score:0,

coin:0,

stage:1,

hp:3


};




// ==================
// ボール
// ==================


let ball={


x:180,

y:400,

r:8,

dx:4,

dy:-4


};




// ==================
// パドル
// ==================


let paddle={


x:140,

y:560,

w:80,

h:12


};




// ==================
// ブロック
// ==================


let blocks=[];




function createBlocks(){


blocks=[];


for(let y=0;y<5;y++){


for(let x=0;x<8;x++){


blocks.push({


x:10+x*43,

y:40+y*25,

w:38,

h:18,

hp:1,

alive:true


});


}


}


}






// ==================
// 描画
// ==================


function draw(){


ctx.clearRect(
0,
0,
360,
600
);



// ボール


ctx.fillStyle="white";


ctx.beginPath();


ctx.arc(

ball.x,

ball.y,

ball.r,

0,

Math.PI*2

);


ctx.fill();




// パドル


ctx.fillStyle="cyan";


ctx.fillRect(

paddle.x,

paddle.y,

paddle.w,

paddle.h

);




// ブロック


for(let b of blocks){


if(!b.alive)
continue;


ctx.fillStyle="red";


ctx.fillRect(

b.x,

b.y,

b.w,

b.h

);


}


}







// ==================
// 更新
// ==================


function loop(){



if(!data.running)
return;



ball.x+=ball.dx;

ball.y+=ball.dy;




// 壁


if(
ball.x<0 ||
ball.x>360
)

ball.dx*=-1;



if(ball.y<0)

ball.dy*=-1;





// パドル


if(

ball.y+ball.r>=paddle.y &&

ball.x>=paddle.x &&

ball.x<=paddle.x+paddle.w

){


ball.dy=-Math.abs(ball.dy);


}






// 落下


if(ball.y>600){


data.hp--;


document.getElementById("hp").innerText=
data.hp;



ball.x=180;

ball.y=400;



if(data.hp<=0){


data.running=false;


alert("GAME OVER");


}


}






// ブロック


for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x &&

ball.x<b.x+b.w &&

ball.y>b.y &&

ball.y<b.y+b.h

){



b.alive=false;


ball.dy*=-1;


data.score+=10;


data.coin+=1;



updateUI();


}



}




draw();


requestAnimationFrame(loop);


}







// ==================
// 操作
// ==================


canvas.addEventListener(

"touchmove",

function(e){


e.preventDefault();



let rect=

canvas.getBoundingClientRect();



let x=

e.touches[0].clientX-
rect.left;



paddle.x=

x-paddle.w/2;



},

{passive:false}



);





document.addEventListener(

"mousemove",

function(e){


let rect=

canvas.getBoundingClientRect();



paddle.x=

e.clientX-
rect.left-
paddle.w/2;



});







// ==================
// UI
// ==================


function updateUI(){


score.innerText=
data.score;


coin.innerText=
data.coin;


stage.innerText=
data.stage;


hp.innerText=
data.hp;


}






// ==================
// 開始
// ==================


function startGame(){


data.running=true;


createBlocks();


loop();


}







// ==================
// リセット
// ==================


function resetGame(){


data={


running:false,

score:0,

coin:0,

stage:1,

hp:3


};


ball.x=180;

ball.y=400;


createBlocks();


updateUI();


draw();


}





createBlocks();

draw();// ==================
// Part B
// アイテム・ショップ・強化
// ==================


// 強化

let upgrade={

ball:1,

paddle:1

};



// アイテム

let items=[];



// ==================
// アイテム生成
// ==================

function dropItem(x,y){


if(Math.random()<0.3){


items.push({

x:x,

y:y,

type:

Math.floor(Math.random()*3)

});


}


}




// ==================
// アイテム更新
// ==================

function updateItems(){


for(let i=items.length-1;i>=0;i--){


let item=items[i];


item.y+=3;



if(

item.y>=paddle.y &&

item.x>=paddle.x &&

item.x<=paddle.x+paddle.w

){



if(item.type===0){


// パドル拡大

paddle.w+=30;


setTimeout(()=>{

paddle.w-=30;

},5000);


}



if(item.type===1){


// ボール速度アップ

ball.dx*=1.2;

ball.dy*=1.2;


}



if(item.type===2){


// コイン

data.coin+=100;


}



items.splice(i,1);


}



if(item.y>600)

items.splice(i,1);



}


}






// ==================
// アイテム描画
// ==================


let oldDrawB=draw;



draw=function(){


oldDrawB();


for(let item of items){



if(item.type===0)

ctx.fillStyle="yellow";


if(item.type===1)

ctx.fillStyle="lime";


if(item.type===2)

ctx.fillStyle="gold";



ctx.fillRect(

item.x,

item.y,

12,

12

);



}


};







// ==================
// ブロック破壊拡張
// ==================


let oldLoopB=loop;



loop=function(){



if(!data.running)
return;



updateItems();



// ステージ確認


let remain=

blocks.some(

b=>b.alive

);



if(!remain){



data.stage++;


createBlocks();


ball.x=180;

ball.y=400;



alert(

"ステージ "+
data.stage

);



updateUI();


}



oldLoopB();



};








// ==================
// ショップ
// ==================


function upgradeBall(){


let cost=

100*upgrade.ball;



if(data.coin>=cost){


data.coin-=cost;


upgrade.ball++;


ball.dx*=1.15;

ball.dy*=1.15;



alert(

"ボール強化 Lv"+
upgrade.ball

);


}

else{


alert("コイン不足");


}


updateUI();


}






function upgradePaddle(){


let cost=

150*upgrade.paddle;



if(data.coin>=cost){


data.coin-=cost;


upgrade.paddle++;


paddle.w+=15;



alert(

"パドル強化 Lv"+
upgrade.paddle

);



}

else{


alert("コイン不足");


}


updateUI();


}







// ==================
// セーブ
// ==================


function saveGame(){



let save={


data:data,

upgrade:upgrade,

width:paddle.w


};



localStorage.setItem(

"UltimateBlock",

JSON.stringify(save)

);



alert("保存完了");


}





// ==================
// ロード
// ==================


function loadGame(){



let save=

localStorage.getItem(

"UltimateBlock"

);



if(!save){

alert("データなし");

return;

}



save=JSON.parse(save);



data=save.data;


upgrade=save.upgrade;


paddle.w=save.width;



updateUI();


draw();


}







// ==================
// ボタン追加
// ==================


let shop=document.createElement("div");


shop.innerHTML=

`

<h3>🛒ショップ</h3>


<button onclick="upgradeBall()">
ボール強化
</button>


<button onclick="upgradePaddle()">
パドル強化
</button>


<button onclick="saveGame()">
保存
</button>


<button onclick="loadGame()">
ロード
</button>

`;



document.body.appendChild(shop);// ==================
// Part C
// ボス・装備・スキル
// ==================


// ボス

let boss={

active:false,

hp:0,

max:0,

name:""

};




// 装備

let equipment={

name:"なし",

rarity:"N",

power:0

};




// スキル

let skillData={

cool:0,

level:1

};




// クエスト

let quest={

breakCount:0,

reward:500

};





// ==================
// ボス開始
// ==================


function startBoss(){


boss.active=true;


boss.max=

500*data.stage;


boss.hp=boss.max;


boss.name=

"巨大ブロックドラゴン";



blocks=[];



alert(

"👑ボス出現\nHP "+
boss.hp

);



}







// ==================
// ボス描画
// ==================


let oldDrawC=draw;


draw=function(){



oldDrawC();



if(boss.active){



ctx.fillStyle="purple";


ctx.fillRect(

50,

80,

260,

50

);



ctx.fillStyle="white";


ctx.fillText(

boss.name+
" HP:"+boss.hp,

80,

110

);



}



};








// ==================
// ボス判定
// ==================


function bossHit(){


if(!boss.active)
return;



if(

ball.y<140 &&

ball.x>50 &&

ball.x<310

){



boss.hp-=10;



ball.dy*=-1;



if(boss.hp<=0){



boss.active=false;


data.score+=1000;


data.coin+=500;



alert(

"🎉ボス撃破!"

);



createBlocks();


}



}


}






// ==================
// スキル
// ==================


function useSkill(){



if(skillData.cool>0){


alert(

"クールタイム中"

);


return;


}



skillData.cool=10;



for(let b of blocks){



b.alive=false;



}



data.score+=500;



alert(

"🔥全体攻撃!"

);



}




setInterval(()=>{


if(skillData.cool>0)

skillData.cool--;


},1000);







// ==================
// 装備作成
// ==================


function createEquipment(){



if(data.coin<1000){


alert("コイン不足");


return;


}



data.coin-=1000;



let list=[


["炎の球","R",50],


["雷撃球","SR",100],


["神秘球","UR",300]


];



let e=

list[

Math.floor(

Math.random()*list.length

)

];



equipment={


name:e[0],

rarity:e[1],

power:e[2]


};



ball.dx+=

equipment.power/100;


ball.dy-=

equipment.power/100;



alert(

"装備獲得\n"+
equipment.name+
"\n"+
equipment.rarity

);



}







// ==================
// クエスト
// ==================


function addQuest(){


quest.breakCount++;



if(

quest.breakCount>=100

){


data.coin+=quest.reward;


quest.breakCount=0;


alert(

"クエスト達成!"

);



}


}





// ブロック破壊後処理追加

let oldUpdateUIC=updateUI;


updateUI=function(){


oldUpdateUIC();


addQuest();


};






// ループ追加

let oldLoopC=loop;


loop=function(){



if(data.running){



bossHit();



}



oldLoopC();



};







// ボタン

let bossMenu=document.createElement("div");


bossMenu.innerHTML=

`

<h3>⚔ 戦闘</h3>


<button onclick="useSkill()">
スキル
</button>


<button onclick="createEquipment()">
装備作成
</button>


<button onclick="startBoss()">
ボス召喚
</button>

`;



document.body.appendChild(bossMenu);// ==================
// Part D
// 最終システム
// ==================


// タイトル

let titleData={

started:false,

time:0

};




// 実績

let achievement={

boss:0,

score:0,

stage:0

};




// ==================
// プレイ時間
// ==================

setInterval(()=>{

if(data.running)

titleData.time++;

},1000);






// ==================
// 実績更新
// ==================


function updateAchievement(){



if(data.score>10000)

achievement.score=1;



if(data.stage>=10)

achievement.stage=1;



}






// ==================
// タイトル表示
// ==================


function showTitle(){



let title=document.createElement("div");



title.innerHTML=

`

<h2>
🎮 Ultimate Block Breaker
</h2>


<p>
最強のブロック破壊ゲーム
</p>


`;



document.body.insertBefore(

title,

document.body.firstChild

);


}






// ==================
// エンディング
// ==================


function ending(){



if(data.stage<100){



alert(

"まだ冒険は続く..."

);



return;


}



alert(

`

🎉 COMPLETE 🎉


全ステージ制覇！


最終スコア:
${data.score}


`

);



}








// ==================
// 自動保存強化
// ==================


setInterval(()=>{


saveGame();


updateAchievement();


},30000);








// ==================
// 初期ロード
// ==================


showTitle();





// ==================
// キーボード
// ==================


document.addEventListener(

"keydown",

function(e){


if(e.code==="Space"){


useSkill();


}



if(e.code==="KeyB"){


startBoss();


}



});








// ==================
// 最終メニュー
// ==================


let finalMenu=document.createElement("div");


finalMenu.innerHTML=

`

<h3>🏆完成版メニュー</h3>


<button onclick="ending()">
エンディング
</button>


`;



document.body.appendChild(finalMenu);



</script>


</body>

</html>
