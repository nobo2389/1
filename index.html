<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultimate Block Breaker</title>

<style>

body{

margin:0;

background:#101018;

color:white;

font-family:sans-serif;

text-align:center;

}



canvas{

background:#000;

border:3px solid #fff;

touch-action:none;

}



button{

font-size:18px;

padding:10px 20px;

margin:5px;

border-radius:10px;

}



.panel{

font-size:18px;

}


</style>

</head>


<body>


<h1>⚡ Ultimate Block Breaker ⚡</h1>


<div class="panel">

Lv:
<span id="lv">1</span>

　

EXP:
<span id="exp">0</span>

<br>

Score:
<span id="score">0</span>

　

Coin:
<span id="coin">0</span>

<br>

Stage:
<span id="stage">1</span>

　

HP:
<span id="hp">3</span>

</div>



<canvas id="game" width="360" height="600"></canvas>


<br>


<button onclick="startGame()">
START
</button>


<button onclick="resetGame()">
RESET
</button>



<script>


const canvas=
document.getElementById("game");


const ctx=
canvas.getContext("2d");



// ========================
// プレイヤーデータ
// ========================


let player={


level:1,

exp:0,

coin:0,

score:0


};





let stage=1;


let hp=3;


let running=false;





// ========================
// ボール
// ========================


let ball={


x:180,

y:400,

r:8,

dx:4,

dy:-4,


power:1


};






// ========================
// パドル
// ========================


let paddle={


x:140,

y:560,

w:80,

h:12,


speed:6


};







// ========================
// ブロック
// ========================


let blocks=[];



function createStage(){


blocks=[];



let rows=
5+Math.floor(stage/3);



for(
let y=0;
y<rows;
y++
){



for(
let x=0;
x<8;
x++
){



blocks.push({

x:10+x*43,

y:40+y*25,

w:38,

h:18,


hp:
1+Math.floor(stage/10),


type:
Math.random()<0.1?
"hard":
"normal",


alive:true


});



}



}



}






// ========================
// 描画
// ========================



function draw(){


ctx.clearRect(
0,
0,
360,
600
);




// ボール


ctx.fillStyle="white";


ctx.beginPath();


ctx.arc(
ball.x,
ball.y,
ball.r,
0,
Math.PI*2
);


ctx.fill();




// パドル


ctx.fillStyle="cyan";


ctx.fillRect(

paddle.x,

paddle.y,

paddle.w,

paddle.h

);




// ブロック


for(let b of blocks){



if(!b.alive)
continue;



ctx.fillStyle=
b.type==="hard"?
"orange":
"red";



ctx.fillRect(

b.x,

b.y,

b.w,

b.h

);



}



}







// ========================
// 更新
// ========================



function update(){



if(!running)
return;



ball.x+=ball.dx;

ball.y+=ball.dy;





if(ball.x<0||ball.x>360)

ball.dx*=-1;



if(ball.y<0)

ball.dy*=-1;





// パドル


if(

ball.y+ball.r>=paddle.y&&

ball.x>=paddle.x&&

ball.x<=paddle.x+paddle.w

){


ball.dy=-Math.abs(ball.dy);


}





// 落下


if(ball.y>600){



hp--;


document.getElementById(
"hp"
).innerText=hp;



resetBall();



if(hp<=0){


running=false;


alert(
"GAME OVER"
);


}



}





hitBlock();



draw();



requestAnimationFrame(update);



}







// ========================
// ブロック判定
// ========================



function hitBlock(){



for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){



b.hp--;


ball.dy*=-1;



if(b.hp<=0){


b.alive=false;


player.score+=10;


gainExp(5);



updateUI();



}



}



}



checkClear();



}







// ========================
// EXP
// ========================



function gainExp(value){



player.exp+=value;



if(

player.exp>=

player.level*100

){


player.exp=0;


player.level++;


alert(
"LEVEL UP!"
);


}



}





function updateUI(){



document.getElementById(
"lv"
).innerText=
player.level;


document.getElementById(
"exp"
).innerText=
player.exp;


document.getElementById(
"score"
).innerText=
player.score;


document.getElementById(
"coin"
).innerText=
player.coin;


document.getElementById(
"stage"
).innerText=
stage;



}







// ========================
// 初期
// ========================



function resetBall(){


ball.x=180;

ball.y=400;

ball.dx=4;

ball.dy=-4;


}




function startGame(){


if(!running){


running=true;


update();


}



}




function resetGame(){


running=false;


stage=1;

hp=3;


player.score=0;


player.exp=0;


createStage();


resetBall();


updateUI();


draw();



}



createStage();

updateUI();

draw();// ========================
// Part2
// アイテム・装備・強化
// ========================



let items=[];


// 装備

let equipment={


ball:"normal",

paddle:"normal"


};



// 強化値

let upgrade={


power:1,

speed:1,

width:1


};







// ========================
// コイン取得
// ========================



function addCoin(value){


player.coin+=value;


updateUI();



}







// ========================
// アイテム生成
// ========================



function dropItem(x,y){



if(Math.random()<0.25){



items.push({

x:x,

y:y,

type:
Math.floor(Math.random()*5)


});



}



}








// ========================
// アイテム更新
// ========================



function updateItems(){



for(
let i=items.length-1;
i>=0;
i--
){



let item=items[i];


item.y+=3;






if(

item.y>=paddle.y&&

item.x>=paddle.x&&

item.x<=paddle.x+paddle.w

){



useItem(item.type);



items.splice(i,1);



}




if(item.y>600){


items.splice(i,1);


}



}



}







// ========================
// アイテム効果
// ========================



function useItem(type){



switch(type){



case 0:

// パドル拡大


paddle.w+=40;


setTimeout(()=>{

paddle.w-=40;


},8000);


break;




case 1:

// 攻撃力アップ


ball.power+=1;


break;




case 2:

// ボール速度


ball.dx*=1.2;

ball.dy*=1.2;


break;




case 3:

// コイン


addCoin(100);


break;




case 4:

// HP回復


hp++;


updateUI();


break;



}



}







// ========================
// アイテム描画
// ========================



function drawItems(){



for(let item of items){



let colors=[

"yellow",

"lime",

"cyan",

"gold",

"pink"

];



ctx.fillStyle=
colors[item.type];



ctx.fillRect(

item.x,

item.y,

14,

14

);



}



}








// 描画追加



let oldDraw=
draw;



draw=function(){


oldDraw();


drawItems();



};







// ========================
// ブロック破壊報酬追加
// ========================



let oldHitBlock=
hitBlock;



hitBlock=function(){



for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){



b.hp--;


ball.dy*=-1;



if(b.hp<=0){



b.alive=false;


player.score+=10;


addCoin(5+stage);



dropItem(

b.x,

b.y

);


gainExp(5);



updateUI();



}



}



}



checkClear();



};








// ========================
// 強化
// ========================



function upgradePower(){



let cost=
upgrade.power*100;



if(player.coin>=cost){



player.coin-=cost;


upgrade.power++;


ball.power++;



alert(
"攻撃力UP"
);



}



updateUI();



}







function upgradeSpeed(){



let cost=
upgrade.speed*150;



if(player.coin>=cost){



player.coin-=cost;


upgrade.speed++;



ball.dx*=1.1;

ball.dy*=1.1;



alert(
"速度UP"
);



}



updateUI();


}







function upgradeWidth(){



let cost=
upgrade.width*200;



if(player.coin>=cost){



player.coin-=cost;


upgrade.width++;


paddle.w+=10;



alert(
"パドルUP"
);



}



updateUI();


}






// ========================
// 更新追加
// ========================



let oldUpdate=
update;



update=function(){



updateItems();


oldUpdate();



};// ========================
// Part3
// ボス・ガチャ・レア装備
// ========================



let boss={


active:false,

hp:0,

maxHp:0,

level:0


};





// ========================
// ボス開始
// ========================



function startBoss(){


boss.active=true;


boss.level=stage;


boss.maxHp=
500+
stage*100;


boss.hp=
boss.maxHp;



blocks=[];



alert(
"⚠ BOSS 出現 HP:"+boss.hp
);



}






// ========================
// ボス描画
// ========================



function drawBoss(){



if(!boss.active)
return;



ctx.fillStyle="purple";


ctx.fillRect(

40,

80,

280,

50

);



ctx.fillStyle="white";


ctx.font="16px sans-serif";


ctx.fillText(

"BOSS HP "+boss.hp,

120,

110

);



}






let oldDrawBoss=
draw;



draw=function(){


oldDrawBoss();


drawBoss();



};








// ========================
// ボス攻撃判定
// ========================



function hitBoss(){



if(!boss.active)
return;



if(

ball.y<140&&

ball.x>40&&

ball.x<320

){



boss.hp-=ball.power;


ball.dy*=-1;



if(boss.hp<=0){



boss.active=false;


player.score+=1000;


addCoin(500);


gainExp(200);



alert(
"🎉 BOSS撃破！"
);



}



}



}








// ========================
// ステージ進行拡張
// ========================



let oldCheckClear=
checkClear;



checkClear=function(){



let remain=false;



for(let b of blocks){



if(b.alive){


remain=true;


break;


}



}



if(!remain){



stage++;


addCoin(
stage*50
);



if(stage%5===0){


startBoss();



}else{


createStage();



}



resetBall();



alert(

"STAGE "+
stage

);



}



};







// ========================
// ガチャ
// ========================



let rarity=[


"ノーマル",

"レア",

"スーパーレア",

"レジェンド"


];




function gacha(){



let cost=300;



if(player.coin<cost){



alert(
"コイン不足"
);



return;



}



player.coin-=cost;



let result=
Math.floor(
Math.random()*100
);



let item;



if(result<60){


item="ノーマル";


}

else if(result<85){


item="レア";


}

else if(result<98){


item="スーパーレア";


}

else{


item="レジェンド";


}




equipment.ball=item;



alert(

"🎁 ガチャ結果\n"+
item

);



updateUI();



}







// ========================
// UI追加
// ========================



let menu=
document.createElement("div");



menu.innerHTML=

`

<h3>強化メニュー</h3>

<button onclick="upgradePower()">
攻撃強化
</button>


<button onclick="upgradeSpeed()">
速度強化
</button>


<button onclick="upgradeWidth()">
幅強化
</button>


<button onclick="gacha()">
ガチャ(300)
</button>


`;



document.body.insertBefore(

menu,

canvas

);








// ========================
// 更新追加
// ========================



let oldUpdateBoss=
update;



update=function(){



if(boss.active){


hitBoss();


}



oldUpdateBoss();



};// ========================
// Part4
// セーブ・放置・実績
// ========================



let achievement={


breakCount:0,

bossCount:0,

playTime:0


};




// ========================
// セーブ
// ========================



function saveGame(){



let data={


player:player,

stage:stage,

hp:hp,

equipment:equipment,

upgrade:upgrade,

achievement:achievement,

time:Date.now()



};



localStorage.setItem(

"ultimateBreakerSave",

JSON.stringify(data)

);



}







// ========================
// ロード
// ========================



function loadGame(){



let data=
localStorage.getItem(

"ultimateBreakerSave"

);



if(!data)
return;



let d=
JSON.parse(data);



player=d.player||player;


stage=d.stage||1;


hp=d.hp||3;


equipment=d.equipment||equipment;


upgrade=d.upgrade||upgrade;


achievement=
d.achievement||
achievement;



updateUI();



}







// ========================
// 放置報酬
// ========================



function offlineReward(){



let last=
Number(
localStorage.getItem(
"lastLogin"
)

)||Date.now();



let now=
Date.now();



let sec=
Math.floor(
(now-last)/1000
);



let reward=
Math.min(
sec,
3600
);



if(reward>10){



player.coin+=reward;


alert(

"放置報酬\n"+
reward+
"コイン"

);



}



localStorage.setItem(

"lastLogin",

now

);



}








// ========================
// 実績
// ========================



function addBreak(){



achievement.breakCount++;



if(
achievement.breakCount===100
){



player.coin+=1000;



alert(

"実績解除\n100個破壊"

);



}



}






function addBoss(){



achievement.bossCount++;



if(
achievement.bossCount===10
){



player.coin+=5000;



alert(

"実績解除\nボス10体撃破"

);



}



}








// ========================
// ミッション
// ========================



let mission={


target:100,

reward:1000,

done:false


};





function checkMission(){



if(

achievement.breakCount>=
mission.target

&&
!mission.done

){



mission.done=true;


player.coin+=mission.reward;



alert(

"ミッション達成！"

);



}



}








// ========================
// ブロック破壊記録
// ========================



let oldGainExp=
gainExp;



gainExp=function(value){



oldGainExp(value);



achievement.breakCount++;


addBreak();


checkMission();



};








// ========================
// ボス撃破記録
// ========================



let oldBossEnd=
hitBoss;



hitBoss=function(){



let before=
boss.hp;



oldBossEnd();



if(

before>0&&
boss.hp<=0

){


achievement.bossCount++;


addBoss();



}



};







// ========================
// プレイ時間
// ========================



setInterval(function(){


achievement.playTime++;



},1000);







// ========================
// 自動保存
// ========================



setInterval(function(){


saveGame();



},30000);






loadGame();


offlineReward();// ========================
// Part5
// 最終処理
// ========================



// ========================
// タイトル表示
// ========================


let title=document.createElement("div");


title.innerHTML=

`

<h2>
⚡ Ultimate Block Breaker ⚡
</h2>

<p>
ステージ100を目指せ！
</p>

`;



document.body.insertBefore(

title,

canvas

);






// ========================
// ゲームオーバー強化
// ========================



function gameOver(){



running=false;



saveGame();



alert(

"GAME OVER\n"+
"Score:"+player.score

);



}







// ========================
// HP監視
// ========================



setInterval(function(){



if(hp<=0){


gameOver();



}



},1000);








// ========================
// 完全クリア
// ========================



function checkFinal(){



if(stage>=100){



running=false;



alert(

"🎉 完全クリア！\n"+
"伝説達成！"

);



player.coin+=100000;



saveGame();



}



}





setInterval(function(){


checkFinal();


},3000);







// ========================
// キーボード操作
// ========================



document.addEventListener(

"keydown",

function(e){



// 左

if(e.key==="ArrowLeft"){


paddle.x-=30;


}



// 右

if(e.key==="ArrowRight"){


paddle.x+=30;


}



});








// ========================
// 範囲制限
// ========================



setInterval(function(){



if(paddle.x<0)

paddle.x=0;



if(paddle.x+paddle.w>360)

paddle.x=
360-paddle.w;



},50);








// ========================
// 最終初期化
// ========================



createStage();


updateUI();


draw();





</script>


</body>


</html>
