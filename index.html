<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>NEON</title>
<style>
* { margin:0; padding:0; }
body { background:#0a0a16; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; color:#fff; font-family:sans-serif; }
#hud { width:360px; display:flex; justify-content:space-between; padding:5px; font-weight:bold; color:#0ff; }
canvas { background:#111125; border:2px solid #0ff; max-width:100vw; max-height:75vh; }
#ov { position:absolute; background:rgba(10,10,22,0.9); width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
button { padding:12px 30px; font-size:18px; background:#0ff; border:none; border-radius:20px; font-weight:bold; }
</style></head><body>
<div id="hud"><div id="sc">SCORE: 0</div><div id="lv">LIVES: ❤️❤️❤️</div></div>
<canvas id="cv" width="360" height="520"></canvas>
<div id="ov"><h1 id="ti" style="margin-bottom:20px;color:#0ff">NEON BREAK</h1><button onclick="st()">START</button></div>
<script>
const cv=document.getElementById("cv"),ctx=cv.getContext("2d"),ov=document.getElementById("ov"),ti=document.getElementById("ti"),sc=document.getElementById("sc"),lv=document.getElementById("lv");
let isP=false,score=0,lives=3,pw=80,ph=14,px=140,pt=0,pc="#0ff",balls=[],bricks=[],items=[],ptcs=[];
const clrs=["#f05","#f50","#fc0","#3f0","#0ff","#a0f"];
function init(){
  score=0;lives=3;balls=[];items=[];ptcs=[];pw=80;pc="#0ff";
  for(let c=0;c<6;c++){ bricks[c]=[]; for(let r=0;r<6;r++) bricks[c][r]={status:1,clr:clrs[r],it:Math.random()<0.25?(Math.random()<0.5?1:2):0}; }
  up();sp(180,450,3,-4);
}
function sp(x,y,dx,dy){ balls.push({x,y,dx,dy}); }
window.addEventListener("touchmove",(e)=>{
  e.preventDefault(); let r=cv.getBoundingClientRect(),t=e.touches[0].clientX-r.left;
  px=t*(360/r.width)-pw/2; px=Math.max(0,Math.min(360-pw,px));
},{passive:false});
function st(){ ov.style.display="none"; init(); if(!isP){isP=true; dr();} }
function up(){ sc.innerText="SCORE: "+score; lv.innerText="LIVES: "+"❤️".repeat(lives); }
function dr(){
  if(!isP)return; ctx.clearRect(0,0,360,520); if(pt>0&&--pt===0){pw=80;pc="#0ff";}
  let bk=0;
  for(let c=0;c<6;c++)for(let r=0;r<6;r++){
    let b=bricks[c][r],bx=c*56+15,by=r*24+40; if(!b.status)continue; bk++; b.x=bx;b.y=by;
    ctx.fillStyle=b.clr; ctx.fillRect(bx,by,50,18); if(b.it) {ctx.fillStyle="#fff";ctx.fillText("?",bx+22,by+12);}
  }
  if(!bk){ isP=false; ov.style.display="flex"; ti.innerHTML="🏆 CLEAR!"; return; }
  ctx.fillStyle=pc; ctx.fillRect(px,491,pw,ph);
  for(let i=balls.length-1;i>=0;i--){
    let b=balls[i]; if(b.x+b.dx>353||b.x+b.dx<7)b.dx=-b.dx; if(b.y+b.dy<7)b.dy=-b.dy;
    if(b.y+b.dy>=491&&b.y<=505&&b.x>px&&b.x<px+pw){ b.dx=8*((b.x-px)/pw-0.5); b.dy=-Math.abs(b.dy); }
    for(let c=0;c<6;c++)for(let r=0;r<6;r++){
      let bk=bricks[c][r]; if(bk.status&&b.x>bk.x&&b.x<bk.x+50&&b.y>bk.y&&b.y<bk.y+18){
        b.dy=-b.dy; bk.status=0; score+=10; up();
        for(let k=0;k<6;k++)ptcs.push({x:b.x,y:b.y,dx:(Math.random()-0.5)*4,dy:(Math.random()-0.5)*4,a:1,c:bk.clr});
        if(bk.it)items.push({x:bk.x+25,y:bk.y+9,t:bk.it});
      }
    }
    b.x+=b.dx; b.y+=b.dy; ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(b.x,b.y,7,0,Math.PI*2); ctx.fill();
    if(b.y>520)balls.splice(i,1);
  }
  if(!balls.length){ if(--lives===0){isP=false; ov.style.display="flex"; ti.innerHTML="💥 GAME OVER";}else{sp(180,450,2,-4);up();} }
  for(let i=items.length-1;i>=0;i--){
    let j=items[i]; j.y+=2; ctx.fillStyle=j.t===1?"#0ff":"#f0f"; ctx.font="14px sans-serif"; ctx.fillText(j.t===1?"↔️":"🔮",j.x,j.y);
    if(j.y>=480&&j.y<=505&&j.x>px&&j.x<px+pw){ if(j.t===1){pw=130;pc="#fc0";pt=400;}else{let bl=balls.length;for(let k=0;k<Math.min(bl,2);k++)sp(balls[k].x,balls[k].y,(Math.random()-0.5)*6,-4);} items.splice(i,1); continue; }
    if(j.y>520)items.splice(i,1);
  }
  for(let i=ptcs.length-1;i>=0;i--){
    let p=ptcs[i]; p.x+=p.dx; p.y+=p.dy; p.a-=0.03; if(p.a<=0){ptcs.splice(i,1);}else{ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,3,3);ctx.restore();}
  }
  requestAnimationFrame(dr);
}
</script></body></html>
