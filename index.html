<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" 
  content="width=device-width">
<title>SOUND BOSS</title>
<style>
  * { margin:0; padding:0; }
  body {
    background: #030307;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #ui {
    width: 320px;
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 12px;
  }
  canvas {
    background: #010103;
    border: 2px solid #00ffff;
    box-shadow: 0 0 20px #00ffff33;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="sc">SCORE: 0</div>
  <div id="bhp">BOSS HP: 100%</div>
</div>
<canvas id="cv" 
  width="320" height="400"></canvas>

<script>
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");

let score = 0, lives = 3;
let gOver = false, gWin = false;
let skT = 0, skX = 0, skY = 0;

// サウンド生成システム (Web Audio API)
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || 
      window.webkitAudioContext)();
  }
}

// 効果音を発音する関数
function playSound(freq, type, duration, endFreq = 0) {
  if (!audioCtx) return;
  try {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (endFreq > 0) {
      osc.frequency.exponentialRampToValueAtTime(
        endFreq, audioCtx.currentTime + duration
      );
    }
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
      0.01, audioCtx.currentTime + duration
    );
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// パドル / ミサイル / 敵の弾
let pwd = 60, pX = 130, pH = 8;
let hmActive = false, ms = [], eBs = [];

// ボス設定
let boss = {
  x: 60, y: 50, w: 200, h: 30,
  hp: 50, maxHp: 50, clr: "#ff0055",
  bTimer: 0
};

// ボール
let balls = [];
const bSpd = 5;

// 通常ブロック
const row = 3, col = 5;
const bW = 52, bH = 12, bPd = 5;
const oTop = 100, oLeft = 20;
let bricks = [];
let pts = [], its = [];

function addBall(x, y, dx, dy) {
  balls.push({x:x, y:y, dx:dx, dy:dy, r:4});
}

function init() {
  balls = []; eBs = []; ms = []; its = [];
  addBall(160, 340, 3, -4);
  boss.hp = boss.maxHp;
  for(let c=0; c<col; c++) {
    bricks[c] = [];
    for(let r=0; r<row; r++) {
      bricks[c][r] = {
        x:0, y:0, st:1, c:"#00f2fe"
      };
    }
  }
}
init();

function addPt(x, y, clr) {
  for(let i=0; i<6; i++) {
    pts.push({
      x:x, y:y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      a:1, c:clr
    });
  }
}

function drop(x, y) {
  if(Math.random() < 0.4) {
    let t = Math.random() > 0.5 ? 'M' : 'H';
    its.push({x:x, y:y, t:t, r:7});
  }
}

function move(x) {
  let r = cv.getBoundingClientRect();
  let mX = x - r.left;
  if(mX > 0 && mX < cv.width) pX = mX - pwd/2;
}

// 初回操作時に音声を有効化
function activateInput(clientX) {
  initAudio();
  move(clientX);
}

document.addEventListener("mousemove", (e)=>activateInput(e.clientX));
cv.addEventListener("touchmove", (e)=>{
  activateInput(e.touches.clientX); e.preventDefault();
}, {passive:false});

function hitBoss(dmg) {
  boss.hp -= dmg;
  skT = 10;
  // ボス被弾音 (低い爆発音)
  playSound(120, "sawtooth", 0.1, 40);
  if(boss.hp <= 0) {
    boss.hp = 0; gWin = true;
    // クリアファンファール
    setTimeout(()=>playSound(523, "square", 0.1), 0);
    setTimeout(()=>playSound(659, "square", 0.1), 150);
    setTimeout(()=>playSound(783, "square", 0.3), 300);
  }
  let pct = Math.floor((boss.hp/boss.maxHp)*100);
  document.getElementById("bhp").innerText = "BOSS HP: "+pct+"%";
}

function update() {
  if(gOver || gWin) return;

  if(skT > 0) {
    skX = (Math.random()-0.5)*skT;
    skY = (Math.random()-0.5)*skT;
    skT--;
  } else { skX = 0; skY = 0; }

  // ボスの行動（反撃弾）
  boss.bTimer++;
  if(boss.bTimer > 90) {
    eBs.push({x: boss.x+50, y: boss.y+30, vy: 3});
    eBs.push({x: boss.x+150, y: boss.y+30, vy: 3});
    boss.bTimer = 0;
    // ボス攻撃音
    playSound(180, "triangle", 0.05);
  }

  // 敵の弾の移動
  for(let i=eBs.length-1; i>=0; i--) {
    let eb = eBs[i]; eb.y += eb.vy;
    if(eb.y > cv.height) { eBs.splice(i,1); continue; }
    // パドルにヒット
    if(eb.y >= cv.height-pH && eb.x > pX && eb.x < pX+pwd) {
      eBs.splice(i,1); lives--;
      playSound(150, "sawtooth", 0.3); // ダメージ音
      if(lives <= 0) {
        gOver = true;
        playSound(300, "sawtooth", 0.5, 50); // ゲームオーバー音
      }
      continue;
    }
  }

  // ホーミングミサイル発射
  if(hmActive && Math.random()<0.1) {
    ms.push({x: pX+pwd/2, y: cv.height-pH});
    playSound(600, "triangle", 0.05, 900); // ミサイル発射音
  }
  for(let i=ms.length-1; i>=0; i--) {
    let m = ms[i];
    let tx = boss.x + boss.w/2, ty = boss.y + boss.h/2;
    let angle = Math.atan2(ty - m.y, tx - m.x);
    m.x += Math.cos(angle) * 5; m.y += Math.sin(angle) * 5;

    // ボスとの衝突
    if(m.x > boss.x && m.x < boss.x+boss.w && m.y > boss.y && m.y < boss.y+boss.h) {
      addPt(m.x, m.y, "#ffff00"); hitBoss(1); ms.splice(i,1);
    }
  }

  // ボール移動と判定
  for(let i=balls.length-1; i>=0; i--) {
    let b = balls[i]; b.x += b.dx; b.y += b.dy;

    if(b.x+b.dx > cv.width-b.r || b.x+b.dx < b.r) {
      b.dx = -b.dx; playSound(400, "sine", 0.05); // 壁反射音
    }
    if(b.y+b.dy < b.r) {
      b.dy = -b.dy; playSound(400, "sine", 0.05);
    }
    else if(b.y+b.dy > cv.height-b.r-pH) {
      if(b.x > pX && b.x < pX+pwd) {
        let h = (b.x-(pX+pwd/2))/(pwd/2);
        b.dx = h * bSpd; b.dy = -Math.sqrt(bSpd*bSpd-b.dx*b.dx);
        if(Math.abs(b.dy)<2) b.dy = -2;
        playSound(450, "sine", 0.08, 600); // パドル反射音
      }
      else if(b.y+b.dy > cv.height-b.r) { 
        balls.splice(i, 1); 
        playSound(200, "sine", 0.1); // ボール落下音
        continue; 
      }
    }

    // ボスとボールの衝突
    if(boss.hp > 0 && b.x > boss.x && b.x < boss.x+boss.w && b.y > boss.y && b.y < boss.y+boss.h) {
      b.dy = -b.dy; addPt(b.x, b.y, boss.clr); hitBoss(2);
    }

    // ブロックとボールの衝突
    for(let c=0; c<col; c++) {
      for(let r=0; r<row; r++) {
        let bk = bricks[c][r];
        if(bk.st === 1) {
          if(b.x > bk.x && b.x < bk.x+bW && b.y > bk.y && b.y < bk.y+bH) {
            b.dy = -b.dy; bk.st = 0; score += 10;
            document.getElementById("sc").innerText = "SCORE: "+score;
            addPt(b.x, b.y, bk.c); drop(b.x+bW/2, b.y+bH);
            playSound(300, "square", 0.08, 800); // ブロック破壊音
          }
        }
      }
    }
  }

  if(balls.length === 0) {
    lives--; 
    playSound(150, "sawtooth", 0.3);
    if(lives <= 0) {
      gOver = true;
      playSound(300, "sawtooth", 0.5, 50);
    } else {
      addBall(160, 340, 3, -4);
    }
  }

  // エフェクト＆アイテム
  for(let i=pts.length-1; i>=0; i--) {
    let p = pts[i]; p.x += p.vx; p.y += p.vy; p.a -= 0.04;
    if(p.a <= 0) pts.splice(i, 1);
  }
  for(let i=its.length-1; i>=0; i--) {
    let it = its[i]; it.y += 2;
    if(it.y >= cv.height-pH && it.x > pX && it.x < pX+pwd) {
      // アイテム取得音 (ピコピーン！)
      playSound(500, "square", 0.05, 1000);
      if(it.t === 'M') { addBall(it.x, 340, -2, -4); addBall(it.x, 340, 2, -4); } 
      else { hmActive = true; setTimeout(()=>hmActive=false, 6000); }
      its.splice(i, 1); continue;
    }
    if(it.y > cv.height) its.splice(i,1);
  }
}

function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.save(); ctx.translate(skX, skY);

  // ボス描画
  if(boss.hp > 0) {
    ctx.fillStyle = boss.clr; ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
    ctx.fillStyle = "#fff"; ctx.font = "bold 10px sans-serif";
    ctx.fillText("MASTER CORE", boss.x+65, boss.y+18);
  }

  // ブロック
  for(let c=0; c<col; c++) {
    for(let r=0; r<row; r++) {
      let b = bricks[c][r];
      if(b.st === 1) {
        b.x = c*(bW+bPd) + oLeft; b.y = r*(bH+bPd) + oTop;
        ctx.fillStyle = b.c; ctx.fillRect(b.x, b.y, bW, bH);
      }
    }
  }

  // 自機 / 敵弾 / ミサイル
  ctx.fillStyle = "#00ffff"; ctx.fillRect(pX, cv.height-pH, pwd, pH);
  ctx.fillStyle = "#ff5500"; eBs.forEach(eb => ctx.fillRect(eb.x, eb.y, 4, 8));
  ctx.fillStyle = "#ffff00"; ms.forEach(m => ctx.fillRect(m.x, m.y, 3, 6));

  // ボール / 演出 / アイテム
  ctx.fillStyle = "#fff"; balls.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });
  pts.forEach(p => { ctx.save(); ctx.globalAlpha = p.a; ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill(); ctx.restore(); });
  its.forEach(it => { ctx.fillStyle = it.t === 'M' ? "#00ff66" : "#ffff00"; ctx.font = "bold 11px sans-serif"; ctx.fillText(it.t, it.x-4, it.y+4); });

  ctx.restore();

  if(gOver || gWin) {
    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.font = "bold 24px monospace"; ctx.textAlign = "center";
    ctx.fillStyle = gOver ? "#ff0055" : "#00ff66";
    ctx.fillText(gOver ? "GAME OVER":"BOSS DESTROYED", cv.width/2, 180);
    ctx.font = "12px monospace"; ctx.fillStyle = "#fff"; ctx.fillText("TAP TO RESTART", cv.width/2, 220);
  }
}

cv.addEventListener("click", () => {
  initAudio();
  if(gOver || gWin) {
    score = 0; lives = 3; gOver = false; gWin = false; hmActive = false;
    document.getElementById("sc").innerText = "SCORE: 0";
    document.getElementById("bhp").innerText = "BOSS HP: 100%";
    init();
  }
});

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
