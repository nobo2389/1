
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON DASH</title>
<style>
  :root{
    --bg-top:#0a0e27;
    --bg-bot:#050611;
    --grid:#1e2a5e;
    --cyan:#5eead4;
    --magenta:#f472b6;
    --amber:#fbbf24;
    --text:#e2e8f0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:radial-gradient(ellipse at 50% 0%, var(--bg-top), var(--bg-bot) 70%);
    font-family:'Courier New', ui-monospace, monospace;
    color:var(--text);
    touch-action:none;
    user-select:none;
  }
  #wrap{
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas{
    display:block;
    background:transparent;
    max-width:100vw; max-height:100vh;
  }
  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:18px 22px;
    pointer-events:none;
    z-index:5;
  }
  .label{
    font-size:11px; letter-spacing:3px; opacity:0.55; margin-bottom:2px;
  }
  .score{
    font-size:28px; font-weight:bold; color:var(--cyan);
    text-shadow:0 0 12px rgba(94,234,212,0.6);
  }
  .best{
    text-align:right;
  }
  .best .score{ color:var(--magenta); text-shadow:0 0 12px rgba(244,114,182,0.6); font-size:20px;}

  #overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; z-index:10;
    background:radial-gradient(ellipse at 50% 40%, rgba(10,14,39,0.4), rgba(5,6,17,0.85));
    padding:20px;
  }
  #overlay h1{
    font-size:clamp(32px, 9vw, 56px);
    margin:0 0 6px 0;
    letter-spacing:6px;
    background:linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(94,234,212,0.35);
  }
  #overlay p{
    font-size:13px; letter-spacing:2px; opacity:0.6; margin:0 0 26px 0;
  }
  #overlay .msg{
    font-size:15px; opacity:0.85; margin-bottom:10px; letter-spacing:1px;
  }
  .btn{
    font-family:inherit;
    font-size:15px; letter-spacing:3px;
    padding:14px 34px;
    background:transparent;
    border:2px solid var(--cyan);
    color:var(--cyan);
    border-radius:2px;
    cursor:pointer;
    box-shadow:0 0 18px rgba(94,234,212,0.25);
    transition:transform 0.1s ease, box-shadow 0.2s ease;
  }
  .btn:active{ transform:scale(0.96); box-shadow:0 0 28px rgba(94,234,212,0.55);}
  #overlay.hidden{ display:none; }
  #flash{
    position:absolute; inset:0; background:var(--magenta); opacity:0;
    pointer-events:none; z-index:8;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>
      <div class="label">SCORE</div>
      <div class="score" id="scoreVal">0</div>
    </div>
    <div class="best">
      <div class="label">BEST</div>
      <div class="score" id="bestVal">0</div>
    </div>
  </div>
  <canvas id="game"></canvas>
  <div id="flash"></div>
  <div id="overlay">
    <h1>NEON DASH</h1>
    <p>タップ / スペースキー でジャンプ</p>
    <div class="msg" id="overlayMsg">障害物を避けて走り続けろ</div>
    <button class="btn" id="startBtn">START</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const startBtn = document.getElementById('startBtn');
  const scoreVal = document.getElementById('scoreVal');
  const bestVal = document.getElementById('bestVal');
  const flash = document.getElementById('flash');

  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W, H, groundY;

  function resize(){
    const wrapRect = document.getElementById('wrap').getBoundingClientRect();
    W = wrapRect.width;
    H = wrapRect.height;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    groundY = H * 0.72;
  }
  window.addEventListener('resize', resize);
  resize();

  let best = 0;
  try { best = parseInt(localStorage.getItem('neonDashBest')||'0',10) || 0; } catch(e) { best = 0; }
  bestVal.textContent = best;

  const GRAV = 2200;
  const JUMP_V = -820;
  const player = { x:0, y:0, w:34, h:34, vy:0, onGround:true, rot:0 };

  let obstacles = [];
  let particles = [];
  let bgOffset = 0;
  let speed = 380;
  let baseSpeed = 380;
  let spawnTimer = 0;
  let spawnGap = 1.1;
  let score = 0;
  let running = false;
  let gameOver = false;
  let elapsed = 0;
  let lastTime = 0;
  let shake = 0;

  function resetGame(){
    player.x = W * 0.18;
    player.y = groundY - player.h;
    player.vy = 0;
    player.onGround = true;
    player.rot = 0;
    obstacles = [];
    particles = [];
    speed = baseSpeed;
    spawnTimer = 0;
    spawnGap = 1.15;
    score = 0;
    elapsed = 0;
    shake = 0;
    scoreVal.textContent = '0';
  }

  function jump(){
    if(!running){ return; }
    if(player.onGround){
      player.vy = JUMP_V;
      player.onGround = false;
      for(let i=0;i<8;i++){
        particles.push({
          x:player.x+player.w/2, y:player.y+player.h,
          vx:(Math.random()-0.5)*140, vy:Math.random()*60+20,
          life:0.4, maxLife:0.4, color:'cyan'
        });
      }
    }
  }

  function spawnObstacle(){
    const types = ['block','tall','floating'];
    const type = types[Math.floor(Math.random()*types.length)];
    if(type === 'block'){
      const h = 30 + Math.random()*20;
      obstacles.push({x:W+20, y:groundY-h, w:22, h:h, type, color:'magenta'});
    } else if(type === 'tall'){
      const h = 60 + Math.random()*20;
      obstacles.push({x:W+20, y:groundY-h, w:18, h:h, type, color:'amber'});
    } else {
      const h = 22;
      const fy = groundY - 90 - Math.random()*40;
      obstacles.push({x:W+20, y:fy, w:34, h:h, type, color:'cyan'});
    }
  }

  function rectsOverlap(a,b){
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function endGame(){
    running = false;
    gameOver = true;
    shake = 14;
    flash.style.transition = 'none';
    flash.style.opacity = '0.5';
    requestAnimationFrame(()=>{
      flash.style.transition = 'opacity 0.4s ease';
      flash.style.opacity = '0';
    });
    const finalScore = Math.floor(score);
    if(finalScore > best){
      best = finalScore;
      bestVal.textContent = best;
      try{ localStorage.setItem('neonDashBest', String(best)); }catch(e){}
      overlayMsg.textContent = 'NEW BEST ' + finalScore + ' !!';
    } else {
      overlayMsg.textContent = 'SCORE ' + finalScore + '  もう一度挑戦しよう';
    }
    document.getElementById('overlay').querySelector('h1').textContent = 'GAME OVER';
    startBtn.textContent = 'RETRY';
    overlay.classList.remove('hidden');
  }

  function update(dt){
    elapsed += dt;
    score += dt * 12 * (speed/baseSpeed);
    scoreVal.textContent = Math.floor(score);
    speed = baseSpeed + elapsed*14;

    player.vy += GRAV*dt;
    player.y += player.vy*dt;
    if(player.y + player.h >= groundY){
      player.y = groundY - player.h;
      player.vy = 0;
      if(!player.onGround){
        for(let i=0;i<6;i++){
          particles.push({
            x:player.x+player.w/2, y:groundY,
            vx:(Math.random()-0.5)*100, vy:-Math.random()*40,
            life:0.3, maxLife:0.3, color:'cyan'
          });
        }
      }
      player.onGround = true;
    }
    player.rot = player.onGround ? 0 : Math.min(0.6, player.rot + dt*4);

    spawnTimer += dt;
    if(spawnTimer > spawnGap){
      spawnTimer = 0;
      spawnGap = Math.max(0.55, 1.15 - elapsed*0.01) + Math.random()*0.4;
      spawnObstacle();
    }

    const pBox = {x:player.x+6, y:player.y+6, w:player.w-12, h:player.h-12};
    for(let i=obstacles.length-1;i>=0;i--){
      const o = obstacles[i];
      o.x -= speed*dt;
      if(o.x + o.w < -20){ obstacles.splice(i,1); continue; }
      if(rectsOverlap(pBox, o)){
        endGame();
      }
    }

    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life -= dt;
      p.x += p.vx*dt;
      p.y += p.vy*dt;
      p.vy += 300*dt;
      if(p.life <= 0) particles.splice(i,1);
    }

    bgOffset -= speed*dt*0.5;
    if(shake > 0) shake = Math.max(0, shake - dt*40);
  }

  function colorVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue('--'+name).trim();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    ctx.save();
    if(shake > 0){
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }

    // horizon glow
    const grad = ctx.createLinearGradient(0, groundY-140, 0, groundY);
    grad.addColorStop(0, 'rgba(94,234,212,0)');
    grad.addColorStop(1, 'rgba(94,234,212,0.08)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, groundY-140, W, 140);

    // ground line
    ctx.strokeStyle = colorVar('cyan');
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // scrolling grid ticks
    ctx.strokeStyle = colorVar('grid');
    ctx.lineWidth = 1;
    const gap = 40;
    let start = bgOffset % gap;
    for(let x = start; x < W; x += gap){
      ctx.beginPath();
      ctx.moveTo(x, groundY);
      ctx.lineTo(x - 18, H);
      ctx.stroke();
    }

    // obstacles
    obstacles.forEach(o=>{
      ctx.save();
      ctx.shadowColor = colorVar(o.color);
      ctx.shadowBlur = 14;
      ctx.fillStyle = colorVar(o.color);
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.restore();
    });

    // particles
    particles.forEach(p=>{
      ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
      ctx.fillStyle = colorVar(p.color);
      ctx.fillRect(p.x, p.y, 3, 3);
      ctx.globalAlpha = 1;
    });

    // player
    ctx.save();
    ctx.translate(player.x+player.w/2, player.y+player.h/2);
    ctx.rotate(-player.rot);
    ctx.shadowColor = colorVar('magenta');
    ctx.shadowBlur = 20;
    ctx.fillStyle = colorVar('magenta');
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(5,6,17,0.9)';
    ctx.fillRect(-player.w/2+6, -player.h/2+6, 8, 8);
    ctx.restore();

    ctx.restore();
  }

  function loop(ts){
    if(!lastTime) lastTime = ts;
    let dt = (ts - lastTime)/1000;
    lastTime = ts;
    if(dt > 0.05) dt = 0.05;
    if(running){
      update(dt);
    }
    draw();
    requestAnimationFrame(loop);
  }

  function startGame(){
    resize();
    resetGame();
    running = true;
    gameOver = false;
    overlay.classList.add('hidden');
  }

  startBtn.addEventListener('click', startGame);

  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){
      e.preventDefault();
      if(!running && !gameOver && overlay.classList.contains('hidden')===false){
        return;
      }
      if(running) jump();
    }
  });

  canvas.addEventListener('pointerdown', ()=>{
    if(running) jump();
  });
  document.getElementById('wrap').addEventListener('pointerdown', (e)=>{
    if(e.target === startBtn) return;
    if(running) jump();
  });

  document.getElementById('overlay').querySelector('h1').textContent = 'NEON DASH';
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
