<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RPGバトル</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  margin-top:40px;
}

.character{
  font-size:60px;
}

button{
  font-size:25px;
  padding:15px 30px;
}

#log{
  margin:20px;
  height:60px;
}
</style>

</head>

<body>

<h1>⚔️ RPGバトル ⚔️</h1>

<h2>ステージ <span id="stage">1</span></h2>

<div class="character">🧙</div>
<p>勇者HP：<span id="playerHP">100</span></p>

<div class="character">👾</div>
<p>敵HP：<span id="enemyHP">30</span></p>

<button onclick="attack()">攻撃する</button>

<p id="log">敵が現れた！</p>

<script>

let stage = 1;
let playerHP = 100;
let enemyHP = 30;


function attack(){

 let damage = Math.floor(Math.random()*15)+5;
 enemyHP -= damage;

 document.getElementById("log").textContent =
 "勇者の攻撃！敵に " + damage + " ダメージ！";


 if(enemyHP <= 0){

   stage++;

   document.getElementById("stage").textContent = stage;

   enemyHP = stage * 30;

   document.getElementById("enemyHP").textContent = enemyHP;

   document.getElementById("log").textContent =
   "敵を倒した！ステージ" + stage + "へ！";

   return;
 }


 // 敵の反撃
 let enemyDamage = Math.floor(Math.random()*10)+5;

 playerHP -= enemyDamage;


 document.getElementById("playerHP").textContent = playerHP;


 document.getElementById("enemyHP").textContent = enemyHP;


 document.getElementById("log").textContent +=
 " 敵の反撃！" + enemyDamage + "ダメージ！";


 if(playerHP <= 0){

   document.getElementById("log").textContent =
   "ゲームオーバー…";

 }

}

</script>

</body>
</html>
