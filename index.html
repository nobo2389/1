<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スマホ対応 ブロック崩し</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        canvas { background: #222; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 100vw; max-height: 70vh; }
        #msg { color: #fff; font-size: 20px; margin-bottom: 10px; font-weight: bold; }
        #btn { padding: 12px 24px; font-size: 18px; margin-top: 15px; background: #0095DD; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div id="msg">画面をタッチしてスタート</div>
    <canvas id="gameCanvas" width="360" height="480"></canvas>
    <button id="btn" onclick="resetGame()">もう一度遊ぶ</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const msg = document.getElementById("msg");
        const btn = document.getElementById("btn");

        let ballRadius = 8;
        let x, y, dx, dy;
        let paddleHeight = 12;
        let paddleWidth = 75;
        let paddleX;
        let brickRowCount = 5;
        let brickColumnCount = 5;
        let brickWidth = 60;
        let brickHeight = 20;
        let brickPadding = 5;
        let brickOffsetTop = 30;
        let brickOffsetLeft = 20;
        let bricks = [];
        let score = 0;
        let isPlaying = false;
        let isGameOver = false;

        function initData() {
            x = canvas.width / 2;
            y = canvas.height - 30;
            dx = 3;
            dy = -3;
            paddleX = (canvas.width - paddleWidth) / 2;
            score = 0;
            isGameOver = false;
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        // スマホのタッチ操作イベント
        window.addEventListener("touchstart", (e) => {
            if (!isPlaying && !isGameOver) {
                isPlaying = true;
                msg.innerText = "スコア: 0";
                draw();
            }
        });

        window.addEventListener("touchmove", (e) => {
            e.preventDefault();
            if (!isPlaying) return;
            let touch = e.touches[0];
            let rect = canvas.getBoundingClientRect();
            let relativeX = touch.clientX - rect.left;
            // キャンバスの表示サイズと内部解像度の比率を計算
            let scaleX = canvas.width / rect.width;
            let targetX = relativeX * scaleX - paddleWidth / 2;
            
            if (targetX > 0 && targetX < canvas.width - paddleWidth) {
                paddleX = targetX;
            }
        }, { passive: false });

        function collisionDetection() {
            let activeBricks = 0;
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        activeBricks++;
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            msg.innerText = "スコア: " + score;
                        }
                    }
                }
            }
            if (activeBricks === 0 && isPlaying) {
                msg.innerText = "🎉 クリア成功！おめでとう！";
                endGame();
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#FF5722";
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
            ctx.fillStyle = "#0095DD";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = "#4CAF50";
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function endGame() {
            isPlaying = false;
            isGameOver = true;
            btn.style.display = "block";
        }

        function draw() {
            if (!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            if (y + dy < ballRadius) {
                dy = -dy;
            } else if (y + dy > canvas.height - ballRadius - 10 - paddleHeight) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                } else if (y + dy > canvas.height - ballRadius) {
                    msg.innerText = "ゲームオーバー 😢";
                    endGame();
                    return;
                }
            }

            x += dx;
            y += dy;
            requestAnimationFrame(draw);
        }

        function resetGame() {
            btn.style.display = "none";
            msg.innerText = "画面をタッチしてスタート";
            initData();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
        }

        initData();
        drawBricks();
        drawBall();
        drawPaddle();
    </script>
</body>
</html>
