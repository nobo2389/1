<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultra Block Universe</title>

<style>

body{
background:#080808;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#000;
border:3px solid white;
touch-action:none;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
}

.status{
font-size:18px;
}

</style>

</head>

<body>


<h1>🌌 Ultra Block Universe 🌌</h1>


<div class="status">

Lv:
<span id="u_level">1</span>

　

EXP:
<span id="u_exp">0</span>

<br>

Score:
<span id="u_score">0</span>

　

Coin:
<span id="u_coin">0</span>

<br>

Stage:
<span id="u_stage">1</span>

　

HP:
<span id="u_hp">3</span>

</div>


<canvas id="u_canvas" width="360" height="600"></canvas>

<br>

<button onclick="u_start()">
START
</button>

<button onclick="u_reset()">
RESET
</button>



<script>


// ==========================
// 超大作メインデータ
// ==========================


const U={


running:false,


score:0,

coin:0,


stage:1,


hp:3,


level:1,


exp:0,


combo:0,


damage:1


};





const UC=
document.getElementById("u_canvas");


const UX=
UC.getContext("2d");






// ==========================
// プレイヤー
// ==========================


const UBall={


x:180,

y:400,

r:8,

dx:4,

dy:-4,


power:1


};





const UPaddle={


x:140,

y:560,

w:80,

h:12

};







// ==========================
// ブロック管理
// ==========================


let UBlocks=[];



function u_createStage(){


UBlocks=[];



let rows=
5+
Math.floor(U.stage/2);



for(let y=0;y<rows;y++){


for(let x=0;x<8;x++){



UBlocks.push({

x:10+x*43,

y:40+y*25,

w:38,

h:18,


hp:
1+Math.floor(U.stage/20),


type:"normal",


alive:true


});



}



}



}






// ==========================
// 描画
// ==========================


function u_draw(){



UX.clearRect(
0,
0,
360,
600
);



// ボール

UX.fillStyle="white";


UX.beginPath();


UX.arc(

UBall.x,

UBall.y,

UBall.r,

0,

Math.PI*2

);


UX.fill();





// パドル

UX.fillStyle="cyan";


UX.fillRect(

UPaddle.x,

UPaddle.y,

UPaddle.w,

UPaddle.h

);





// ブロック

for(
let b of UBlocks
){



if(b.alive){



UX.fillStyle=
b.hp>1?
"orange":
"red";



UX.fillRect(

b.x,

b.y,

b.w,

b.h

);



}



}



}







// ==========================
// 更新
// ==========================


function u_loop(){


if(!U.running)
return;



UBall.x+=UBall.dx;

UBall.y+=UBall.dy;




if(
UBall.x<0||
UBall.x>360
){

UBall.dx*=-1;

}



if(UBall.y<0){

UBall.dy*=-1;

}







if(

UBall.y+UBall.r>=UPaddle.y&&

UBall.x>=UPaddle.x&&

UBall.x<=UPaddle.x+UPaddle.w

){


UBall.dy=-Math.abs(UBall.dy);


U.combo++;


}







if(UBall.y>600){


U.hp--;


U.combo=0;


u_updateUI();


u_resetBall();



if(U.hp<=0){


U.running=false;


alert("GAME OVER");


return;


}



}





u_hitBlocks();



u_draw();



requestAnimationFrame(u_loop);



}







// ==========================
// ブロック処理
// ==========================


function u_hitBlocks(){



for(
let b of UBlocks
){



if(!b.alive)
continue;



if(

UBall.x>b.x&&

UBall.x<b.x+b.w&&

UBall.y>b.y&&

UBall.y<b.y+b.h

){



b.hp--;


UBall.dy*=-1;



if(b.hp<=0){


b.alive=false;


U.score+=10*U.combo;


U.coin++;


U.exp+=5;


}



u_updateUI();



}



}



u_checkClear();



}






function u_checkClear(){


let remain=false;



for(
let b of UBlocks
){


if(b.alive){

remain=true;

break;

}


}



if(!remain){



U.stage++;


u_createStage();


u_resetBall();



alert(
"STAGE "+
U.stage
);



}



}







function u_resetBall(){


UBall.x=180;

UBall.y=400;

UBall.dx=4;

UBall.dy=-4;


}






// ==========================
// UI
// ==========================


function u_updateUI(){


document.getElementById("u_level").innerText=U.level;

document.getElementById("u_exp").innerText=U.exp;

document.getElementById("u_score").innerText=U.score;

document.getElementById("u_coin").innerText=U.coin;

document.getElementById("u_stage").innerText=U.stage;

document.getElementById("u_hp").innerText=U.hp;


}






function u_start(){


if(!U.running){


U.running=true;


u_loop();


}



}





function u_reset(){


U.running=false;


U.score=0;

U.coin=0;

U.stage=1;

U.hp=3;

U.exp=0;


u_createStage();


u_resetBall();


u_updateUI();


u_draw();


}





// 操作

UC.addEventListener(
"mousemove",
e=>{


let r=
UC.getBoundingClientRect();


UPaddle.x=
e.clientX-r.left-
UPaddle.w/2;


});



UC.addEventListener(
"touchmove",
e=>{


let r=
UC.getBoundingClientRect();


UPaddle.x=
e.touches[0].clientX-r.left-
UPaddle.w/2;


e.preventDefault();


},
{passive:false}
);







u_createStage();

u_updateUI();

u_draw();// ==========================
// 超大作 Part2
// 属性・スキルシステム
// ==========================


// プレイヤー拡張

U.mana=100;

U.critical=5;

U.element="normal";




// 属性データ

const UElements={


fire:{

name:"🔥炎",

damage:1.5,

effect:"爆発"

},


ice:{

name:"❄氷",

damage:1.2,

effect:"減速"

},


thunder:{

name:"⚡雷",

damage:2,

effect:"連鎖"

},


normal:{

name:"通常",

damage:1,

effect:"なし"

}


};





// ==========================
// クリティカル計算
// ==========================


function u_damage(){


let damage=
UBall.power;



if(
Math.random()*100
<
U.critical
){


damage*=2;


}



return damage;



}






// ==========================
// 属性変更
// ==========================


function u_changeElement(type){


if(UElements[type]){


U.element=type;



alert(

"属性変更 "+
UElements[type].name

);



}


}






// ==========================
// スキル
// ==========================


const USkills={


bomb:{


name:"爆破",

cost:30


},


laser:{


name:"レーザー",

cost:50


},


freeze:{


name:"時間停止",

cost:40


}


};






function u_useSkill(skill){



let s=
USkills[skill];



if(!s)
return;



if(U.mana<s.cost){


alert("マナ不足");


return;


}



U.mana-=s.cost;





if(skill==="bomb"){



for(let b of UBlocks){



if(b.alive){


b.hp--;


if(b.hp<=0){


b.alive=false;


U.score+=50;


}



}



}



}






if(skill==="laser"){



for(let i=0;i<UBlocks.length;i++){



if(UBlocks[i].alive){



UBlocks[i].hp-=3;



}



}



}






if(skill==="freeze"){



UBall.dx*=0.5;

UBall.dy*=0.5;



setTimeout(()=>{


UBall.dx*=2;

UBall.dy*=2;


},5000);



}



u_updateUI();


}







// ==========================
// ブロック属性攻撃
// ==========================



function u_elementAttack(block){



let data=
UElements[U.element];



let damage=
u_damage()
*
data.damage;



block.hp-=damage;




if(block.hp<=0){



block.alive=false;


U.score+=20;


U.coin+=2;


U.exp+=10;



}




}







// スキルボタン追加


let skillUI=
document.createElement("div");



skillUI.innerHTML=

`

<h3>スキル</h3>

<button onclick="u_useSkill('bomb')">
💥爆破
</button>


<button onclick="u_useSkill('laser')">
🔴レーザー
</button>


<button onclick="u_useSkill('freeze')">
❄停止
</button>


<br>


<button onclick="u_changeElement('fire')">
🔥炎
</button>


<button onclick="u_changeElement('ice')">
❄氷
</button>


<button onclick="u_changeElement('thunder')">
⚡雷
</button>


`;



document.body.insertBefore(
skillUI,
UC
);





// マナ回復

setInterval(()=>{


if(U.mana<100){


U.mana++;


}


},1000);// ==========================
// 超大作 Part3
// 装備・強化システム
// ==========================



const UEquipment={


ball:{

name:"ノーマルボール",

rarity:"N",

level:1,

power:1


},



paddle:{

name:"ノーマルパドル",

rarity:"N",

level:1,

width:0


}



};







const URarity={


N:{

name:"ノーマル",

rate:1


},


R:{

name:"レア",

rate:1.5


},


SR:{

name:"スーパーレア",

rate:2


},


SSR:{

name:"ウルトラレア",

rate:3


},


UR:{

name:"究極",

rate:5


}



};







// ==========================
// 装備装着
// ==========================


function u_equipBall(item){



UEquipment.ball=item;



UBall.power=

item.level*
item.power;



alert(

"装備変更\n"+
item.name

);



}






function u_equipPaddle(item){



UEquipment.paddle=item;



UPaddle.w=
80+
item.width*
10;



}







// ==========================
// 装備作成
// ==========================


function u_createEquipment(){



let r=
Math.random()*100;



let rarity;



if(r<50){

rarity="N";

}

else if(r<80){

rarity="R";

}

else if(r<95){

rarity="SR";

}

else if(r<99){

rarity="SSR";

}

else{

rarity="UR";

}





let data=
URarity[rarity];





return {


name:
data.name+"ボール",


rarity:rarity,


level:1,


power:data.rate



};



}








// ==========================
// 装備ガチャ
// ==========================


function u_equipmentGacha(){



let cost=500;



if(U.coin<cost){


alert(
"コイン不足"
);


return;


}



U.coin-=cost;



let item=
u_createEquipment();



u_equipBall(item);



alert(

"🎁獲得\n"+
item.name+
"\nレア度 "+
item.rarity

);



u_updateUI();



}








// ==========================
// 強化
// ==========================


function u_upgradeEquipment(){



let eq=
UEquipment.ball;



let cost=
eq.level*200;



if(U.coin>=cost){



U.coin-=cost;


eq.level++;



UBall.power=
eq.level*
eq.power;



alert(

"装備強化 Lv"+
eq.level

);



}



u_updateUI();



}








// ==========================
// 装備表示
// ==========================



let equipUI=
document.createElement("div");



equipUI.innerHTML=

`

<h3>装備</h3>

<p>
ボール:
<span id="u_equip_name">
${UEquipment.ball.name}
</span>
</p>


<button onclick="u_equipmentGacha()">
装備ガチャ 500
</button>


<button onclick="u_upgradeEquipment()">
装備強化
</button>


`;



document.body.insertBefore(
equipUI,
UC
);// ==========================
// 超大作 Part4
// ワールド・ボス・特殊ブロック
// ==========================



U.world=1;

U.bossCount=0;





// ==========================
// ワールド設定
// ==========================


const UWorlds={


1:{
name:"🌍草原",
color:"green"
},


2:{
name:"🌋火山",
color:"orange"
},


3:{
name:"🌊深海",
color:"blue"
},


4:{
name:"🌌宇宙",
color:"purple"
},


5:{
name:"✨異世界",
color:"gold"
}



};






// ==========================
// 特殊ブロック
// ==========================


function u_createSpecialBlock(x,y){



let type=
Math.floor(
Math.random()*5
);



return {


x:x,

y:y,

w:38,

h:18,

hp:2+U.world,

alive:true,

type:type



};



}







// ==========================
// 特殊効果
// ==========================


function u_specialEffect(block){



if(block.type===0){


// 爆発


for(let b of UBlocks){



if(

Math.abs(b.x-block.x)<60&&

Math.abs(b.y-block.y)<60

){


b.hp--;


}



}



}





if(block.type===1){


// 回復


U.hp++;


}





if(block.type===2){


// コイン


U.coin+=50;


}





if(block.type===3){


// 分裂攻撃


UBall.power++;


}





if(block.type===4){


// 経験値


U.exp+=50;


}





}








// ==========================
// ボス
// ==========================


const UBoss={


active:false,

hp:0,

maxHp:0,

name:""



};








function u_startBoss(){



UBoss.active=true;



UBoss.maxHp=

1000+

U.stage*500;



UBoss.hp=
UBoss.maxHp;



UBoss.name=

UWorlds[U.world].name+
"ボス";



UBlocks=[];



alert(

"⚠ "+
UBoss.name+
" 出現\nHP "+
UBoss.hp

);



}








function u_bossDamage(){



if(!UBoss.active)
return;



if(

UBall.y<160&&

UBall.x>40&&

UBall.x<320

){



UBoss.hp-=

UBall.power*10;



UBall.dy*=-1;



if(UBoss.hp<=0){



UBoss.active=false;


U.score+=5000;


U.coin+=1000;


U.bossCount++;


U.exp+=500;



alert(

"🎉 ボス撃破！"

);



u_nextWorld();



}



}



}






function u_drawBoss(){



if(!UBoss.active)
return;



UX.fillStyle="purple";


UX.fillRect(

40,

70,

280,

60

);



UX.fillStyle="white";


UX.fillText(

UBoss.name+
" HP:"+UBoss.hp,

80,

105

);



}








// ==========================
// ワールド進行
// ==========================


function u_nextWorld(){



if(U.bossCount%5===0){


U.world++;



if(U.world>5)

U.world=5;



}



U.stage++;


u_createStage();



}








// ボス描画追加


const u_oldDraw4=
u_draw;


u_draw=function(){


u_oldDraw4();


u_drawBoss();


};







// ボス処理追加


const u_oldLoop4=
u_loop;



u_loop=function(){



if(UBoss.active){


u_bossDamage();


}



u_oldLoop4();



};// ==========================
// 超大作 Part5
// クエスト・実績・セーブ
// ==========================



const UAchievement={


break:0,

boss:0,

coin:0,

stage:0


};





const UQuest={


breakTarget:500,

coinTarget:10000,

clear:false


};







// ==========================
// 実績処理
// ==========================



function u_addBreakAchievement(){



UAchievement.break++;



if(

UAchievement.break===100

){



U.coin+=500;


alert(

"🏆 実績解除\n100ブロック破壊"

);



}



if(

UAchievement.break===1000

){



U.coin+=5000;


alert(

"🏆 実績解除\n1000ブロック破壊"

);



}



}








function u_addBossAchievement(){



UAchievement.boss++;



if(

UAchievement.boss===10

){



U.coin+=10000;



alert(

"🏆 ボス討伐王"

);



}



}








// ==========================
// クエスト
// ==========================



function u_checkQuest(){



if(

UAchievement.break>=
UQuest.breakTarget

&&
!UQuest.clear

){



UQuest.clear=true;



U.coin+=3000;



alert(

"🎯 クエスト達成!"

);



}



}








// ==========================
// セーブ
// ==========================



function u_save(){



let data={



game:U,


ball:UBall,


paddle:UPaddle,


equipment:UEquipment,


upgrade:upgradeData,


achievement:UAchievement,


quest:UQuest,


world:U.world



};



localStorage.setItem(

"UltraBlockSave",

JSON.stringify(data)

);



}








// ==========================
// ロード
// ==========================



function u_load(){



let data=

localStorage.getItem(

"UltraBlockSave"

);



if(!data)

return;



let save=

JSON.parse(data);



Object.assign(U,save.game);


Object.assign(UBall,save.ball);


Object.assign(UPaddle,save.paddle);


Object.assign(UEquipment,save.equipment);


Object.assign(upgradeData,save.upgrade);


Object.assign(UAchievement,save.achievement);


Object.assign(UQuest,save.quest);



U.world=

save.world||1;



u_updateUI();



}








// ==========================
// 放置報酬
// ==========================



function u_offlineReward(){



let last=

Number(

localStorage.getItem(

"UltraLast"

)

)||Date.now();



let now=Date.now();



let sec=

Math.floor(

(now-last)/1000

);



let reward=

Math.min(sec,7200);



if(reward>60){



U.coin+=reward;



alert(

"放置報酬 "+
reward+
"コイン"

);



}



localStorage.setItem(

"UltraLast",

now

);



}








// ==========================
// 自動保存
// ==========================



setInterval(()=>{


u_save();


},30000);





// 起動時

u_load();


u_offlineReward();// ==========================
// 超大作 Part6
// ペット・仲間・研究
// ==========================



const UPet={


name:"なし",

level:0,

damage:0,


active:false


};






const UResearch={


attack:0,

defense:0,

coin:0,

luck:0


};






// ==========================
// ペット一覧
// ==========================


const UPetList=[


{
name:"🔥ファイアドラゴン",
damage:5
},


{
name:"❄アイスフェアリー",
damage:3
},


{
name:"⚡サンダーバード",
damage:8
},


{
name:"🌑ダークウルフ",
damage:10
}


];







// ==========================
// ペット召喚
// ==========================


function u_summonPet(){



let cost=2000;



if(U.coin<cost){


alert(
"コイン不足"
);


return;


}



U.coin-=cost;



let pet=

UPetList[

Math.floor(
Math.random()*
UPetList.length
)

];



UPet.name=
pet.name;


UPet.damage=
pet.damage;


UPet.level=1;


UPet.active=true;



alert(

"🐾 ペット加入\n"+
pet.name

);



u_updateUI();



}







// ==========================
// ペット経験値
// ==========================


function u_petAttack(){



if(!UPet.active)
return;



for(
let b of UBlocks
){



if(b.alive){



b.hp-=UPet.damage;



if(b.hp<=0){


b.alive=false;


U.score+=50;


U.coin+=2;


}



break;


}



}



}







// 自動攻撃

setInterval(()=>{


if(U.running){


u_petAttack();


}



},3000);








// ==========================
// 研究
// ==========================


function u_research(type){



let cost=500+
UResearch[type]*500;



if(U.coin<cost){


alert(
"研究費不足"
);


return;


}



U.coin-=cost;


UResearch[type]++;





if(type==="attack"){


UBall.power+=2;


}




if(type==="defense"){


U.hp++;


}





if(type==="coin"){


U.coin+=100;


}





if(type==="luck"){


U.critical+=2;


}





alert(

"研究完了\n"+
type+
" Lv"+
UResearch[type]

);



u_updateUI();



}








// ==========================
// UI
// ==========================


let petUI=
document.createElement("div");



petUI.innerHTML=

`

<h3>🐾ペット研究</h3>


<button onclick="u_summonPet()">
ペット召喚 2000
</button>


<br>


<button onclick="u_research('attack')">
攻撃研究
</button>


<button onclick="u_research('defense')">
防御研究
</button>


<button onclick="u_research('coin')">
コイン研究
</button>


<button onclick="u_research('luck')">
幸運研究
</button>

`;



document.body.insertBefore(

petUI,

UC

);// ==========================
// 超大作 Part7
// 転生・ランク・称号
// ==========================



const URebirth={


count:0,

power:0,

bonus:1


};




let URank={


name:"初心者",

level:1


};





let UTitle={


current:"新人ブレイカー",

list:[

"新人ブレイカー"

]


};






// ==========================
// ランク更新
// ==========================


function u_updateRank(){



let lv=U.level;



if(lv>=10){


URank.name="上級者";


}



if(lv>=50){


URank.name="達人";


}



if(lv>=100){


URank.name="伝説";


}



if(lv>=500){


URank.name="神話級";


}



}






// ==========================
// 称号追加
// ==========================


function u_addTitle(name){



if(
!UTitle.list.includes(name)
){



UTitle.list.push(name);



alert(

"🏅称号獲得\n"+
name

);



}



}






// ==========================
// 転生
// ==========================


function u_rebirth(){



if(U.stage<100){



alert(

"ステージ100必要"

);



return;



}




URebirth.count++;



URebirth.power+=0.1;



URebirth.bonus+=0.1;



// 初期化

U.stage=1;

U.level=1;
