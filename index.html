<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><title>OMEGA</title><style>*{margin:0;padding:0;}body{background:#030308;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:monospace;overflow:hidden;}#ui{width:360px;display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;letter-spacing:1px;text-shadow:0 0 8px #0ff;}canvas{background:#000;border:2px solid #0ff;box-shadow:0 0 20px #0ff5;}</style></head><body><div id="ui"><div id="sc">SCORE: 0</div><div id="bhp">BOSS: 100%</div></div><canvas id="cv" width="360" height="420"></canvas><script>
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");let score=0,lives=3,gOver=false,gWin=false,skT=0,skX=0,skY=0,aCtx=null,bgmIvl=null,seq=0,pwd=60,pX=150,pH=10,hm=false,ms=[],eBs=[],shd=false,shdHp=0,balls=[],bSpd=6,row=4,col=6,bW=48,bH=12,bPd=5,oTop=90,oLeft=24,bricks=[],pts=[],its=[],lasers=[],laserAngle=0;const mld=;
let boss={x:80,y:40,w:200,h:26,hp:60,maxHp:60,clr:"#ff0055",bTimer:0,dir:1,warpTimer:0};function addBall(x,y,dx,dy){balls.push({x:x,y:y,dx:dx,dy:dy,r:5,trail:[]});}function init(){balls=[],eBs=[],ms=[],its=[],shd=false,pwd=60;addBall(180,360,3,-5);boss.hp=boss.maxHp;for(let c=0;c<col;c++){bricks[c]=[];for(let r=0;r<row;r++)bricks[c][r]={x:0,y:0,st:1,c:`hsl(${r*60},100%,50%)`};}}init();
function initAudio(){if(!aCtx){aCtx=new(window.AudioContext||window.webkitAudioContext)();bgmIvl=setInterval(()=>{if(gOver||gWin)return;let base=boss.hp<(boss.maxHp/2)?1.4:1.0;playSound(mld[seq]*base,"sawtooth",0.12);if(seq%4===0)playSound(70,"triangle",0.15);seq=(seq+1)%mld.length;},180);}}
function playSound(f,t,d,e=0){if(!aCtx)return;try{let o=aCtx.createOscillator(),g=aCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,aCtx.currentTime);if(e>0)o.frequency.exponentialRampToValueAtTime(e,aCtx.currentTime+d);g.gain.setValueAtTime(0.04,aCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aCtx.currentTime+d);o.connect(g);g.connect(aCtx.destination);o.start();o.stop(aCtx.currentTime+d);}catch(err){}}
function addPt(x,y,clr){for(let i=0; i<8; i++)pts.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,a:1,clr:clr,size:Math.random()*3+1});}function drop(x,y){if(Math.random()<0.5){let r=Math.random(),t=r<0.33?'M':(r<0.66?'H':'S');its.push({x:x,y:y,t:t,r:6});}}function move(x){let r=cv.getBoundingClientRect(),mX=x-r.left;if(mX>0&&mX<cv.width)pX=mX-pwd/2;}function touch(clientX){initAudio();move(clientX);}
document.addEventListener("mousemove",(e)=>touch(e.clientX));cv.addEventListener("touchmove",(e)=>{touch(e.touches.clientX);e.preventDefault();},{passive:false});
function hitBoss(dmg){boss.hp-=dmg;skT=8;playSound(90,"sawtooth",0.08,20);if(boss.hp<=0){boss.hp=0;gWin=true;playSound(523,"square",0.12);setTimeout(()=>playSound(659,"square",0.12),100);setTimeout(()=>playSound(783,"square",0.4),200);}document.getElementById("bhp").innerText="BOSS: "+Math.floor((boss.hp/boss.maxHp)*100)+"%";}
function update(){if(gOver||gWin)return;if(skT>0){skX=(Math.random()-0.5)*skT;skY=(Math.random()-0.5)*skT;skT--;}else{skX=0;skY=0;}if(boss.hp<(boss.maxHp/2)){boss.warpTimer++;if(boss.warpTimer>120){boss.x=Math.random()*(cv.width-boss.w);boss.warpTimer=0;playSound(600,"sine",0.1,200);addPt(boss.x+boss.w/2,boss.y+boss.h/2,"#ffea00");}laserAngle+=0.02;}else{boss.x+=boss.dir*1.5;if(boss.x<10||boss.x+boss.w>cv.width-10)boss.dir*=-1;}boss.bTimer++;if(boss.bTimer>70){eBs.push({x:boss.x+30,y:boss.y+24,vy:3,vx:boss.hp<(boss.maxHp/2)?(Math.random()-0.5)*2:0},{x:boss.x+boss.w-30,y:boss.y+24,vy:3,vx:boss.hp<(boss.maxHp/2)?(Math.random()-0.5)*2:0});boss.bTimer=0;playSound(180,"triangle",0.04);}
for(let i=eBs.length-1;i>=0;i--){let eb=eBs[i];eb.y+=eb.vy;eb.x+=eb.vx;if(eb.y>cv.height||eb.x<0||eb.x>cv.width){eBs.splice(i,1);continue;}if(shd&&eb.y>=cv.height-pH-12&&eb.x>pX-8&&eb.x<pX+pwd+8){eBs.splice(i,1);shdHp--;playSound(250,"sine",0.05);if(shdHp<=0)shd=false;continue;}if(eb.y>=cv.height-pH&&eb.x>pX&&eb.x<pX+pwd){eBs.splice(i,1);lives--;playSound(140,"sawtooth",0.25);if(lives<=0)gOver=true;continue;}}
if(boss.hp>0&&boss.hp<(boss.maxHp/2)&&boss.warpTimer%10===0){let bx=boss.x+boss.w/2,by=boss.y+boss.h/2;let lx=bx+Math.cos(laserAngle)*200,ly=by+Math.sin(laserAngle)*200;if(ly>=cv.height-pH&&lx>pX&&lx<pX+pwd&&!shd){lives--;playSound(140,"sawtooth",0.25);if(lives<=0)gOver=true;}}
if(hm&&Math.random()<0.15){ms.push({x:pX+pwd/2,y:cv.height-pH});playSound(520,"triangle",0.04,850);}for(let i=ms.length-1;i>=0;i--){let m=ms[i],tx=boss.x+boss.w/2,ty=boss.y+boss.h/2,ang=Math.atan2(ty-m.y,tx-m.x);m.x+=Math.cos(ang)*6;m.y+=Math.sin(ang)*6;if(m.x>boss.x&&m.x<boss.x+boss.w&&m.y>boss.y&&m.y<boss.y+boss.h){addPt(m.x,m.y,"#ff0");hitBoss(1);ms.splice(i,1);}}
for(let i=balls.length-1;i>=0;i--){let b=balls[i];b.x+=b.dx;b.y+=b.dy;b.trail.push({x:b.x,y:b.y});if(b.trail.length>6)b.trail.shift();if(b.x+b.dx>cv.width-b.r||b.x+b.dx<b.r){b.dx=-b.dx;playSound(380,"sine",0.04);}if(b.y+b.dy<b.r){b.dy=-b.dy;playSound(380,"sine",0.04);}else if(b.y+b.dy>cv.height-b.r-pH){if(b.x>pX&&b.x<pX+pwd){let h=(b.x-(pX+pwd/2))/(pwd/2);b.dx=h*bSpd;b.dy=-Math.sqrt(bSpd*bSpd-b.dx*b.dx);if(Math.abs(b.dy)<2)b.dy=-2;playSound(420,"sine",0.06,550);}else if(b.y+b.dy>cv.height-b.r){balls.splice(i,1);playSound(180,"sine",0.08);continue;}}
if(boss.hp>0&&b.x>boss.x&&b.x<boss.x+boss.w&&b.y>boss.y&&b.y<boss.y+boss.h){b.dy=-b.dy;addPt(b.x,b.y,boss.clr);hitBoss(2);}for(let c=0;c<col;c++){for(let r=0;r<row;r++){let bk=bricks[c][r];if(bk.st===1){if(b.x>bk.x&&b.x<bk.x+bW&&b.y>bk.y&&b.y<bk.y+bH){b.dy=-b.dy;bk.st=0;score+=10;document.getElementById("sc").innerText="SCORE: "+score;addPt(b.x,b.y,bk.c);drop(b.x+bW/2,b.y+bH);playSound(300,"square",0.06,750);}}}}}
if(balls.length===0){lives--;playSound(140,"sawtooth",0.2);if(lives<=0)gOver=true;else addBall(180,360,3,-5);}for(let i=pts.length-1;i>=0;i--){let p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.a-=0.04;if(p.a<=0)pts.splice(i,1);}
for(let i=its.length-1;i>=0;i--){let it=its[i];it.y+=2.2;if(it.y>=cv.height-pH&&it.x>pX&&it.x<pX+pwd){playSound(480,"square",0.04,950);if(it.t==='M'){addBall(it.x,340,-2,-5);addBall(it.x,340,2,-5);}else if(it.t==='H'){hm=true;setTimeout(()=>hm=false,6000);}else{shd=true;shdHp=4;}its.splice(i,1);continue;}if(it.y>cv.height)its.splice(i,1);}
}function draw(){ctx.clearRect(0,0,cv.width,cv.height);ctx.save();ctx.translate(skX,skY);if(boss.hp > 0){ctx.fillStyle=boss.clr;ctx.fillRect(boss.x,boss.y,boss.w,boss.h);ctx.fillStyle="#fff";ctx.font="bold 9px sans-serif";ctx.fillText(boss.hp<(boss.maxHp/2)?"⚠️ WARP MODE ⚠️":"MASTER CORE",boss.x+60,boss.y+16);if(boss.hp<(boss.maxHp/2)){ctx.strokeStyle="#ffea00";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(boss.x+boss.w/2,boss.y+boss.h/2);ctx.lineTo(boss.x+boss.w/2+Math.cos(laserAngle)*250,boss.y+boss.h/2+Math.sin(laserAngle)*250);ctx.stroke();}}
for(let c=0;c<col;c++){for(let r=0;r<row;r++){let b=bricks[c][r];if(b.st===1){b.x=c*(bW+bPd)+oLeft;b.y=r*(bH+bPd)+oTop;ctx.fillStyle=b.c;ctx.fillRect(b.x,b.y,bW,bH);}}}ctx.fillStyle="#0ff";ctx.fillRect(pX,cv.height-pH,pwd,pH);if(shd){ctx.strokeStyle="#0f6";ctx.lineWidth=2;ctx.strokeRect(pX-6,cv.height-pH-5,pwd+12,4);}ctx.fillStyle="#f50";eBs.forEach(eb=>ctx.fillRect(eb.x,eb.y,5,8));
ctx.fillStyle="#ff0";ms.forEach(m=>ctx.fillRect(m.x,m.y,3,5));balls.forEach(b=>{b.trail.forEach((t,idx)=>{ctx.fillStyle=`rgba(255,255,255,${idx/10})`;ctx.beginPath();ctx.arc(t.x,t.y,b.r*(idx/6),0,Math.PI*2);ctx.fill();});ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();});pts.forEach(p=>{ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.clr;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.restore();});
its.forEach(it=>{ctx.fillStyle=it.t==='M'?"#0f6":(it.t==='H'?"#ff0":"#0ef");ctx.font="bold 10px sans-serif";ctx.fillText(`[${it.t}]`,it.x-6,it.y+3);});ctx.restore();if(gOver||gWin){ctx.fillStyle="rgba(5,5,15,0.95)";ctx.fillRect(0,0,cv.width,cv.height);ctx.font="bold 22px monospace";ctx.textAlign="center";ctx.fillStyle=gOver?"#f05":"#0f6";ctx.fillText(gOver?"SYSTEM FAILURE":"GALAXY SAVED!",cv.width/2,180);
ctx.font="11px monospace";ctx.fillStyle="#fff";ctx.fillText("CLICK TO REBOOT",cv.width/2,220);}}cv.addEventListener("click",()=>{initAudio();if(gOver||gWin){score=0;lives=3;gOver=false;gWin=false;hm=false;document.getElementById("sc").innerText="SCORE: 0";document.getElementById("bhp").innerText="BOSS: 100%";init();}});function loop(){update();draw();requestAnimationFrame(loop);}loop();
</script></body></html>
