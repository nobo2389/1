<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultimate Breaker v2</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:black;
border:3px solid white;
touch-action:none;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
}

</style>

</head>

<body>


<h1>⚡ Ultimate Breaker v2 ⚡</h1>


<div>

Lv:
<span id="level">1</span>

　

Score:
<span id="score">0</span>

　

Stage:
<span id="stage">1</span>

<br>

HP:
<span id="hp">3</span>

　

Coin:
<span id="coin">0</span>

</div>


<canvas id="game" width="360" height="600"></canvas>

<br>


<button onclick="gameStart()">
START
</button>

<button onclick="gameReset()">
RESET
</button>



<script>


const canvas=
document.getElementById("game");


const ctx=
canvas.getContext("2d");



// ====================
// データ
// ====================


let game={

running:false,

score:0,

coin:0,

stage:1,

hp:3,

level:1,

exp:0

};



// ====================
// ボール
// ====================


let ball={

x:180,

y:400,

r:8,

dx:4,

dy:-4,

power:1

};




// ====================
// パドル
// ====================


let paddle={

x:140,

y:560,

w:80,

h:12

};




// ====================
// ブロック
// ====================


let blocks=[];



function makeBlocks(){


blocks=[];


let rows=
5+game.stage;



for(let y=0;y<rows;y++){


for(let x=0;x<8;x++){


blocks.push({

x:10+x*43,

y:40+y*25,

w:38,

h:18,

hp:1,

alive:true

});


}


}



}




// ====================
// 描画
// ====================


function drawGame(){


ctx.clearRect(
0,
0,
360,
600
);



// ボール

ctx.fillStyle="white";


ctx.beginPath();


ctx.arc(
ball.x,
ball.y,
ball.r,
0,
Math.PI*2
);


ctx.fill();



// パドル

ctx.fillStyle="cyan";


ctx.fillRect(

paddle.x,

paddle.y,

paddle.w,

paddle.h

);



// ブロック

for(let b of blocks){


if(b.alive){


ctx.fillStyle="red";


ctx.fillRect(

b.x,

b.y,

b.w,

b.h

);


}


}



}






// ====================
// 更新
// ====================


function gameLoop(){


if(!game.running)
return;



ball.x+=ball.dx;

ball.y+=ball.dy;




if(
ball.x<0||
ball.x>360
){

ball.dx*=-1;

}



if(ball.y<0){

ball.dy*=-1;

}




// パドル

if(

ball.y+ball.r>=paddle.y&&

ball.x>=paddle.x&&

ball.x<=paddle.x+paddle.w

){

ball.dy=-Math.abs(ball.dy);

}






// 落下


if(ball.y>600){


game.hp--;


document.getElementById(
"hp"
).innerText=
game.hp;



resetBall();



if(game.hp<=0){


game.running=false;


alert("GAME OVER");


return;


}



}



checkBlocks();


drawGame();



requestAnimationFrame(gameLoop);



}






// ====================
// ブロック判定
// ====================


function checkBlocks(){



for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){



b.alive=false;


ball.dy*=-1;



game.score+=10;

game.coin+=1;


game.exp+=5;



updateUI();



}



}



checkStage();



}







function checkStage(){


let remain=false;



for(let b of blocks){


if(b.alive){

remain=true;

break;

}

}



if(!remain){



game.stage++;


makeBlocks();


resetBall();



updateUI();



alert(
"Stage "+
game.stage
);



}



}






// ====================
// 操作
// ====================


function resetBall(){


ball.x=180;

ball.y=400;

ball.dx=4;

ball.dy=-4;


}





function gameStart(){



if(!game.running){


game.running=true;


gameLoop();



}



}




function gameReset(){


game.running=false;


game.score=0;

game.coin=0;

game.stage=1;

game.hp=3;


makeBlocks();

resetBall();

updateUI();

drawGame();



}




function updateUI(){


document.getElementById(
"level"
).innerText=
game.level;


document.getElementById(
"score"
).innerText=
game.score;


document.getElementById(
"stage"
).innerText=
game.stage;


document.getElementById(
"hp"
).innerText=
game.hp;


document.getElementById(
"coin"
).innerText=
game.coin;



}






// マウス

canvas.addEventListener(
"mousemove",
function(e){


let r=
canvas.getBoundingClientRect();


paddle.x=
e.clientX-r.left-paddle.w/2;


});




// タッチ

canvas.addEventListener(
"touchmove",
function(e){


let r=
canvas.getBoundingClientRect();


paddle.x=
e.touches[0].clientX-r.left-paddle.w/2;


e.preventDefault();


},
{
passive:false
});






makeBlocks();

updateUI();

drawGame();// ====================
// Part2
// アイテム・強化
// ====================


let items=[];


let upgradeData={

power:1,

paddle:1,

speed:1

};




// --------------------
// レベル処理
// --------------------


function addExperience(value){


game.exp+=value;



if(
game.exp>=game.level*100
){


game.exp=0;


game.level++;


game.coin+=50;



alert(
"LEVEL UP Lv."+game.level
);



}



}






// --------------------
// アイテム生成
// --------------------


function createItem(x,y){



if(Math.random()<0.25){



items.push({

x:x,

y:y,

type:
Math.floor(Math.random()*4)

});


}



}






// --------------------
// アイテム更新
// --------------------


function updateItems(){



for(
let i=items.length-1;
i>=0;
i--
){



let item=items[i];


item.y+=3;



if(

item.y>=paddle.y&&

item.x>=paddle.x&&

item.x<=paddle.x+paddle.w

){



applyItem(item.type);


items.splice(i,1);


}




if(item.y>600){


items.splice(i,1);


}



}



}






// --------------------
// アイテム効果
// --------------------


function applyItem(type){



if(type===0){


// パドル拡大

paddle.w+=30;


setTimeout(()=>{

paddle.w-=30;

},5000);



}




if(type===1){


// 攻撃力

ball.power++;



}




if(type===2){


// コイン

game.coin+=100;



}




if(type===3){


// HP

game.hp++;



}



updateUI();



}








// --------------------
// アイテム描画
// --------------------


function drawItems(){



for(let item of items){


ctx.fillStyle=
[
"yellow",
"lime",
"gold",
"pink"
][item.type];



ctx.fillRect(

item.x,

item.y,

12,

12

);



}



}





// 描画追加

const oldDrawItems=
drawGame;


drawGame=function(){


oldDrawItems();


drawItems();


};






// --------------------
// ブロック報酬追加
// --------------------


const oldCheckBlocks=
checkBlocks;



checkBlocks=function(){



for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){



b.alive=false;


ball.dy*=-1;



game.score+=10;


game.coin+=1;



addExperience(5);



createItem(

b.x,

b.y

);



updateUI();



}



}



checkStage();



};






// --------------------
// 強化
// --------------------


function powerUpgrade(){



let cost=
upgradeData.power*100;



if(game.coin>=cost){



game.coin-=cost;


upgradeData.power++;


ball.power++;



alert(
"攻撃力強化"
);



}


updateUI();



}





function paddleUpgrade(){



let cost=
upgradeData.paddle*150;



if(game.coin>=cost){



game.coin-=cost;


upgradeData.paddle++;


paddle.w+=10;



alert(
"パドル強化"
);



}


updateUI();



}





function speedUpgrade(){



let cost=
upgradeData.speed*200;



if(game.coin>=cost){



game.coin-=cost;


upgradeData.speed++;


ball.dx*=1.1;

ball.dy*=1.1;



alert(
"速度強化"
);



}


updateUI();



}





// --------------------
// 更新追加
// --------------------


const oldGameLoop=
gameLoop;


gameLoop=function(){



updateItems();



oldGameLoop();



};




// UI

let upgradeMenu=
document.createElement("div");



upgradeMenu.innerHTML=`

<h3>強化</h3>

<button onclick="powerUpgrade()">
攻撃
</button>

<button onclick="paddleUpgrade()">
パドル
</button>

<button onclick="speedUpgrade()">
速度
</button>

`;



document.body.insertBefore(
upgradeMenu,
canvas
);// ====================
// Part3
// ボス・装備・ガチャ
// ====================


let bossData={

active:false,

hp:0,

max:0

};



let equipmentData={


ball:"ノーマル",

paddle:"ノーマル"

};






// --------------------
// ボス生成
// --------------------


function createBoss(){



bossData.active=true;


bossData.max=
500+
game.stage*200;


bossData.hp=
bossData.max;



blocks=[];



alert(

"⚠ BOSS出現 HP "+
bossData.hp

);



}







// --------------------
// ボス描画
// --------------------


function drawBoss(){



if(!bossData.active)
return;



ctx.fillStyle="purple";


ctx.fillRect(

40,

70,

280,

60

);



ctx.fillStyle="white";


ctx.font="16px sans-serif";


ctx.fillText(

"BOSS HP:"+bossData.hp,

120,

105

);



}






const oldDrawBoss=
drawGame;



drawGame=function(){



oldDrawBoss();


drawBoss();



};








// --------------------
// ボス判定
// --------------------


function hitBoss(){



if(!bossData.active)
return;



if(

ball.y<150&&

ball.x>40&&

ball.x<320

){



bossData.hp-=ball.power;


ball.dy*=-1;



if(bossData.hp<=0){



bossData.active=false;


game.score+=1000;


game.coin+=500;


addExperience(200);



alert(
"🎉 BOSS撃破"
);



}



}



}







// --------------------
// ステージ変更
// --------------------


const oldStageCheck=
checkStage;



checkStage=function(){



let alive=false;



for(let b of blocks){



if(b.alive){

alive=true;

break;

}


}




if(!alive){



game.stage++;


game.coin+=game.stage*20;



if(
game.stage%5===0
){


createBoss();


}

else{


makeBlocks();


}



resetBall();


updateUI();



alert(

"STAGE "+
game.stage

);



}



};







// --------------------
// ガチャ
// --------------------



function openGacha(){



let cost=300;



if(game.coin<cost){



alert(
"コイン不足"
);


return;


}



game.coin-=cost;



let r=
Math.random()*100;



let result;



if(r<60){


result="ノーマル";


}

else if(r<85){


result="レア";


}

else if(r<98){


result="スーパーレア";


}

else{


result="伝説";


}





equipmentData.ball=result;



alert(

"🎁 ガチャ結果\n"+
result

);



updateUI();



}








// --------------------
// 更新追加
// --------------------



const oldBossLoop=
gameLoop;



gameLoop=function(){



if(bossData.active){


hitBoss();


}



oldBossLoop();



};







// ガチャボタン

let gachaUI=
document.createElement("div");



gachaUI.innerHTML=`

<h3>ガチャ</h3>

<button onclick="openGacha()">
300コイン
</button>

<p>
ボール:
<span id="equip">
ノーマル
</span>
</p>

`;



document.body.insertBefore(

gachaUI,

canvas

);// ====================
// Part4
// セーブ・放置・実績
// ====================



let achievementData={


blocks:0,

boss:0,

time:0


};



let missionData={


target:100,

reward:1000,

clear:false


};






// --------------------
// セーブ
// --------------------



function saveGameData(){



let save={


game:game,

ball:ball,

paddle:paddle,

upgrade:upgradeData,

equipment:equipmentData,

achievement:achievementData,

mission:missionData,

last:Date.now()



};



localStorage.setItem(

"UltimateBreakerV2",

JSON.stringify(save)

);



}







// --------------------
// ロード
// --------------------



function loadGameData(){



let data=

localStorage.getItem(

"UltimateBreakerV2"

);



if(!data)
return;



let save=

JSON.parse(data);



Object.assign(
game,
save.game
);



Object.assign(
ball,
save.ball
);



Object.assign(
paddle,
save.paddle
);



Object.assign(
upgradeData,
save.upgrade
);



Object.assign(
equipmentData,
save.equipment
);



Object.assign(
achievementData,
save.achievement
);



Object.assign(
missionData,
save.mission
);



updateUI();



}








// --------------------
// 放置報酬
// --------------------



function offlineBonus(){



let last=

Number(

localStorage.getItem(

"breakerLast"

)

)||Date.now();




let now=Date.now();



let seconds=

Math.floor(

(now-last)/1000

);



let reward=

Math.min(

seconds,

3600

);



if(reward>5){



game.coin+=reward;



alert(

"放置報酬 "+
reward+
"コイン"

);



}



localStorage.setItem(

"breakerLast",

now

);



}







// --------------------
// 実績
// --------------------



function addAchievement(){



achievementData.blocks++;



if(

achievementData.blocks===100

){



game.coin+=1000;



alert(

"実績解除\n100ブロック破壊"

);



}



}





function bossAchievement(){



achievementData.boss++;



if(

achievementData.boss===10

){



game.coin+=5000;



alert(

"実績解除\nボス10体撃破"

);



}



}







// --------------------
// ミッション
// --------------------



function checkMission(){



if(

achievementData.blocks>=missionData.target

&&
!missionData.clear

){



missionData.clear=true;


game.coin+=missionData.reward;



alert(

"ミッション達成！"

);



}



}








// --------------------
// 破壊数記録
// --------------------



let oldAddExp=

addExperience;



addExperience=function(value){



oldAddExp(value);



addAchievement();


checkMission();



};








// --------------------
// 自動保存
// --------------------



setInterval(function(){



saveGameData();



},30000);







// プレイ時間

setInterval(function(){


achievementData.time++;


},1000);







loadGameData();


offlineBonus();// ====================
// Part5
// 最終処理
// ====================


// タイトル表示

let titleBox=document.createElement("div");


titleBox.innerHTML=`

<h2>
⚡ Ultimate Breaker v2 ⚡
</h2>

<p>
最強のブロック崩しを目指せ
</p>

`;

document.body.insertBefore(
titleBox,
canvas
);





// ボス撃破記録

let bossClearCheck=
hitBoss;


hitBoss=function(){


let before=
bossData.hp;


bossClearCheck();



if(
before>0 &&
bossData.hp<=0
){


achievementData.boss++;


bossAchievement();


}


};







// 完全クリア

function finalClear(){



if(game.stage>=100){



game.running=false;



alert(

"🎉 COMPLETE 🎉\n"+
"ステージ100達成！"

);



game.coin+=100000;


saveGameData();



}



}



setInterval(function(){


finalClear();


},3000);








// キーボード操作

document.addEventListener(

"keydown",

function(e){



if(e.key==="ArrowLeft"){


paddle.x-=30;


}



if(e.key==="ArrowRight"){


paddle.x+=30;


}



});








// パドル範囲制限

setInterval(function(){



if(paddle.x<0){


paddle.x=0;


}



if(
paddle.x+paddle.w>360
){


paddle.x=
360-paddle.w;


}



},50);








// UI更新

let extraUI=
document.createElement("div");



extraUI.innerHTML=`

<h3>情報</h3>

<p>
装備:
<span id="equip2">
${equipmentData.ball}
</span>
</p>

<p>
破壊数:
<span id="breakCount">
0
</span>
</p>

`;



document.body.insertBefore(
extraUI,
canvas
);







// 最終起動

makeBlocks();

updateUI();

drawGame();



</script>


</body>

</html>
