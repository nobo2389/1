<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Block Breaker</title>

<style>

body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#000;
border:3px solid white;
touch-action:none;
}

button{
font-size:18px;
padding:10px 25px;
margin:5px;
border-radius:10px;
}

</style>

</head>


<body>


<h1>🎮 Block Breaker</h1>


<div>

スコア:
<span id="score">0</span>

　

ステージ:
<span id="stage">1</span>

　

残機:
<span id="life">3</span>

</div>


<canvas id="canvas" width="360" height="600"></canvas>


<br>


<button onclick="startGame()">
スタート
</button>


<button onclick="resetGame()">
リセット
</button>



<script>


const canvas=
document.getElementById("canvas");


const ctx=
canvas.getContext("2d");



let running=false;


let score=0;

let stage=1;

let life=3;





// ボール


let ball={

x:180,

y:400,

r:8,

dx:4,

dy:-4

};





// パドル


let paddle={

x:140,

y:560,

w:80,

h:12

};






// ブロック


let blocks=[];



function createBlocks(){


blocks=[];


let rows=
4+stage;



for(let y=0;y<rows;y++){


for(let x=0;x<8;x++){



blocks.push({

x:10+x*43,

y:40+y*25,

w:38,

h:18,

hp:1,

alive:true


});


}


}



}







function draw(){



ctx.clearRect(
0,
0,
360,
600
);



// ボール

ctx.fillStyle="white";

ctx.beginPath();


ctx.arc(

ball.x,

ball.y,

ball.r,

0,

Math.PI*2

);


ctx.fill();



// パドル

ctx.fillStyle="cyan";


ctx.fillRect(

paddle.x,

paddle.y,

paddle.w,

paddle.h

);



// ブロック

for(let b of blocks){


if(b.alive){


ctx.fillStyle="red";


ctx.fillRect(

b.x,

b.y,

b.w,

b.h

);


}


}


}






function update(){


if(!running)
return;



ball.x+=ball.dx;

ball.y+=ball.dy;



// 壁


if(
ball.x<0||
ball.x>canvas.width
){

ball.dx*=-1;

}


if(ball.y<0){

ball.dy*=-1;

}





// パドル


if(

ball.y+ball.r>=paddle.y&&

ball.x>=paddle.x&&

ball.x<=paddle.x+paddle.w

){


ball.dy=-Math.abs(ball.dy);


}






// 落下


if(ball.y>canvas.height){



life--;


document.getElementById(
"life"
).innerText=life;



resetBall();



if(life<=0){


running=false;


alert("ゲームオーバー");


}



}





checkBlock();


draw();


requestAnimationFrame(update);



}






function checkBlock(){



for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){


b.alive=false;


ball.dy*=-1;


score+=10;



document.getElementById(
"score"
).innerText=score;



}



}



checkClear();



}







function checkClear(){



let clear=true;



for(let b of blocks){


if(b.alive){

clear=false;

break;

}


}



if(clear){



stage++;



document.getElementById(
"stage"
).innerText=stage;



createBlocks();


resetBall();



alert(
"ステージ "+
stage
);



}



}






function resetBall(){


ball.x=180;

ball.y=400;

ball.dx=4;

ball.dy=-4;


}





function startGame(){


if(!running){


running=true;


update();


}



}



function resetGame(){


running=false;


score=0;

stage=1;

life=3;



document.getElementById(
"score"
).innerText=0;


document.getElementById(
"stage"
).innerText=1;


document.getElementById(
"life"
).innerText=3;



createBlocks();


resetBall();


draw();



}






// マウス操作


canvas.addEventListener(
"mousemove",
function(e){


let r=
canvas.getBoundingClientRect();


paddle.x=
e.clientX-r.left-
paddle.w/2;



});







// タッチ操作


canvas.addEventListener(
"touchmove",
function(e){


let r=
canvas.getBoundingClientRect();



paddle.x=
e.touches[0].clientX-r.left-
paddle.w/2;



e.preventDefault();



},
{
passive:false
});







createBlocks();

draw();// ============================
// Part2
// アイテム・強化システム
// ============================



let coin=0;


let items=[];


let ballLevel=1;


let paddleLevel=1;






// 表示更新

function updateInfo(){


document.getElementById(
"score"
).innerText=score;


}



// ----------------------------
// アイテム生成
// ----------------------------


function createItem(x,y){


if(Math.random()<0.3){


items.push({

x:x,

y:y,

type:
Math.floor(Math.random()*3)


});


}



}







// ----------------------------
// アイテム処理
// ----------------------------



function updateItems(){



for(
let i=items.length-1;
i>=0;
i--
){



let item=items[i];


item.y+=3;




if(

item.y>=paddle.y&&

item.x>=paddle.x&&

item.x<=paddle.x+paddle.w

){



// パドル拡大


if(item.type===0){


paddle.w+=30;


setTimeout(function(){


paddle.w-=30;


},5000);



}





// ボール強化


if(item.type===1){


ball.dx*=1.2;


ball.dy*=1.2;


ballLevel++;


}






// コイン


if(item.type===2){


coin+=50;


}



items.splice(i,1);



}





if(item.y>600){


items.splice(i,1);


}



}



}







// ----------------------------
// アイテム描画
// ----------------------------



function drawItems(){



for(let item of items){



if(item.type===0)

ctx.fillStyle="yellow";



if(item.type===1)

ctx.fillStyle="lime";



if(item.type===2)

ctx.fillStyle="gold";



ctx.fillRect(

item.x,

item.y,

12,

12

);



}



}







// 描画に追加


let baseDraw=draw;


draw=function(){


baseDraw();


drawItems();


};







// ----------------------------
// ブロック破壊拡張
// ----------------------------



let baseCheckBlock=
checkBlock;



checkBlock=function(){



for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){



b.alive=false;



ball.dy*=-1;



score+=10;


createItem(

b.x,

b.y

);



document.getElementById(
"score"
).innerText=score;



}



}



checkClear();



};







// ----------------------------
// ショップ
// ----------------------------



function upgradeBall(){



let cost=
100*ballLevel;



if(score>=cost){



score-=cost;


ballLevel++;


ball.dx*=1.15;


ball.dy*=1.15;



alert(
"ボールLv "+
ballLevel
);



}



}





function upgradePaddle(){



let cost=
150*paddleLevel;



if(score>=cost){



score-=cost;


paddleLevel++;


paddle.w+=10;



alert(
"パドルLv "+
paddleLevel
);



}



}






let shop=
document.createElement("div");



shop.innerHTML=

`

<h3>強化</h3>

<button onclick="upgradeBall()">
ボール強化
</button>


<button onclick="upgradePaddle()">
パドル強化
</button>


`;



document.body.insertBefore(
shop,
canvas
);







// ----------------------------
// 更新に追加
// ----------------------------



let baseUpdate=
update;



update=function(){



updateItems();


baseUpdate();



};// ============================
// Part3
// セーブ・報酬・ボス・完成
// ============================



let highScore=
Number(localStorage.getItem("highScore"))||0;



let boss=false;

let bossHP=0;



// ----------------------------
// ステージ報酬
// ----------------------------


let oldCheckClear=
checkClear;



checkClear=function(){



let remain=false;



for(let b of blocks){


if(b.alive){

remain=true;

break;

}


}



if(!remain){



score+=stage*100;



if(score>highScore){


highScore=score;


localStorage.setItem(
"highScore",
highScore
);


}



stage++;



if(stage%5===0){


startBoss();



}else{


createBlocks();


}



document.getElementById(
"stage"
).innerText=stage;



resetBall();



alert(
"ステージ "+
stage+
"開始"
);



}



};







// ----------------------------
// ボス
// ----------------------------



function startBoss(){


boss=true;


bossHP=
stage*100;



blocks=[];



alert(
"ボス出現 HP:"+bossHP
);



}






function drawBoss(){



if(!boss)
return;



ctx.fillStyle="purple";


ctx.fillRect(

50,

80,

260,

50

);



ctx.fillStyle="white";


ctx.font="16px sans-serif";


ctx.fillText(

"BOSS HP "+bossHP,

120,

110

);



}




let oldDrawBoss=
draw;



draw=function(){



oldDrawBoss();


drawBoss();



};







function hitBoss(){



if(!boss)
return;



if(

ball.y<140&&

ball.x>50&&

ball.x<310

){



bossHP--;


ball.dy*=-1;



if(bossHP<=0){



boss=false;


score+=1000;


coin+=500;



createBlocks();



alert(
"ボス撃破!"
);



}



}



}







// ----------------------------
// ボス判定追加
// ----------------------------



let oldUpdateBoss=
update;



update=function(){



if(boss){

hitBoss();

}



oldUpdateBoss();



};







// ----------------------------
// セーブ
// ----------------------------



function save(){



localStorage.setItem(

"blockSave",

JSON.stringify({

score:score,

stage:stage,

life:life,

coin:coin

})

);



}






function load(){



let data=
localStorage.getItem(
"blockSave"
);



if(data){



let d=
JSON.parse(data);



score=d.score||0;

stage=d.stage||1;

life=d.life||3;

coin=d.coin||0;



}



}





setInterval(

save,

30000

);






// ----------------------------
// 起動
// ----------------------------



load();


createBlocks();


draw();



</script>


</body>

</html>
