<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ブロック崩し</title>

<style>

body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{

background:#000;

border:3px solid white;

touch-action:none;

}


button{

font-size:18px;

padding:10px 25px;

margin:5px;

border-radius:10px;

}


</style>

</head>


<body>


<h1>🎮 ブロック崩し</h1>


<p>
スコア：
<span id="score">0</span>
</p>


<p>
ステージ：
<span id="stage">1</span>
</p>


<p>
残機：
<span id="life">3</span>
</p>


<canvas id="game" width="360" height="600"></canvas>


<br>


<button onclick="startGame()">
開始
</button>


<button onclick="resetGame()">
リセット
</button>



<script>


const canvas=
document.getElementById("game");


const ctx=
canvas.getContext("2d");



let running=false;


let score=0;

let life=3;

let stage=1;



let ball={

x:180,

y:400,

r:8,

dx:4,

dy:-4

};



let paddle={

x:140,

y:560,

w:80,

h:12

};




let blocks=[];



function makeBlocks(){


blocks=[];


for(
let y=0;
y<5+stage;
y++
){


for(
let x=0;
x<8;
x++
){


blocks.push({

x:10+x*43,

y:40+y*25,

w:38,

h:18,

hp:stage,

alive:true

});


}


}


}






function draw(){


ctx.clearRect(
0,
0,
360,
600
);



ctx.fillStyle="white";


ctx.beginPath();


ctx.arc(
ball.x,
ball.y,
ball.r,
0,
Math.PI*2
);


ctx.fill();




ctx.fillStyle="cyan";


ctx.fillRect(
paddle.x,
paddle.y,
paddle.w,
paddle.h
);




for(let b of blocks){


if(b.alive){


ctx.fillStyle="red";


ctx.fillRect(
b.x,
b.y,
b.w,
b.h
);


}


}


}





function update(){


if(!running)
return;



ball.x+=ball.dx;

ball.y+=ball.dy;




if(
ball.x<0||
ball.x>360
){

ball.dx*=-1;

}



if(ball.y<0){

ball.dy*=-1;

}





if(

ball.y+ball.r>=paddle.y&&

ball.x>=paddle.x&&

ball.x<=paddle.x+paddle.w

){

ball.dy=-Math.abs(ball.dy);

}





if(ball.y>600){


life--;


document.getElementById("life").innerText=life;


resetBall();


if(life<=0){


running=false;


alert("ゲームオーバー");


}


}




hit();



draw();


requestAnimationFrame(update);


}





function hit(){


for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){


b.hp--;


ball.dy*=-1;



if(b.hp<=0){


b.alive=false;


score+=10;


document.getElementById("score").innerText=score;


}



}


}



clearCheck();


}





function clearCheck(){


let remain=false;



for(let b of blocks){


if(b.alive){

remain=true;

}

}



if(!remain){


stage++;


document.getElementById("stage").innerText=stage;


makeBlocks();


resetBall();


}



}





function resetBall(){


ball.x=180;

ball.y=400;

ball.dx=4;

ball.dy=-4;


}





function startGame(){


if(!running){


running=true;


update();


}


}



function resetGame(){


score=0;

life=3;

stage=1;


document.getElementById("score").innerText=0;

document.getElementById("life").innerText=3;

document.getElementById("stage").innerText=1;


makeBlocks();

resetBall();

draw();


}// ============================
// Part2
// 操作・アイテム・追加機能
// ============================



let items=[];


let highScore=
Number(localStorage.getItem("highScore"))||0;



// ----------------------------
// マウス操作
// ----------------------------


canvas.addEventListener(
"mousemove",
function(e){


let rect=
canvas.getBoundingClientRect();



paddle.x=
e.clientX-
rect.left-
paddle.w/2;



if(paddle.x<0)
paddle.x=0;



if(paddle.x+paddle.w>360)
paddle.x=360-paddle.w;



});






// ----------------------------
// スマホ操作
// ----------------------------



canvas.addEventListener(
"touchmove",
function(e){


let rect=
canvas.getBoundingClientRect();



paddle.x=
e.touches[0].clientX-
rect.left-
paddle.w/2;



if(paddle.x<0)
paddle.x=0;



if(paddle.x+paddle.w>360)
paddle.x=360-paddle.w;



e.preventDefault();



},
{
passive:false
});






// ----------------------------
// アイテム生成
// ----------------------------



function createItem(x,y){


if(Math.random()<0.25){



items.push({

x:x,

y:y,

type:
Math.random()<0.5?
"wide":
"power"


});


}



}






// ----------------------------
// アイテム更新
// ----------------------------



function updateItems(){



for(
let i=items.length-1;
i>=0;
i--
){


let item=items[i];


item.y+=3;




if(

item.y>paddle.y&&

item.x>paddle.x&&

item.x<paddle.x+paddle.w

){



if(item.type==="wide"){



paddle.w+=30;



setTimeout(function(){

paddle.w-=30;

},5000);



}



if(item.type==="power"){


ball.dx*=1.2;

ball.dy*=1.2;



}



items.splice(i,1);



}




if(item.y>600){


items.splice(i,1);


}



}



}






// ----------------------------
// アイテム描画
// ----------------------------



function drawItems(){



for(let item of items){



ctx.fillStyle=
item.type==="wide"?
"yellow":
"lime";



ctx.fillRect(

item.x,

item.y,

12,

12

);



}



}







// ----------------------------
// 描画拡張
// ----------------------------



let oldDraw=draw;



draw=function(){


oldDraw();


drawItems();


};







// ----------------------------
// ブロック破壊時アイテム追加
// ----------------------------



let oldHit=hit;



hit=function(){



for(let b of blocks){



if(!b.alive)
continue;



if(

ball.x>b.x&&

ball.x<b.x+b.w&&

ball.y>b.y&&

ball.y<b.y+b.h

){


b.hp--;


ball.dy*=-1;



if(b.hp<=0){



b.alive=false;



score+=10;


createItem(
b.x,
b.y
);



document.getElementById(
"score"
).innerText=score;



}




}



}




clearCheck();



};







// ----------------------------
// 更新処理拡張
// ----------------------------



let oldUpdate=update;



update=function(){



updateItems();


oldUpdate();



};







// ----------------------------
// ハイスコア保存
// ----------------------------



function saveScore(){



if(score>highScore){


highScore=score;


localStorage.setItem(
"highScore",
highScore
);


}



}





setInterval(
saveScore,
5000
);// ============================
// Part3
// UI追加・クリア処理・セーブ
// ============================



let gameClear=false;


let totalClear=0;



// ----------------------------
// ハイスコア表示
// ----------------------------



let highText=
document.createElement("p");


highText.innerHTML=
"ハイスコア：<span id='high'>0</span>";


document.body.insertBefore(
highText,
canvas
);



document.getElementById("high")
.innerText=highScore;






// ----------------------------
// クリア判定強化
// ----------------------------



let oldClearCheck=clearCheck;



clearCheck=function(){


let remain=false;



for(let b of blocks){


if(b.alive){

remain=true;

break;

}


}



if(!remain){



totalClear++;



if(stage>=10){



gameClear=true;


running=false;



alert(
"🎉 完全クリア！\n"+
"スコア："+score
);



return;



}



stage++;



document.getElementById(
"stage"
).innerText=stage;



makeBlocks();


resetBall();



alert(
"ステージ "+
stage+
" 開始"
);



}



};








// ----------------------------
// セーブ
// ----------------------------



function saveGame(){



let data={


score:score,

life:life,

stage:stage,

highScore:highScore


};



localStorage.setItem(

"blockSave",

JSON.stringify(data)

);



}





// ----------------------------
// ロード
// ----------------------------



function loadGame(){



let data=
localStorage.getItem(
"blockSave"
);



if(data){



let d=
JSON.parse(data);



score=d.score||0;

life=d.life||3;

stage=d.stage||1;

highScore=d.highScore||0;



document.getElementById(
"score"
).innerText=score;


document.getElementById(
"life"
).innerText=life;


document.getElementById(
"stage"
).innerText=stage;


document.getElementById(
"high"
).innerText=highScore;



makeBlocks();


draw();



}



}





// ----------------------------
// 自動保存
// ----------------------------



setInterval(function(){


saveGame();


},30000);







// ----------------------------
// ボール角度調整
// ----------------------------



canvas.addEventListener(
"click",
function(){


if(running){


ball.dx+=
(Math.random()-0.5);



}



});







loadGame();// ============================
// Part4
// 最終仕上げ
// ============================



// ----------------------------
// 効果音
// ----------------------------


function sound(freq){


try{


let audio=
new AudioContext();


let osc=
audio.createOscillator();


let gain=
audio.createGain();



osc.frequency.value=freq;


osc.connect(gain);


gain.connect(
audio.destination
);



osc.start();


gain.gain.exponentialRampToValueAtTime(

0.0001,

audio.currentTime+0.1

);


osc.stop(
audio.currentTime+0.1
);



}catch(e){}



}






// ----------------------------
// ブロック破壊音
// ----------------------------



let oldHit2=hit;



hit=function(){


let before=score;


oldHit2();



if(score>before){


sound(500);


}



};







// ----------------------------
// ゲーム状態表示
// ----------------------------



function showStatus(){


console.log(

"Score:",
score,

"Stage:",
stage,

"Life:",
life

);


}







setInterval(

showStatus,

5000

);






// ----------------------------
// ゲームオーバー改善
// ----------------------------



let oldStart=startGame;



startGame=function(){



if(gameClear){


resetGame();


gameClear=false;


}



oldStart();



};






// ----------------------------
// リセット強化
// ----------------------------



let oldReset=resetGame;



resetGame=function(){



oldReset();



items=[];


paddle.w=80;


ball.dx=4;

ball.dy=-4;


gameClear=false;


saveGame();



};






// ----------------------------
// 初期化
// ----------------------------



makeBlocks();


draw();




</script>


</body>

</html>
