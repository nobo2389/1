<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>強化RPG</title>

<style>
body{
 text-align:center;
 font-family:sans-serif;
}

button{
 font-size:18px;
 padding:10px;
 margin:5px;
}

#map{
 font-size:40px;
}

</style>
</head>

<body>

<h1>⚔️ 強化RPG ⚔️</h1>

<h2 id="place">🌱草原</h2>

<div id="map">🌲🌱🌲</div>

<p>
❤️ HP：<span id="hp">100</span><br>
⚔️ 攻撃：<span id="atk">10</span><br>
⭐ Lv：<span id="lv">1</span><br>
経験値：<span id="exp">0</span><br>
💰お金：<span id="gold">0</span>
</p>

<div id="enemy">敵なし</div>

<p>
敵HP：
<span id="ehp">0</span>
</p>

<button onclick="move()">🗺️移動</button>
<button onclick="attack()">⚔️攻撃</button>
<button onclick="magic()">🔥魔法</button>
<button onclick="heal()">💊回復</button>
<button onclick="shop()">🏪店</button>
<button onclick="equip()">🗡️装備</button>
<button onclick="item()">🎒アイテム</button>
<button onclick="friend()">👥仲間</button>
<button onclick="boss()">🐲ボス戦</button>
<button onclick="save()">💾セーブ</button>
<button onclick="load()">📂ロード</button><p id="log"></p>


<script>

let player={
hp:100,
atk:10,
lv:1,
exp:0,
gold:100
};

let enemyHp=0;
let weapon="木の剣";
let potion=3;
let friends=[];
let areas=[
"🌱草原",
"🌲森",
"🪨洞窟",
"🏰城"
];

let enemies=[
"👾スライム",
"🐺オオカミ",
"🧟ゾンビ"
];


function move(){

let p=areas[Math.floor(Math.random()*areas.length)];

document.getElementById("place").textContent=p;


if(Math.random()<0.7){

let e=enemies[Math.floor(Math.random()*enemies.length)];

enemyHp=player.lv*50;

document.getElementById("enemy").textContent=e;

document.getElementById("ehp").textContent=enemyHp;

log("敵が現れた！");

}else{

document.getElementById("enemy").textContent="安全な場所";

log("何もいない");

}

}


function attack(){

if(enemyHp<=0)return;

let d=player.atk+5;

enemyHp-=d;

log("攻撃 "+d+"ダメージ");

enemyAttack();

check();

}


function magic(){

if(enemyHp<=0)return;

enemyHp-=30;

log("🔥魔法攻撃！");

enemyAttack();

check();

}


function heal(){

player.hp+=30;

if(player.hp>100)
player.hp=100;

update();

log("回復した");

}


function enemyAttack(){

if(enemyHp<=0)return;

let d=10;

player.hp-=d;

update();

}


function check(){

if(enemyHp<=0){

player.exp+=30;
player.gold+=50;

if(player.exp>=100){

player.lv++;
player.atk+=5;
player.exp=0;

log("レベルアップ！");

}

update();

}

}


function update(){

hp.textContent=player.hp;
atk.textContent=player.atk;
lv.textContent=player.lv;
exp.textContent=player.exp;
gold.textContent=player.gold;

}


function log(t){

document.getElementById("log").textContent=t;

}
function shop(){

if(player.gold>=100){

player.gold-=100;
player.atk+=10;

log("鉄の剣を買った！攻撃力アップ");

}else{

log("お金が足りない");

}

update();

}


function equip(){

log("装備中："+weapon);

}


function item(){

if(potion>0){

potion--;
player.hp+=50;

if(player.hp>100)
player.hp=100;

update();

log("回復薬を使った！");

}else{

log("回復薬がない");

}

}


function friend(){

friends.push("魔法使い");

player.atk+=5;

update();

log("魔法使いが仲間になった！");

}
function boss(){

enemyHp=500;

document.getElementById("enemy").textContent="🐲魔王";

document.getElementById("ehp").textContent=enemyHp;

log("魔王が現れた！");

}


function save(){

localStorage.setItem(
"myRPG",
JSON.stringify(player)
);

log("セーブしました！");

}


function load(){

let data=localStorage.getItem("myRPG");

if(data){

player=JSON.parse(data);

update();

log("ロードしました！");

}else{

log("セーブデータがありません");

}

}


function clearGame(){

document.body.innerHTML=
"<h1>🏆クリア！🏆</h1>"+
"<h2>魔王を倒した！</h2>";

}</script>

</body>
</html>
