<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><title>ULTRA</title><style>*{margin:0;padding:0;}body{background:#020204;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:monospace;overflow:hidden;}#ui{width:280px;display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;}canvas{background:#000;border:2px solid #0ff;}</style></head><body><div id="ui"><div id="sc">SCORE: 0</div><div id="bhp">BOSS: 100%</div></div><canvas id="cv" width="280" height="360"></canvas><script>
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");let score=0,lives=3,gOver=false,gWin=false,skT=0,skX=0,skY=0,aCtx=null,bgmIvl=null,seq=0,pwd=50,pX=115,pH=8,hm=false,ms=[],eBs=[],shd=false,shdHp=0,balls=[],bSpd=5,row=3,col=5,bW=44,bH=10,bPd=4,oTop=80,oLeft=22,bricks=[],pts=[],its=[];const mld=[261,293,329,349,392,440,493,523];
let boss={x:40,y:40,w:200,h:24,hp:40,maxHp:40,clr:"#f05",bTimer:0,dir:1};function addBall(x,y,dx,dy){balls.push({x:x,y:y,dx:dx,dy:dy,r:4});}function init(){balls=[],eBs=[],ms=[],its=[],shd=false,pwd=50;addBall(140,300,2,-4);boss.hp=boss.maxHp;for(let c=0;c<col;c++){bricks[c]=[];for(let r=0;r<row;r++)bricks[c][r]={x:0,y:0,st:1,c:"#0ff"};}}init();
function initAudio(){if(!aCtx){aCtx=new(window.AudioContext||window.webkitAudioContext)();bgmIvl=setInterval(()=>{if(gOver||gWin)return;let base=boss.hp<20?1.5:1.0;playSound(mld[seq]*base,"triangle",0.15);if(seq%4===0)playSound(80,"sawtooth",0.1);seq=(seq+1)%mld.length;},220);}}
function playSound(f,t,d,e=0){if(!aCtx)return;try{let o=aCtx.createOscillator(),g=aCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,aCtx.currentTime);if(e>0)o.frequency.exponentialRampToValueAtTime(e,aCtx.currentTime+d);g.gain.setValueAtTime(0.03,aCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aCtx.currentTime+d);o.connect(g);g.connect(aCtx.destination);o.start();o.stop(aCtx.currentTime+d);}catch(err){}}
function addPt(x,y,clr){for(let i=0;i<4;i++)pts.push({x:x,y:y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,a:1,clr:clr});}function drop(x,y){if(Math.random()<0.45){let r=Math.random(),t=r<0.33?'M':(r<0.66?'H':'S');its.push({x:x,y:y,t:t,r:6});}}function move(x){let r=cv.getBoundingClientRect(),mX=x-r.left;if(mX>0&&mX<cv.width)pX=mX-pwd/2;}function touch(clientX){initAudio();move(clientX);}
document.addEventListener("mousemove",(e)=>touch(e.clientX));cv.addEventListener("touchmove",(e)=>{touch(e.touches[0].clientX);e.preventDefault();},{passive:false});
function hitBoss(dmg){boss.hp-=dmg;skT=6;playSound(100,"sawtooth",0.08,30);if(boss.hp<=0){boss.hp=0;gWin=true;playSound(523,"square",0.1);setTimeout(()=>playSound(659,"square",0.1),100);setTimeout(()=>playSound(783,"square",0.3),200);}document.getElementById("bhp").innerText="BOSS: "+Math.floor((boss.hp/boss.maxHp)*100)+"%";}
function update(){if(gOver||gWin)return;if(skT>0){skX=(Math.random()-0.5)*skT;skY=(Math.random()-0.5)*skT;skT--;}else{skX=0;skY=0;}boss.x+=boss.dir*1.2;if(boss.x<10||boss.x+boss.w>cv.width-10)boss.dir*=-1;boss.bTimer++;if(boss.bTimer>80){eBs.push({x:boss.x+40,y:boss.y+24,vy:2.5},{x:boss.x+160,y:boss.y+24,vy:2.5});boss.bTimer=0;playSound(160,"triangle",0.04);}
for(let i=eBs.length-1;i>=0;i--){let eb=eBs[i];eb.y+=eb.vy;if(eb.y>cv.height){eBs.splice(i,1);continue;}if(shd&&eb.y>=cv.height-pH-10&&eb.x>pX-5&&eb.x< pX+pwd+5){eBs.splice(i,1);shdHp--;playSound(250,"sine",0.05);if(shdHp<=0)shd=false;continue;}if(eb.y>=cv.height-pH&&eb.x>pX&&eb.x<pX+pwd){eBs.splice(i,1);lives--;playSound(140,"sawtooth",0.2);if(lives<=0)gOver=true;continue;}}
if(hm&&Math.random()<0.1){ms.push({x:pX+pwd/2,y:cv.height-pH});playSound(500,"triangle",0.04,800);}for(let i=ms.length-1; i>=0;i--){let m=ms[i],tx=boss.x+boss.w/2,ty=boss.y+boss.h/2,ang=Math.atan2(ty-m.y,tx-m.x);m.x+=Math.cos(ang)*5;m.y+=Math.sin(ang)*5;if(m.x>boss.x&&m.x<boss.x+boss.w&&m.y>boss.y&&m.y<boss.y+boss.h){addPt(m.x,m.y,"#ff0");hitBoss(1);ms.splice(i,1);}}
for(let i=balls.length-1;i>=0;i--){let b=balls[i];b.x+=b.dx;b.y+=b.dy;if(b.x+b.dx>cv.width-b.r||b.x+b.dx<b.r){b.dx=-b.dx;playSound(350,"sine",0.04);}if(b.y+b.dy<b.r){b.dy=-b.dy;playSound(350,"sine",0.04);}else if(b.y+b.dy>cv.height-b.r-pH){if(b.x>pX&&b.x<pX+pwd){let h=(b.x-(pX+pwd/2))/(pwd/2);b.dx=h*bSpd;b.dy=-Math.sqrt(bSpd*bSpd-b.dx*b.dx);if(Math.abs(b.dy)<2)b.dy=-2;playSound(400,"sine",0.06,500);}else if(b.y+b.dy>cv.height-b.r){balls.splice(i,1);playSound(180,"sine",0.08);continue;}}
if(boss.hp>0&&b.x>boss.x&&b.x<boss.x+boss.w&&b.y>boss.y&&b.y<boss.y+boss.h){b.dy=-b.dy;addPt(b.x,b.y,boss.clr);hitBoss(2);}for(let c=0;c<col;c++){for(let r=0;r<row;r++){let bk=bricks[c][r];if(bk.st===1){if(b.x>bk.x&&b.x<bk.x+bW&&b.y>bk.y&&b.y<bk.y+bH){b.dy=-b.dy;bk.st=0;score+=10;document.getElementById("sc").innerText="SCORE: "+score;addPt(b.x,b.y,bk.c);drop(b.x+bW/2,b.y+bH);playSound(280,"square",0.06,700);}}}}}
if(balls.length===0){lives--;playSound(140,"sawtooth",0.2);if(lives<=0)gOver=true;else addBall(140,300,2,-4);}for(let i=pts.length-1;i>=0;i--){let p=pts[i];p.x+=p.vx;p.y+=p.vy;p.a-=0.05;if(p.a<=0)pts.splice(i,1);}
for(let i=its.length-1;i>=0;i--){let it=its[i];it.y+=2;if(it.y>=cv.height-pH&&it.x>pX&&it.x<pX+pwd){playSound(450,"square",0.04,900);if(it.t==='M'){addBall(it.x,300,-2,-4);addBall(it.x,300,2,-4);}else if(it.t==='H'){hm=true;setTimeout(()=>hm=false,5000);}else{shd=true;shdHp=3;}its.splice(i,1);continue;}if(it.y>cv.height)its.splice(i,1);}
}function draw(){ctx.clearRect(0,0,cv.width,cv.height);ctx.save();ctx.translate(skX,skY);if(boss.hp>0){ctx.fillStyle=boss.clr;ctx.fillRect(boss.x,boss.y,boss.w,boss.h);ctx.fillStyle="#fff";ctx.font="9px sans-serif";ctx.fillText("BOSS CORE",boss.x+70,boss.y+15);}
for(let c=0;c<col;c++){for(let r=0;r<row;r++){let b=bricks[c][r];if(b.st===1){b.x=c*(bW+bPd)+oLeft;b.y=r*(bH+bPd)+oTop;ctx.fillStyle=b.c;ctx.fillRect(b.x,b.y,bW,bH);}}}ctx.fillStyle="#0ff";ctx.fillRect(pX,cv.height-pH,pwd,pH);if(shd){ctx.strokeStyle="#0f6";ctx.strokeRect(pX-4,cv.height-pH-4,pwd+8,4);}ctx.fillStyle="#f50";eBs.forEach(eb=>ctx.fillRect(eb.x,eb.y,4,7));
ctx.fillStyle="#ff0";ms.forEach(m=>ctx.fillRect(m.x,m.y,3,5));ctx.fillStyle="#fff";balls.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();});pts.forEach(p=>{ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.clr;ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fill();ctx.restore();});
its.forEach(it=>{ctx.fillStyle=it.t==='M'?"#0f6":(it.t==='H'?"#ff0":"#0ef");ctx.font="bold 10px sans-serif";ctx.fillText(it.t,it.x-3,it.y+3);});ctx.restore();if(gOver||gWin){ctx.fillStyle="rgba(0,0,0,0.9)";ctx.fillRect(0,0,cv.width,cv.height);ctx.font="bold 20px monospace";ctx.textAlign="center";ctx.fillStyle=gOver?"#f05":"#0f6";ctx.fillText(gOver?"GAME OVER":"BOSS DESTROYED",cv.width/2,160);
ctx.font="11px monospace";ctx.fillStyle="#fff";ctx.fillText("CLICK TO RESTART",cv.width/2,200);}}cv.addEventListener("click",()=>{initAudio();if(gOver||gWin){score=0;lives=3;gOver=false;gWin=false;hm=false;document.getElementById("sc").innerText="SCORE: 0";document.getElementById("bhp").innerText="BOSS: 100%";init();}});function loop(){update();draw();requestAnimationFrame(loop);}loop();
</script></body></html>
