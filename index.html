<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><title>3D</title><style>*{margin:0;padding:0;}body{background:#000;color:#0f0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:monospace;overflow:hidden;}canvas{background:#000;border:2px solid #0f0;box-shadow:0 0 20px #0f05;}</style></head><body><div style="font-size:12px;margin-bottom:4px;letter-spacing:1px;">3D CYBER BRICK</div><canvas id="cv" width="320" height="360"></canvas><script>
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");let bX=0,bY=0,bZ=150,bDx=1.5,bDy=1.5,bDz=-2,pX=0,pY=80,pwd=40,pht=30,score=0,gOver=false,gWin=false,ang=0,aCtx=null,bgm=null,seq=0;const mld=;let bricks=[];for(let x=-2;x<=2;x++)for(let y=-1;y<=1;y++)bricks.push({x:x*24,y:y*16,z:50,st:1});
function snd(f,t,d){if(!aCtx)return;try{let o=aCtx.createOscillator(),g=aCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,aCtx.currentTime);g.gain.setValueAtTime(0.03,aCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aCtx.currentTime+d);o.connect(g);g.connect(aCtx.destination);o.start();o.stop(aCtx.currentTime+d);}catch(e){}}
function track(){if(!aCtx){aCtx=new(window.AudioContext||window.webkitAudioContext)();bgm=setInterval(()=>{if(gOver||gWin)return;snd(mld[seq],"triangle",0.12);if(seq%4===0)snd(60,"sine",0.1);seq=(seq+1)%8;},200);}}function move(mx,my){let r=cv.getBoundingClientRect();pX=(mx-r.left-160)*1.2;pY=(my-r.top-180)*1.2;if(pX<-80)pX=-80;if(pX>80)pX=80;if(pY<-100)pY=-100;if(pY>100)pY=100;}
document.addEventListener("mousemove",(e)=>{track();move(e.clientX,e.clientY);});cv.addEventListener("touchmove",(e)=>{track();move(e.touches.clientX,e.touches.clientY);e.preventDefault();},{passive:false});function proj(x,y,z){let fov=200,s=fov/(fov+z);return{x:cv.width/2+x*s,y:cv.height/2+y*s,s:s};}
function box(x,y,z,w,h,d,clr,fill=false){let pts=[{x:x-w,y:y-h,z:z-d},{x:x+w,y:y-h,z:z-d},{x:x+w,y:y+h,z:z-d},{x:x-w,y:y+h,z:z-d},{x:x-w,y:y-h,z:z+d},{x:x+w,y:y-h,z:z+d},{x:x+w,y:y+h,z:z+d},{x:x-w,y:y+h,z:z+d}].map(p=>{let cos=Math.cos(ang),sin=Math.sin(ang),rx=p.x*cos-p.z*sin,rz=p.x*sin+p.z*cos;return proj(rx,p.y,rz);});let faces=[[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[0,3,7,4],[1,2,6,5]];ctx.strokeStyle=clr;faces.forEach(f=>{ctx.beginPath();ctx.moveTo(pts[f[0]].x,pts[f[0]].y);for(let i=1;i<4;i++)ctx.lineTo(pts[f[i]].x,pts[f[i]].y);ctx.closePath();if(fill){ctx.fillStyle="rgba(0,30,0,0.6)";ctx.fill();}ctx.stroke();});}
function update(){if(gOver||gWin)return;ang+=0.003;bX+=bDx;bY+=bDy;bZ+=bDz;if(bX<-90||bX>90){bDx=-bDx;snd(300,"sine",0.04);}if(bY<-110||bY>110){bDy=-bDy;snd(300,"sine",0.04);}if(bZ<40){bDz=-bDz;snd(350,"sine",0.04);}else if(bZ>210){if(bX>pX-pwd&&bX<pX+pwd&&bY>pY-pht&&bY<pY+pht){bDz=-bDz;bDx=(bX-pX)/8;bDy=(bY-pY)/8;snd(440,"sine",0.06);}else{gOver=true;snd(150,"sawtooth",0.4);}}
bricks.forEach(b=>{if(b.st&&Math.abs(bX-b.x)<16&&Math.abs(bY-b.y)<12&&Math.abs(bZ-b.z)<10){b.st=0;bDz=-bDz;score+=10;snd(260,"square",0.05);if(bricks.every(bk=>bk.st===0))gWin=true;}});}
function draw(){ctx.clearRect(0,0,cv.width,cv.height);box(0,0,120,100,120,90,"#030");bricks.forEach(b=>{if(b.st)box(b.x,b.y,b.z,10,6,4,"#0f0");});box(pX,pY,210,pwd,pht,2,"#0ff",true);let p=proj(bX,bY,bZ);ctx.fillStyle=gOver?"#f00":"#fff";ctx.beginPath();ctx.arc(p.x,p.y,bR*p.s,0,Math.PI*2);ctx.fill();if(gOver||gWin){ctx.fillStyle="rgba(0,0,0,0.8)";ctx.fillRect(0,0,cv.width,cv.height);ctx.font="16px monospace";ctx.textAlign="center";ctx.fillStyle=gOver?"#f00":"#0f0";ctx.fillText(gOver?"GAME OVER":"VICTORY!",160,180);ctx.fillStyle="#fff";ctx.fillText("SCORE: "+score,160,210);}}
cv.addEventListener("click",()=>{if(gOver||gWin){score=0;gOver=false;gWin=false;bX=0,bY=0,bZ=150,bDx=1.5,bDy=1.5,bDz=-2;bricks.forEach(b=>b.st=1);}});function loop(){update();draw();requestAnimationFrame(loop);}loop();
</script></body></html>
