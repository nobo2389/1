<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>文明進化放置ゲーム</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#101820;
color:white;
font-family:sans-serif;
}

#app{
max-width:600px;
margin:auto;
padding:10px;
}

h1{
text-align:center;
}


.panel{
background:#1c2833;
border-radius:15px;
padding:15px;
margin:10px 0;
}


button{

width:90%;
padding:12px;
margin:5px;

border:0;
border-radius:10px;

background:#3498db;
color:white;

font-size:16px;

}


button:active{

transform:scale(0.95);

}


.value{

font-size:22px;
color:#f1c40f;

}


.bar{

height:20px;
background:#333;
border-radius:10px;
overflow:hidden;

}


.bar div{

height:100%;
width:0%;
background:#2ecc71;

}



.small{

font-size:12px;
color:#aaa;

}


</style>

</head>


<body>


<div id="app">


<h1>🌎 文明進化</h1>



<div class="panel">

<h2>資源</h2>


<p>
💰 コイン
<br>
<span id="coin" class="value">0</span>
</p>


<p>
🌲 木材
<br>
<span id="wood">0</span>
</p>


<p>
🪨 石材
<br>
<span id="stone">0</span>
</p>


<p>
🔬 研究ポイント
<br>
<span id="science">0</span>
</p>


</div>




<div class="panel">


<h2>文明</h2>


<p>
レベル：
<span id="level">1</span>
</p>


<div class="bar">
<div id="xpbar"></div>
</div>


<p>
経験値
<span id="xp">0</span>
/
<span id="need">100</span>
</p>


</div>





<div class="panel">


<h2>操作</h2>


<button onclick="collect()">
資源を採取
</button>


<button onclick="save()">
セーブ
</button>


<button onclick="load()">
ロード
</button>


</div>





<div class="panel">


<h2>建築</h2>


<button onclick="build('farm')">
🌾農場 建設
</button>


<button onclick="build('mine')">
⛏鉱山 建設
</button>


<button onclick="build('factory')">
🏭工場 建設
</button>


<p>
農場:
<span id="farm">0</span>
</p>

<p>
鉱山:
<span id="mine">0</span>
</p>


<p>
工場:
<span id="factory">0</span>
</p>


</div>




<div class="panel">


<h2>研究</h2>


<button onclick="research()">
研究する
</button>


<p>
研究レベル:
<span id="research">0</span>
</p>


</div>




<div class="panel">

<h2>ログ</h2>

<div id="log">
文明が始まった
</div>

</div>



</div>





<script>


let game={

coin:0,

wood:0,

stone:0,

science:0,


level:1,

xp:0,

need:100,


farm:0,

mine:0,

factory:0,


research:0,


last:Date.now()


};





function update(){


coin.innerText=Math.floor(game.coin);

wood.innerText=Math.floor(game.wood);

stone.innerText=Math.floor(game.stone);

science.innerText=Math.floor(game.science);


level.innerText=game.level;

xp.innerText=Math.floor(game.xp);

need.innerText=Math.floor(game.need);


farm.innerText=game.farm;

mine.innerText=game.mine;

factory.innerText=game.factory;


research.innerText=game.research;


xpbar.style.width=
Math.min(100,game.xp/game.need*100)+"%";


}





function log(t){

document.getElementById("log").innerText=t;

}





function collect(){


game.coin+=10;

game.wood+=3;

game.stone+=1;

game.xp+=5;


levelCheck();


log("資源を集めた");


update();


}





function levelCheck(){


while(game.xp>=game.need){


game.xp-=game.need;


game.level++;


game.need*=1.5;


game.science+=10;


log("文明レベルアップ");


}


}





function build(type){


let cost;


if(type==="farm")
cost=200+game.farm*100;


if(type==="mine")
cost=500+game.mine*300;


if(type==="factory")
cost=2000+game.factory*1000;



if(game.coin>=cost){


game.coin-=cost;


game[type]++;


log(type+"を建設");


}else{


log("コイン不足");


}



update();


}





function research(){


let cost=1000*(game.research+1);



if(game.coin>=cost){


game.coin-=cost;


game.research++;


log("研究成功");


}else{


log("研究費不足");


}



update();


}






setInterval(()=>{


let now=Date.now();


let sec=(now-game.last)/1000;


game.last=now;



game.coin +=
(game.farm*5+
game.mine*15+
game.factory*50+
game.research*20)
*sec;



update();



},1000);// ================================
// Part2
// オフライン報酬・保存強化・イベント基礎
// ================================



function save(){

localStorage.setItem(
"civilization_game",
JSON.stringify(game)
);

log("セーブしました");

}





function load(){

let data=
localStorage.getItem(
"civilization_game"
);


if(data){

game=JSON.parse(data);


let now=Date.now();

let offline=
(now-game.last)/1000;


if(offline>0){

let gain=
(game.farm*5+
game.mine*15+
game.factory*50+
game.research*20)
*
offline;


gain=Math.floor(gain);


if(gain>0){

game.coin+=gain;


log(
"放置報酬 "+
gain+
" コイン獲得"
);

}

}


game.last=Date.now();


update();


}else{


log("セーブデータなし");


}



}





// ================================
// 建物詳細データ
// ================================



let buildingData={


farm:{

name:"農場",

wood:20,

stone:10,

desc:"毎秒コインを生産する"

},


mine:{

name:"鉱山",

wood:50,

stone:30,

desc:"大量の資源を生む"

},


factory:{

name:"工場",

wood:200,

stone:100,

desc:"高度な生産施設"

}



};







// ================================
// 木材・石材を使う建築システム追加
// ================================




function advancedBuild(type){


let b=
buildingData[type];


if(!b)return;



if(
game.wood>=b.wood &&
game.stone>=b.stone
){


game.wood-=b.wood;

game.stone-=b.stone;


game[type]++;


log(
b.name+
"を建設しました"
);



}else{


log(
"材料が足りません"
);


}


update();


}







// ================================
// ランダムイベント
// ================================



let events=[


"豊作が起きた",

"新しい技術を発見した",

"未知の資源を発見した",

"商人が訪れた",

"文明が成長した"


];






function randomEvent(){


let chance=Math.random();



if(chance<0.05){


let e=
events[
Math.floor(
Math.random()*events.length
)
];



let reward=
Math.floor(
Math.random()*500
)+100;



game.coin+=reward;



log(
e+
" コイン+"+
reward
);



update();


}



}







setInterval(()=>{


randomEvent();


},5000);







// ================================
// 実績システム準備
// ================================



game.achievements =
game.achievements || [];




function checkAchievement(){


if(
game.level>=5 &&
!game.achievements.includes("level5")
){


game.achievements.push(
"level5"
);


game.coin+=1000;


log(
"実績解除：文明レベル5"
);


}



if(
game.coin>=100000 &&
!game.achievements.includes("rich")
){


game.achievements.push(
"rich"
);


game.coin+=5000;


log(
"実績解除：大富豪"
);


}



}





setInterval(()=>{


checkAchievement();


},3000);




update();// ================================
// Part3
// 人口・職業・時代進化システム
// ================================



game.population =
game.population || 10;


game.food =
game.food || 100;


game.age =
game.age || 1;



game.jobs =
game.jobs || {

farmer:0,

miner:0,

worker:0,

scientist:0

};





// ================================
// 人口表示追加用
// ================================


function populationUpdate(){


let foodUse=
game.population*0.1;


game.food-=foodUse;



if(game.food<0){

game.food=0;


}




// 食料が十分なら人口増加


if(
game.food>200 &&
game.population<10000
){


game.population+=0.01;


}




// 人口による自動生産


game.coin+=
game.jobs.worker*2;


game.wood+=
game.jobs.farmer*0.5;


game.stone+=
game.jobs.miner*0.3;


game.science+=
game.jobs.scientist*0.2;




}







// ================================
// 職業変更
// ================================




function setJob(type){


if(game.population<=0){

log("人口不足");

return;

}



let total=

game.jobs.farmer+
game.jobs.miner+
game.jobs.worker+
game.jobs.scientist;



if(total>=Math.floor(game.population)){

log("働ける人口が足りません");

return;

}



if(game.jobs[type]!==undefined){


game.jobs[type]++;


log(
type+
"を配置しました"
);


}


update();


}







// ================================
// 時代進化
// ================================



let ageData=[


{

name:"原始時代",

need:1

},


{

name:"農耕時代",

need:5

},


{

name:"中世",

need:15

},


{

name:"産業時代",

need:30

},


{

name:"未来時代",

need:60

}


];






function ageCheck(){



let next=
ageData[game.age];



if(
next &&
game.level>=next.need
){


game.age++;


game.coin+=5000;


log(
"時代進化！ "+
ageData[game.age-1].name
);



}



}







// ================================
// 食料生産
// ================================




function foodProduction(){



game.food+=
game.farm*3;


}




// ================================
// 研究ボーナス
// ================================



function researchBonus(){


let bonus=
1+
(game.research*0.05);



game.coin*=bonus;



if(game.coin>1000000000){

game.coin=1000000000;

}



}





// ================================
// メイン更新拡張
// ================================



setInterval(()=>{


populationUpdate();


foodProduction();


ageCheck();


},1000);





// ================================
// 自動セーブ
// ================================



setInterval(()=>{


save();


},30000);// ================================
// Part4
// 探索・災害・転生システム
// ================================



game.prestige =
game.prestige || 0;


game.gem =
game.gem || 0;


game.explore =
game.explore || 0;



game.skills =
game.skills || {

production:0,

growth:0,

luck:0

};





// ================================
// 探索システム
// ================================



let exploreItems=[

{
name:"古代の宝箱",
coin:1000
},

{
name:"希少鉱石",
stone:500
},

{
name:"未知の技術",
science:200
},

{
name:"巨大な財宝",
coin:10000
}

];





function exploreWorld(){


let cost=100;



if(game.food<cost){

log("食料不足");

return;

}



game.food-=cost;



let item=
exploreItems[
Math.floor(
Math.random()*exploreItems.length
)
];



if(item.coin){

game.coin+=item.coin;

}



if(item.stone){

game.stone+=item.stone;

}



if(item.science){

game.science+=item.science;

}



log(
"探索成功："+item.name
);



update();


}







// ================================
// 災害イベント
// ================================



function disaster(){



let r=Math.random();



if(r<0.03){



let loss=
Math.floor(
game.coin*0.1
);



game.coin-=loss;



if(game.coin<0)
game.coin=0;



log(
"災害発生！"+
loss+
"コインを失った"
);



}



}






setInterval(()=>{


disaster();


},10000);








// ================================
// スキルシステム
// ================================



function buySkill(type){


let cost=
100*
(
game.skills[type]+1
);



if(game.science>=cost){



game.science-=cost;


game.skills[type]++;


log(
"スキル強化："+type
);



}else{


log("研究ポイント不足");


}



update();


}





function skillBonus(){



let p=
1+
game.skills.production*0.1;


let g=
1+
game.skills.growth*0.05;



game.coin*=p;



game.population*=g;



}








// ================================
// 転生システム
// ================================




function prestigeGame(){



if(game.level<50){


log(
"レベル50以上必要"
);


return;

}



let reward=
Math.floor(
game.level/10
);



game.prestige+=reward;


game.gem+=reward;



game.coin=0;

game.wood=0;

game.stone=0;

game.science=0;


game.level=1;

game.xp=0;

game.need=100;



game.farm=0;

game.mine=0;

game.factory=0;



log(
"転生しました 宝石+"+
reward
);



update();



}





// ================================
// 転生ボーナス
// ================================



function prestigeBonus(){



return 1+
game.prestige*0.1;



}




setInterval(()=>{


explore++;


skillBonus();


},5000);// ================================
// Part5
// 戦闘・モンスター・装備システム
// ================================



game.player =
game.player || {

hp:100,

attack:10,

defense:5,

level:1,

exp:0

};



game.equipment =
game.equipment || {

weapon:0,

armor:0,

ring:0

};



game.monster =
game.monster || null;






// ================================
// モンスター生成
// ================================



let monsterList=[


{
name:"スライム",
hp:50,
attack:5,
reward:100
},


{
name:"ゴブリン",
hp:150,
attack:15,
reward:500
},


{
name:"ドラゴン",
hp:1000,
attack:80,
reward:5000
},


{
name:"古代兵器",
hp:5000,
attack:300,
reward:20000
}


];








function createMonster(){


let base=
monsterList[
Math.floor(
Math.random()*
monsterList.length
)
];



game.monster={

name:base.name,

hp:base.hp*
(1+game.level*0.1),

maxhp:base.hp*
(1+game.level*0.1),

attack:base.attack,

reward:base.reward


};



log(
"敵出現："+game.monster.name
);



update();


}







// ================================
// 戦闘
// ================================




function battle(){



if(!game.monster){


createMonster();

return;


}




let damage=
game.player.attack+
game.equipment.weapon*5;



game.monster.hp-=damage;



let enemyDamage=
game.monster.attack-
game.player.defense;



if(enemyDamage<0)
enemyDamage=0;



game.player.hp-=enemyDamage;




if(game.monster.hp<=0){



game.coin+=
game.monster.reward;


game.player.exp+=20;


game.gem+=1;


log(
"勝利！報酬 "+
game.monster.reward
);



game.monster=null;


checkPlayerLevel();



}
else if(game.player.hp<=0){



game.player.hp=100;


log(
"敗北した..."
);



}




update();


}







// ================================
// プレイヤーレベル
// ================================



function checkPlayerLevel(){


let need=
game.player.level*100;



if(
game.player.exp>=need
){


game.player.exp-=need;


game.player.level++;


game.player.attack+=5;


game.player.defense+=2;



log(
"戦闘レベルアップ！"
);



}


}







// ================================
// 装備強化
// ================================




function upgradeEquipment(type){



let cost=
1000*
(
game.equipment[type]+1
);



if(game.coin>=cost){



game.coin-=cost;


game.equipment[type]++;


log(
type+
"を強化しました"
);



}else{


log("コイン不足");


}



update();


}







// ================================
// ダンジョン
// ================================



game.dungeon =
game.dungeon || 1;



function dungeonClear(){



let enemyPower=
game.dungeon*500;



let power=
game.player.attack*
10;



if(power>=enemyPower){



let reward=
game.dungeon*10000;



game.coin+=reward;


game.dungeon++;


game.gem+=5;



log(
"ダンジョンクリア！"
);



}else{


log(
"戦力不足"
);


}




update();



}







// ================================
// 戦闘報酬自動成長
// ================================



setInterval(()=>{


if(game.monster){

battle();


}


},3000);// ================================
// Part6
// ペット・ガチャ・図鑑システム
// ================================



game.pets =
game.pets || [];


game.gachaCount =
game.gachaCount || 0;


game.collection =
game.collection || [];





// ================================
// ペットデータ
// ================================



let petList=[


{
name:"小さなスライム",
rarity:"★",
bonus:0.05
},


{
name:"森の精霊",
rarity:"★★",
bonus:0.15
},


{
name:"機械生命体",
rarity:"★★★",
bonus:0.3
},


{
name:"古代ドラゴン",
rarity:"★★★★",
bonus:0.7
},


{
name:"神獣フェニックス",
rarity:"★★★★★",
bonus:1.5
}


];






// ================================
// ガチャ
// ================================



function gacha(){


let cost=5000;



if(game.coin<cost){


log("コイン不足");


return;

}



game.coin-=cost;



let rate=Math.random();



let index;



if(rate<0.5){

index=0;

}

else if(rate<0.8){

index=1;

}

else if(rate<0.95){

index=2;

}

else if(rate<0.995){

index=3;

}

else{

index=4;

}



let pet=
petList[index];



game.pets.push(pet);


game.collection.push(
pet.name
);



game.gachaCount++;



log(
"ペット獲得："+pet.name+
" "+pet.rarity
);



update();



}






// ================================
// ペット効果
// ================================




function petBonus(){



let bonus=1;



for(
let i=0;
i<game.pets.length;
i++
){


bonus+=
game.pets[i].bonus;


}



return bonus;



}





// ================================
// 図鑑
// ================================




function showCollection(){



let text="図鑑\n";


for(
let i=0;
i<petList.length;
i++
){



if(
game.collection.includes(
petList[i].name
)
){


text+=
"✅ "+
petList[i].name+
"\n";


}

else{


text+=
"❌ 未発見\n";


}



}



alert(text);



}






// ================================
// ペット売却
// ================================



function sellPet(){


if(game.pets.length<=0){


log("ペットなし");


return;


}



let pet=
game.pets.shift();



let value=
Math.floor(
1000*
(1+pet.bonus)
);



game.coin+=value;



log(
pet.name+
"を売却 +"+
value
);



update();


}







// ================================
// ペットレベル
// ================================



game.petLevel =
game.petLevel || 1;




function trainPet(){


let cost=
game.petLevel*2000;



if(game.coin>=cost){



game.coin-=cost;


game.petLevel++;


log(
"ペット訓練成功"
);



}else{


log("費用不足");


}



update();


}






// ================================
// 生産倍率へ統合
// ================================



function totalProductionBonus(){



let bonus=1;



bonus*=petBonus();


bonus*=prestigeBonus();



return bonus;


}





// 既存生産を強化する補正

setInterval(()=>{


let b=
totalProductionBonus();



game.coin+=
game.worker*
b;


},1000);// ================================
// Part7
// 国家・領土・貿易システム
// ================================



game.country =
game.country || {

name:"小さな村",

power:1,

territory:1,

population:10

};



game.trade =
game.trade || {

level:0,

income:0

};



game.resources =
game.resources || {

gold:0,

crystal:0,

oil:0

};







// ================================
// 領土拡張
// ================================



function expandTerritory(){



let cost=
game.country.territory*
10000;



if(game.coin>=cost){



game.coin-=cost;


game.country.territory++;


game.country.power+=10;



log(
"領土拡大！"
);



}else{


log(
"資金不足"
);


}



update();


}







// ================================
// 資源採掘
// ================================



function rareResource(){



let amount=
game.country.territory*
0.5;



game.resources.gold+=amount;



if(
game.age>=3
){


game.resources.oil+=amount*0.5;


}



if(
game.age>=5
){


game.resources.crystal+=amount*0.2;


}



}








// ================================
// 貿易
// ================================



function tradeUpgrade(){



let cost=
50000*
(game.trade.level+1);



if(game.coin>=cost){


game.coin-=cost;


game.trade.level++;


log(
"貿易レベルアップ"
);


}else{


log(
"貿易資金不足"
);


}


update();


}






function tradeIncome(){



let income=


game.trade.level*

100;



game.coin+=income;



game.trade.income+=income;



}








// ================================
// 国家技術
// ================================



game.tech =
game.tech || {

military:0,

economy:0,

science:0

};






function upgradeTech(type){



let cost=
10000*
(
game.tech[type]+1
);



if(game.coin>=cost){

}else{

"研究資金不足"
);

update();



}

game.country.power+

},

}


];






function missionCheck(){



for(
let i=0;
i<missionData.length;
i++

missionData[i];

game.missions[m.id]>=m.goal
){

"mission_"+m.id;

){

m.name
);



}


}



}



}

function loginBonus(){



let today=
new Date()
.toDateString();



if(
game.login.last!==today
){

game.login.days++;



let reward=
1000*
game.login.days;

"ログイン報酬 +"+
reward
);



save();



}



}

function calculateScore(){



game.rank.score=

Math.floor(

game.level*100+

game.coin/10+

game.country.territory*1000+

game.prestige*5000+

game.player.level*200

);



}

calculateScore();



alert(

"文明スコア\n"+
game.rank.score+
"\n\n"+
"あなたの文明は"+
game.country.name

);



}
